<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">
<title>2M - Super Mobile Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
    [x-cloak] { display: none !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03); }
    .glass-nav { background: rgba(255, 255, 255, 0.90); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.5); }
    .sheet-enter { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
    .sheet-enter-active { transform: translateY(0); }
    .sheet-leave { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(0); }
    .sheet-leave-active { transform: translateY(100%); }
    .m-pending { border-right: 4px solid #f59e0b; }
    .m-repaired { border-right: 4px solid #3b82f6; }
    .m-delivered { border-right: 4px solid #10b981; }
    .m-rejected { border-right: 4px solid #ef4444; }
</style>
</head>
<body x-data="erpApp()" x-init="init()" class="text-slate-800 min-h-screen pb-28">

<div x-show="loading" class="fixed inset-0 z-[1000] bg-slate-900/50 backdrop-blur-lg flex flex-col items-center justify-center text-white transition-all" x-cloak>
    <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
    <p class="font-black tracking-widest animate-pulse">جاري المعالجة...</p>
</div>

<div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel p-10 rounded-[2.5rem] relative overflow-hidden">
        <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-indigo-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="relative z-10 text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl mb-6 shadow-xl transform rotate-3"><i class="fa-solid fa-rocket -rotate-3"></i></div>
            <h2 class="text-4xl font-black text-slate-800 tracking-tight">2M</h2>
            <p class="text-slate-500 font-bold mt-2">تسجيل الدخول للنظام</p>
        </div>
        <div class="relative z-10 space-y-5">
            <div class="relative">
                <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl outline-none font-bold transition-all">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl outline-none font-bold transition-all">
            </div>
            <button @click="login()" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 mt-2">دخول</button>
        </div>
    </div>
</div>

<template x-if="isLoggedIn">
<div class="w-full h-full relative">

    <div class="max-w-4xl mx-auto relative h-full">
        <header class="glass-nav sticky top-0 z-40 px-6 py-4 flex justify-between items-center rounded-b-3xl shadow-sm mb-6 mx-2">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-[14px] flex items-center justify-center text-white shadow-md">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <div>
                    <h1 class="font-black text-lg text-slate-800 leading-none mb-1">2M System</h1>
                    <div class="flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <p class="text-[9px] font-bold text-slate-500" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ')'"></p>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button @click="fetchData()" class="w-10 h-10 bg-white text-indigo-600 rounded-[14px] shadow-sm active:scale-95 flex items-center justify-center border border-slate-100"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
            </div>
        </header>

        <main class="px-4 space-y-6">

            <div x-show="currentTab === 'home' && activeView === ''" x-transition.opacity class="space-y-4">
                <div x-show="user.role === 'admin'" class="bg-gradient-to-br from-slate-900 to-indigo-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                    <div class="relative z-10 flex flex-col gap-5">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xs font-bold text-indigo-200 mb-1">إجمالي السيولة النقدية (الخزينة والمحافظ)</p>
                                <h3 class="text-4xl font-black tabular-nums tracking-tight text-white" x-text="(shopCash + getTotalWalletBalance()).toLocaleString() + ' ج'"></h3>
                            </div>
                            <button @click="updateShopCash()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center backdrop-blur-md active:scale-95 shadow-inner border border-white/20"><i class="fa-solid fa-pen text-sm"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-2 pt-4 border-t border-indigo-500/30">
                            <div>
                                <p class="text-[10px] font-bold text-emerald-300 mb-1 flex items-center gap-1"><i class="fa-solid fa-cash-register"></i> كاش المحل</p>
                                <p class="text-xl font-black text-emerald-400 tabular-nums" x-text="shopCash.toLocaleString() + ' ج'"></p>
                            </div>
                            <div class="border-r border-indigo-500/30 pr-4">
                                <p class="text-[10px] font-bold text-blue-300 mb-1 flex items-center gap-1"><i class="fa-solid fa-wallet"></i> إجمالي المحافظ</p>
                                <p class="text-xl font-black text-blue-400 tabular-nums" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="glass-panel p-4 rounded-[2rem] flex flex-col justify-center gap-3 active:scale-95 bg-white border border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-[1.2rem] flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-chart-line"></i></div>
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold mb-0.5">مبيعات اليوم</p>
                                <p class="font-black text-slate-800 text-lg tabular-nums" x-text="getTodaySales().toLocaleString() + ' ج'"></p>
                            </div>
                        </div>
                    </div>
                    <div @click="showDebtors()" class="glass-panel p-4 rounded-[2rem] flex flex-col justify-center gap-3 active:scale-95 cursor-pointer bg-white border border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-[1.2rem] flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold mb-0.5">ديون السوق (الآجل)</p>
                                <p class="font-black text-rose-600 text-lg tabular-nums" x-text="getTotalDebts().toLocaleString() + ' ج'"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="currentTab === 'pos' && activeView === ''" x-transition.opacity class="flex flex-col h-full space-y-4">
                <div class="sticky top-[80px] z-30 glass-nav p-3 rounded-[2rem] space-y-3 shadow-sm border border-slate-200/60">
                    <div class="relative flex gap-2">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" x-model="search" placeholder="ابحث لبيع منتج..." class="w-full py-3 pr-12 pl-4 bg-slate-50 border border-slate-200 focus:border-indigo-500 rounded-[1rem] outline-none font-bold text-sm transition-all shadow-inner">
                        </div>
                        <button @click="openScanner('pos')" class="w-12 bg-indigo-50 text-indigo-600 rounded-[1rem] flex items-center justify-center active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
                    </div>
                    <div class="flex gap-1.5 overflow-x-auto custom-scrollbar pb-1">
                        <button @click="posFilter='new'" :class="posFilter==='new' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">هواتف جديدة</button>
                        <button @click="posFilter='used'" :class="posFilter==='used' ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">مستعملة</button>
                        <button @click="posFilter='all'" :class="posFilter==='all' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">إكسسوار وعام</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pb-24">
                    <template x-for="item in filteredInventoryPOS">
                        <div @click="addToCart(item)" class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm active:scale-95 hover:border-indigo-300 transition-all cursor-pointer relative overflow-hidden">
                            <h4 class="font-black text-xs text-slate-800 line-clamp-2 leading-snug h-8 pr-1 mt-1" x-text="item.Product_Name"></h4>
                            <div class="mt-4 flex justify-between items-end border-t border-slate-50 pt-2">
                                <span class="text-indigo-600 font-black text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></span>
                                <span class="text-[9px] font-bold px-2 py-1 rounded-lg" :class="item.Stock > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'" x-text="item.Stock > 0 ? 'مخزن: ' + item.Stock : 'نفد'"></span>
                            </div>
                        </div>
                    </template>
                </div>

                <button x-show="cart.length > 0" @click="showCart = true" class="fixed bottom-[85px] left-4 right-4 bg-slate-800 text-white p-4 rounded-[1.5rem] shadow-xl flex justify-between items-center z-[200] active:scale-95 transition-transform border border-slate-700">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center relative">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 rounded-full text-[10px] font-black flex items-center justify-center border-2 border-slate-800" x-text="cart.length"></span>
                        </div>
                        <span class="font-black text-sm">مراجعة السلة والدفع</span>
                    </div>
                    <span class="font-black text-lg text-emerald-400 tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></span>
                </button>
            </div>

            <div x-show="currentTab === 'operations' && activeView === ''" x-transition.opacity class="space-y-4">
                <h3 class="font-black text-slate-800 mb-2 flex items-center gap-2 text-lg"><div class="w-1.5 h-6 bg-indigo-500 rounded-full"></div> لوحة الإدارة</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button @click="activeView = 'inventory'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                        <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-boxes-stacked"></i></div>
                        <span class="font-black text-slate-800 text-sm">إدارة المخزن</span>
                    </button>
                    <button @click="activeView = 'maintenance'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                        <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                        <span class="font-black text-slate-800 text-sm">قسم الصيانة</span>
                    </button>
                    <button @click="activeView = 'wallets'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                        <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-wallet"></i></div>
                        <span class="font-black text-slate-800 text-sm">المحافظ والكاش</span>
                    </button>
                    <button @click="showCustomers()" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                        <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-users"></i></div>
                        <span class="font-black text-slate-800 text-sm">سجل العملاء</span>
                    </button>
                    <button x-show="user.role === 'admin'" @click="showExpensesReportsModal = true" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform col-span-2">
                        <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-money-bill-wave"></i></div>
                        <span class="font-black text-slate-800 text-sm">المصروفات المحددة</span>
                    </button>
                </div>
            </div>

            <div x-show="currentTab === 'more' && activeView === ''" x-transition.opacity class="space-y-4">
                <div class="glass-panel p-5 rounded-[2rem] flex items-center gap-4">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-2xl border-4 border-white shadow-sm"><i class="fa-solid fa-user"></i></div>
                    <div>
                        <h3 class="font-black text-lg text-slate-800" x-text="user.username"></h3>
                        <p class="text-xs font-bold text-slate-500" x-text="user.role === 'admin' ? 'مدير النظام' : 'موظف مبيعات'"></p>
                    </div>
                </div>
                <div class="glass-panel p-2 rounded-[2rem] space-y-1">
                    <button @click="activeView = 'reports'" class="w-full flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-[14px] flex items-center justify-center"><i class="fa-solid fa-chart-pie"></i></div>
                            <span class="font-black text-slate-800">التقارير المالية المفصلة</span>
                        </div>
                        <i class="fa-solid fa-chevron-left text-slate-300"></i>
                    </button>
                    <button x-show="user.role === 'admin'" @click="openAddUserModal()" class="w-full flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-[14px] flex items-center justify-center"><i class="fa-solid fa-user-plus"></i></div>
                            <span class="font-black text-slate-800">إضافة مستخدم جديد</span>
                        </div>
                        <i class="fa-solid fa-chevron-left text-slate-300"></i>
                    </button>
                </div>
                <button @click="logout()" class="w-full glass-panel border-rose-100 p-5 rounded-[2rem] text-rose-600 font-black flex justify-center items-center gap-2 active:scale-95 mt-8">
                    <i class="fa-solid fa-power-off"></i> تسجيل الخروج
                </button>
            </div>

            <div x-show="activeView === 'inventory'" x-cloak class="fixed inset-0 z-50 bg-[#f8fafc] overflow-y-auto pb-28 custom-scrollbar">
                <div class="sticky top-0 glass-nav p-4 flex items-center gap-4 z-20 shadow-sm">
                    <button @click="activeView = ''" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-slate-600"><i class="fa-solid fa-arrow-right"></i></button>
                    <h2 class="text-lg font-black text-slate-800">إدارة المخزن</h2>
                </div>
                <div class="p-4 space-y-4">
                    <button @click="showBestSellersModal = true" class="w-full glass-panel bg-gradient-to-r from-amber-100 to-orange-100 text-amber-800 p-4 rounded-[1.5rem] font-black text-sm flex justify-between items-center border border-amber-200/50">
                        <span><i class="fa-solid fa-ranking-star ml-2"></i> المنتجات الأكثر مبيعاً</span>
                        <i class="fa-solid fa-chevron-left opacity-50"></i>
                    </button>
                    <div class="glass-panel p-4 rounded-[1.5rem] space-y-3">
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" x-model="invSearch" placeholder="بحث بالاسم أو الباركود..." class="w-full py-3 pr-10 pl-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                            </div>
                        </div>
                        <div class="flex bg-slate-100/50 p-1 rounded-xl">
                            <button @click="invFilter = 'all'" :class="invFilter === 'all' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="flex-1 py-2 rounded-lg font-black text-[10px]">الكل</button>
                            <button @click="invFilter = 'shortages'" :class="invFilter === 'shortages' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'" class="flex-1 py-2 rounded-lg font-black text-[10px]"><i class="fa-solid fa-triangle-exclamation ml-1"></i> النواقص</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <template x-for="item in processedInventory">
                            <div @click="openInventoryProduct(item)" class="glass-panel p-4 rounded-2xl bg-white flex justify-between items-center cursor-pointer border border-transparent">
                                <div class="flex gap-3 items-center">
                                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="(item.Category||'').includes('هاتف') ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'"><i class="fa-solid" :class="(item.Category||'').includes('هاتف') ? 'fa-mobile-screen' : 'fa-box'"></i></div>
                                    <div>
                                        <p class="font-black text-sm text-slate-800 line-clamp-1" x-text="item.Product_Name"></p>
                                        <p class="text-[9px] text-slate-400 font-bold mt-1" x-text="(item.Category||'عام') + ' • كود: ' + item.Code"></p>
                                    </div>
                                </div>
                                <div class="text-left flex flex-col items-end">
                                    <p class="font-black text-indigo-600 text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></p>
                                    <span class="text-[9px] font-black px-2 py-0.5 rounded-lg mt-1" :class="item.Stock <= (item.Min_Stock||1) ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-600'" x-text="'مخزن: ' + item.Stock"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="activeView === 'wallets'" x-cloak class="fixed inset-0 z-50 bg-[#f8fafc] overflow-y-auto pb-28 custom-scrollbar">
                <div class="sticky top-0 glass-nav p-4 flex items-center gap-4 z-20 shadow-sm">
                    <button @click="activeView = ''" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-slate-600"><i class="fa-solid fa-arrow-right"></i></button>
                    <h2 class="text-lg font-black text-slate-800">المحافظ والكاش</h2>
                </div>
                <div class="p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="openWalletTxModal('وارد')" class="bg-emerald-500 text-white p-4 rounded-2xl font-black shadow-lg flex flex-col items-center gap-2 active:scale-95"><i class="fa-solid fa-arrow-down text-xl"></i> استلام كاش</button>
                        <button @click="openWalletTxModal('صادر')" class="bg-rose-500 text-white p-4 rounded-2xl font-black shadow-lg flex flex-col items-center gap-2 active:scale-95"><i class="fa-solid fa-arrow-up text-xl"></i> تحويل كاش</button>
                    </div>
                    <div class="space-y-4">
                        <template x-for="w in filteredWallets">
                            <div class="glass-panel p-5 rounded-[1.5rem] relative">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-wallet text-xl"></i></div>
                                        <div>
                                            <p class="text-base font-black text-slate-800" x-text="w.name"></p>

        const dStr = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');

        const debts = {};

            if (sale.Payment_Type === 'Credit') {
                const customer = sale.Customer || 'عميل نقدي';
                const debt = Number(sale.Total || 0) - Number(sale.Paid || 0);
                if (debt > 0) { debts[customer] = (debts[customer] || 0) + debt; }

        let groups = {};

        });
        return Object.keys(groups).map(k => ({ desc: k, total: groups[k] }));
    },

        let salesCount = {};
        (this.data.Sales || []).forEach(sale => {
            try {
                let items = JSON.parse(sale.Items_JSON || "[]");
                items.forEach(item => {
                    if (!salesCount[item.code]) { salesCount[item.code] = { name: item.name, qty: 0 }; }
                    salesCount[item.code].qty += Number(item.qty);
                });
            } catch (e) {}
        });
        return Object.values(salesCount).sort((a, b) => b.qty - a.qty);

if (res && !res.error) { this.data = res; const cash = (res.Settings || []).find(s => s.Key === "Shop_Cash" || s.Setting_Name === "Shop_Cash" || s[0] === "Shop_Cash");
this.shopCash = cash ? Number(cash.Value || cash[1] || 0) : 0; }
this.loading = false;
},
getTodaySales() {
const today = this.getLocalDate();
let total = 0;
(this.data.Sales || []).forEach(sale => {
if (sale.Date && sale.Date.startsWith(today)) {
total += Number(sale.Total || 0);
}
});
return total;
},
getFilteredProfits() {
let newPhone = 0, usedPhone = 0, general = 0, wallet = 0;
(this.data.Wallets || []).forEach(w => { if (this.isDateInRange(w.Date)) { wallet += Number(w.Profit_Margin || w.profit || 0); } });
(this.data.Sales || []).forEach(sale => {
if (this.isDateInRange(sale.Date)) {
try {
let items = JSON.parse(sale.Items_JSON || "[]");
items.forEach(item => {
let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); let cost = invItem ? Number(invItem.Cost_Price || 0) : 0;
let profit = (Number(item.price) - cost) * Number(item.qty);
if (invItem) { if (invItem.Category === 'هاتف جديد') newPhone += profit; else if (invItem.Category === 'هاتف مستعمل') usedPhone += profit;
else general += profit; } else { general += profit; }
}); } catch (e) { }
} }); return { newPhone, usedPhone, general, wallet };
},
get profits() { return this.getFilteredProfits(); },
getFilteredMaintStats() {
let totalPaid = 0, totalCost = 0;
(this.data.Maintenance || []).forEach(m => { if (m.Status === 'تم التسليم' && this.isDateInRange(m.Date)) { totalPaid += Number(m.paid || m.Paid || 0); totalCost += Number(m.Cost_Price || 0); } });
return { totalPaid, totalCost, netProfit: totalPaid - totalCost };
},
get maintStats() { return this.getFilteredMaintStats(); },
get inventory() { return this.data.Inventory || []; },
get processedInventory() {
let list = this.inventory;
if (this.invSearch.trim() !== '') {
const q = this.invSearch.toLowerCase().trim();
list = list.filter(i => String(i.Product_Name || '').toLowerCase().includes(q) || String(i.Code || '').includes(q));
}
if (this.invFilter === 'shortages') { return list.filter(i => Number(i.Stock) <= Number(i.Min_Stock || 1)); }
return list;
},
get filteredInventoryPOS() {
const q = this.search.toLowerCase().trim();
return this.inventory.filter(i => {
const matchesSearch = !q || String(i.Product_Name || '').toLowerCase().includes(q) || String(i.Code || '').includes(q);
const category = String(i.Category || '');
const matchesTab = this.posFilter === 'all' ? !category.includes('هاتف') : this.posFilter === 'new' ?
category === 'هاتف جديد' : this.posFilter === 'used' ? category === 'هاتف مستعمل' : true;
return matchesSearch && matchesTab;
});
},
get filteredMaintenance() {
if (!this.data.Maintenance) return [];
return this.data.Maintenance.filter(m => { const status = String(m.Status || '').trim(); return status === this.mFilter; }).reverse();
},
get filteredWallets() {
const q = this.searchWallet.toLowerCase(); if (!q) return this.dynamicWallets;
return this.dynamicWallets.filter(w => String(w.name || '').toLowerCase().includes(q));
},
get bestSellers() {
let salesCount = {};
(this.data.Sales || []).forEach(sale => {
try {
let items = JSON.parse(sale.Items_JSON || "[]");
items.forEach(item => {
if (!salesCount[item.code]) { salesCount[item.code] = { name: item.name, qty: 0 }; }
salesCount[item.code].qty += Number(item.qty);
});
} catch (e) {}
});
return Object.values(salesCount).sort((a, b) => b.qty - a.qty);
},
addToCart(product) {
if (product.Stock <= 0) return alert('هذا المنتج نفد من المخزن!');
const item = this.cart.find(c => c.code === product.Code);
if (item) item.qty++; else this.cart.push({ code: product.Code, name: product.Product_Name, price: product.Selling_Price, qty: 1 });
this.checkout.paid = this.cartTotal;
},
get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.qty), 0); },
async confirmSale() {
if (!this.cart.length) return; if (this.checkout.type === 'Wallet' && !this.checkout.walletName) return alert('برجاء اختيار المحفظة');
this.loading = true;
const saleData = { total: this.cartTotal, paid: this.checkout.paid === '' ? this.cartTotal : this.checkout.paid, customer: this.checkout.customer ||
'عميل نقدي', paymentType: this.checkout.type, Payment_Type: this.checkout.type, walletName: this.checkout.walletName, Wallet_Name: this.checkout.walletName, isPurchase: false, updateCashOrWallet: this.checkout.updateCashOrWallet, items: this.cart, user: this.user.username };
await this.callApi('processSale', saleData);
this.cart = []; this.showCart = false; this.checkout = { customer: '', type: 'Cash', paid: '', walletName: '', isPurchase: false, updateCashOrWallet: true };
this.fetchData();
},
openProductModal(cat) { this.isEditingProduct = false; this.pForm = { Category: cat, Code: '', Product_Name: '', Cost_Price: '', Selling_Price: '', Stock: 1, Min_Stock: 1, User: this.user.username, Model: '', Storage: '', RAM: '', Color: '', Battery: '', Serial: '', Details: '', hasBox: false, hasCharger: false, hasHeadphone: false, paymentType: 'Cash', walletName: '', updateCashOrWallet: true };
this.showProductModal = true; },
openInventoryProduct(item) {
this.isEditingProduct = true;
this.pForm = { Category: item.Category || '', Code: item.Code || '', Product_Name: item.Product_Name || '', Cost_Price: item.Cost_Price ||
'', Selling_Price: item.Selling_Price || '', Stock: item.Stock || 0, Min_Stock: item.Min_Stock || 1, User: item.User || this.user.username, Model: item.Model ||
'', Storage: item.Storage || '', RAM: item.RAM || '', Color: item.Color || '', Battery: item.Battery || '', Serial: item.Serial ||
'', Details: item.Details || '', hasBox: false, hasCharger: false, hasHeadphone: false, paymentType: 'Cash', walletName: '', updateCashOrWallet: false };
this.showProductModal = true;
},
async saveProduct() {
if (!this.pForm.Code || !this.pForm.Product_Name || !this.pForm.Selling_Price) return alert("أدخل البيانات الأساسية");
let extraDetails = [];
if(this.pForm.hasBox) extraDetails.push("كرتونة"); if(this.pForm.hasCharger) extraDetails.push("شاحن كامل"); if(this.pForm.hasHeadphone) extraDetails.push("سماعة");
if (extraDetails.length > 0) { let currentDetails = this.pForm.Details || ""; let joined = extraDetails.join(" - ");
this.pForm.Details = currentDetails ? currentDetails + " | " + joined : joined; }
this.loading = true;
this.pForm.Total_Cost = (Number(this.pForm.Cost_Price) || 0) * (Number(this.pForm.Stock) || 1); this.pForm.Payment_Type = this.pForm.paymentType; this.pForm.Wallet_Name = this.pForm.walletName;
await this.callApi('saveProduct', this.pForm); this.showProductModal = false; this.fetchData();
},
openAddUserModal() { this.addUserForm = { username: '', password: '', role: 'worker' }; this.showAddUserModal = true; },
async addNewUser() { if (!this.addUserForm.username || !this.addUserForm.password) return alert("أدخل اسم المستخدم وكلمة المرور"); this.loading = true; await this.callApi('addUser', this.addUserForm);
this.showAddUserModal = false; this.fetchData(); },
openAddCustomerModal() { this.addCustomerForm = { name: '', phone: '', address: '' }; this.showAddCustomerModal = true; },
async addNewCustomer() { if (!this.addCustomerForm.name) return alert("أدخل اسم العميل"); this.loading = true; await this.callApi('addCustomer', this.addCustomerForm); this.showAddCustomerModal = false; this.fetchData(); },

openAddExpenseModal() {
this.expenseForm = { description: '', amount: '', notes: '', paymentMethod: 'Cash', walletName: '', updateCashOrWallet: true };
this.showAddExpenseModal = true;
},
async submitExpense() {
if(!this.expenseForm.description || !this.expenseForm.amount) return alert("يرجى إدخال بيان المصروف والمبلغ.");
if (this.expenseForm.paymentMethod === 'Wallet' && !this.expenseForm.walletName) return alert('برجاء اختيار المحفظة');
this.loading = true;
await this.callApi('saveExpense', { ...this.expenseForm, user: this.user.username });
this.showAddExpenseModal = false;
this.fetchData();
},
getTotalExpenses() {
return (this.data.Expenses || []).filter(e => this.isDateInRange(e.Date)).reduce((sum, e) => sum + Number(e.Amount || 0), 0);
},
get groupedExpenses() {
let groups = {};
(this.data.Expenses || []).filter(e => this.isDateInRange(e.Date)).forEach(e => {
let desc = e.Description || 'غير مصنف';
if(!groups[desc]) groups[desc] = 0;
groups[desc] += Number(e.Amount || 0);
});
return Object.keys(groups).map(k => ({ desc: k, total: groups[k] }));
},
get filteredCustomers() {
if (!this.customerSearch || this.customerSearch.length < 2) return []; const search = this.customerSearch.toLowerCase(); const customers = new Set();
(this.data.Sales || []).forEach(sale => { if (sale.Customer && sale.Customer.toLowerCase().includes(search)) customers.add(sale.Customer); });
(this.data.Customers || []).forEach(customer => { if (customer.Name && customer.Name.toLowerCase().includes(search)) customers.add(customer.Name); });
return Array.from(customers).filter(name => name.toLowerCase().includes(search));
},
get filteredInvoices() {
return (this.data.Sales || []).filter(sale => {
if (!this.isDateInRange(sale.Date)) return false;
try { let items = JSON.parse(sale.Items_JSON || "[]"); if (this.invoicesFilter === 'عام') { return items.some(item => { let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); return invItem && !invItem.Category.includes('هاتف'); });
} else { return items.some(item => { let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); return invItem && invItem.Category === this.invoicesFilter; });
} } catch (e) { return false; }
});
},
getMClass(status) { status = String(status).trim(); if (status === 'قيد الانتظار') return 'm-pending'; if (status === 'تم التصليح') return 'm-repaired';
if (status === 'تم التسليم') return 'm-delivered'; return 'm-rejected'; },
openMaintenanceModal() { this.mForm = { Client_Name: '', Phone_Number: '', Phone_Type: '', Issue: '', Expected_Cost: '' }; this.showMaintenanceModal = true; },
async saveNewMaintenance() { this.loading = true; await this.callApi('saveMaintenance', { Ticket_ID: "T-" + Date.now().toString().slice(-6), Status: 'قيد الانتظار', Client_Name: this.mForm.Client_Name || "بدون اسم", Phone_Number: this.mForm.Phone_Number || "", Phone_Type: this.mForm.Phone_Type || "غير محدد", Issue: this.mForm.Issue || "غير محدد", Expected_Cost: this.mForm.Expected_Cost || 0, paid: 0, Cost_Price: 0, User: this.user.username });
this.showMaintenanceModal = false; this.fetchData(); },
openEditMaintenanceModal(m) { this.mEditForm = { Ticket_ID: m.Ticket_ID, Status: m.Status || 'قيد الانتظار', Expected_Cost: m.Expected_Cost || 0, paid: m.paid ||
m.Paid || 0, Cost_Price: m.Cost_Price || 0 }; this.showEditMaintenanceModal = true; },
async submitEditMaintenance() { this.loading = true; await this.callApi('updateMaintenance', { Ticket_ID: this.mEditForm.Ticket_ID, Status: this.mEditForm.Status, Expected_Cost: this.mEditForm.Expected_Cost || 0, paid: this.mEditForm.paid || 0, Cost_Price: this.mEditForm.Cost_Price || 0 });
this.showEditMaintenanceModal = false; this.fetchData(); },
get dynamicWallets() { return (this.data.Settings || []).filter(s => { const key = s.Key || s.Setting_Name || s[0]; return key && key.toString().startsWith("Limit_"); }).map(s => { const key = s.Key || s.Setting_Name || s[0]; const val = s.Value || s[1] || 0; return { name: key.replace("Limit_", ""), limit: Number(val) }; });
},
calcWallet(name) { const txs = (this.data.Wallets || []).filter(w => String(w.Wallet_Name || "").trim() === String(name).trim()); const now = new Date();
let incoming = 0, outgoing = 0, balance = 0, monthlyIncoming = 0, monthlyOutgoing = 0;
txs.forEach(t => { const amt = Number(t.Amount || 0); const type = String(t.Type || "").trim(); const d = new Date(t.Date); if (type === 'وارد') { incoming += amt; balance += amt; if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthlyIncoming += amt; } else if (type === 'صادر') { outgoing += amt; balance -= amt; if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthlyOutgoing += amt; } });
return { incoming, outgoing, balance, monthlyIncoming, monthlyOutgoing }; },
calcWalletFiltered(name) { const txs = (this.data.Wallets || []).filter(w => String(w.Wallet_Name || "").trim() === String(name).trim() && this.isDateInRange(w.Date));
let incoming = 0, outgoing = 0; txs.forEach(t => { const amt = Number(t.Amount || 0); const type = String(t.Type || "").trim(); if (type === 'وارد') incoming += amt; else if (type === 'صادر') outgoing += amt; });
return { incoming, outgoing }; },
getLimitRemaining(name, limit) { const { monthlyIncoming, monthlyOutgoing } = this.calcWallet(name); return { incoming: limit ?
Math.max(limit - monthlyIncoming, 0) : 0, outgoing: limit ? Math.max(limit - monthlyOutgoing, 0) : 0 }; },
openWalletTxModal(type) { this.wTxForm = { type: type, wallet: '', amount: '', profit: '', notes: '', fromCash: false };
this.showWalletTxModal = true; },
async submitWalletTx() { if (!this.wTxForm.wallet || !this.wTxForm.amount) return alert("الرجاء اختيار المحفظة وكتابة المبلغ"); const wData = this.calcWallet(this.wTxForm.wallet);
const walletObj = this.dynamicWallets.find(dw => dw.name === this.wTxForm.wallet); if (this.wTxForm.type === 'صادر' && walletObj && walletObj.limit > 0) { if ((wData.monthlyOutgoing + Number(this.wTxForm.amount)) > walletObj.limit) { this.showConfirm("تنبيه: تتخطى الليميت الشهري! الاستمرار؟", async () => { this.loading = true; await this.callApi('saveWalletTransaction', { wallet: this.wTxForm.wallet, type: this.wTxForm.type, amount: Number(this.wTxForm.amount), notes: this.wTxForm.notes, user: this.user.username, profit: Number(this.wTxForm.profit || 0), fromCash: this.wTxForm.fromCash }); this.showWalletTxModal = false; this.fetchData(); });
return; } } this.loading = true; await this.callApi('saveWalletTransaction', { wallet: this.wTxForm.wallet, type: this.wTxForm.type, amount: Number(this.wTxForm.amount), notes: this.wTxForm.notes, user: this.user.username, profit: Number(this.wTxForm.profit || 0), fromCash: this.wTxForm.fromCash });
this.showWalletTxModal = false; this.fetchData(); },
addNewWallet() { this.modalAddWallet = { show: true, name: '', limit: 50000 }; },
async submitNewWallet() { if(!this.modalAddWallet.name) return; this.modalAddWallet.show = false; this.loading = true; await this.callApi('saveWalletConfig', { name: this.modalAddWallet.name, limit: this.modalAddWallet.limit }); this.fetchData();
},
async deleteWallet(name) { this.showConfirm('متأكد من حذف محفظة ' + name + ' بالكامل؟', async () => { this.loading = true; await this.callApi('deleteWallet', { name: name }); this.fetchData(); });
},
updateShopCash() { this.modalUpdateCash = { show: true, amount: this.shopCash }; },
async submitUpdateCash() { this.modalUpdateCash.show = false; this.loading = true; await this.callApi('setShopCash', { amount: Number(this.modalUpdateCash.amount) }); this.fetchData(); },
getTotalSales(category) { let total = 0; (this.data.Sales || []).forEach(sale => { if (this.isDateInRange(sale.Date)) { try { let items = JSON.parse(sale.Items_JSON || "[]"); items.forEach(item => { let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); if (invItem) { let itemCategory = invItem.Category || 'عام'; if (category === 'عام' && !itemCategory.includes('هاتف')) total += Number(item.price) * Number(item.qty); else if (itemCategory === category) total += Number(item.price) * Number(item.qty); } else if (category === 'عام') { total += Number(item.price) * Number(item.qty); } }); } catch (e) { } } });
return total; },
getTotalWalletBalance() { let total = 0; this.dynamicWallets.forEach(w => { total += this.calcWallet(w.name).balance; }); return total; },
getTotalDebts() { let total = 0; (this.data.Sales || []).forEach(sale => { if (this.isDateInRange(sale.Date) && sale.Payment_Type === 'Credit') { total += Number(sale.Total || 0) - Number(sale.Paid || 0); } });
return total; },
getLimitPercent(name, limit, type = 'outgoing') { if (!limit) return 0; const wallet = this.calcWallet(name);
const used = type === 'incoming' ? wallet.monthlyIncoming : wallet.monthlyOutgoing; return Math.min((used / limit) * 100, 100); },
showInvoices(category) { this.invoicesFilter = category; this.showInvoicesModal = true; },
showWalletTransactions() { this.walletTransactions = (this.data.Wallets || []).filter(w => this.isDateInRange(w.Date)); this.showWalletTransactionsModal = true; },
showDebtors() { const debts = {}; (this.data.Sales || []).forEach(sale => { if (sale.Payment_Type === 'Credit') { const customer = sale.Customer || 'عميل نقدي'; const debt = Number(sale.Total || 0) - Number(sale.Paid || 0); if (debt > 0) { if (!debts[customer]) debts[customer] = 0; debts[customer] += debt; } } });
(this.data.Customers || []).forEach(customer => { if (customer.Debt && Number(customer.Debt) > 0) { if (!debts[customer.Name]) debts[customer.Name] = 0; debts[customer.Name] += Number(customer.Debt); } });
this.debtors = Object.keys(debts).map(customer => ({ name: customer, totalDebt: debts[customer] })); this.showDebtorsModal = true; },
showDebtorInvoices(customer) { this.selectedDebtor = customer; this.debtorInvoices = (this.data.Sales || []).filter(sale => sale.Customer === customer && sale.Payment_Type === 'Credit' && (Number(sale.Total || 0) - Number(sale.Paid || 0)) > 0 );
this.showDebtorInvoicesModal = true; },
showCustomers() { this.customers = (this.data.Customers || []).map(customer => { const customerSales = (this.data.Sales || []).filter(sale => sale.Customer === customer.Name); const totalDebt = customerSales.filter(sale => sale.Payment_Type === 'Credit').reduce((sum, sale) => sum + (Number(sale.Total || 0) - Number(sale.Paid || 0)), 0); return { ...customer, totalDebt }; });
this.showCustomersModal = true; },
editSalePayment(sale) { this.editPaymentForm = { saleId: sale.ID || '', paid: Number(sale.Paid || 0) }; this.editPaymentModal = true; },
async updateSalePayment() { this.loading = true; await this.callApi('updateSalePayment', this.editPaymentForm); this.editPaymentModal = false; this.fetchData(); },
getLimitColor(name, limit, type = 'outgoing') { const percent = this.getLimitPercent(name, limit, type); if (percent >= 80) return 'bg-rose-500';
if (percent >= 50) return 'bg-amber-500'; return 'bg-emerald-500'; }
}
}
</script>
