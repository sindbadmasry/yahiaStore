<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3b82f6">
<meta name="description" content="2M ERP & POS Mobile First">
<title>2M - ERP & POS Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
[x-cloak] { display: none !important; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
.fab-menu-enter { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: translateY(20px) scale(0.9); }
.fab-menu-enter-active { opacity: 1; transform: translateY(0) scale(1); }
.fab-menu-leave { transition: all 0.2s ease-in; opacity: 1; transform: translateY(0) scale(1); }
.fab-menu-leave-active { opacity: 0; transform: translateY(20px) scale(0.9); }
/* Offline Mode Banner */
.offline-banner { animation: slideDown 0.3s ease-out forwards; }
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
</style>
</head>
<body x-data="erpApp()" x-init="init()" class="bg-slate-50 text-slate-900 min-h-screen pb-28 transition-colors duration-300">

<div x-show="!isOnline" x-cloak class="offline-banner fixed top-0 left-0 right-0 bg-rose-600 text-white text-center py-1 text-[10px] font-black z-[9999] shadow-md flex justify-center items-center gap-2">
    <i class="fa-solid fa-wifi-slash"></i> وضع عدم الاتصال (يتم حفظ العمليات محلياً)
    <span class="bg-white text-rose-600 px-2 py-0.5 rounded-full" x-text="offlineQueue.length"></span>
</div>

<div x-show="toast.show" x-transition class="fixed top-8 left-1/2 -translate-x-1/2 z-[5000] px-6 py-3 rounded-full shadow-2xl font-black text-xs flex items-center gap-2 max-w-[90vw]" :class="toast.type === 'error' ? 'bg-rose-600 text-white' : 'bg-emerald-600 text-white'">
    <i class="fa-solid" :class="toast.type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-check'"></i>
    <span x-text="toast.message"></span>
</div>

<div x-show="loading" class="fixed inset-0 z-[1000] bg-black/60 backdrop-blur-md flex flex-col items-center justify-center text-white">
    <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mb-4"></div>
    <p class="font-black animate-pulse">جاري المعالجة...</p>
</div>

<div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-slate-100 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-4xl mb-4 shadow-xl"><i class="fa-solid fa-rocket"></i></div>
            <h2 class="text-3xl font-black text-slate-800">2M ERP</h2>
            <p class="text-slate-400 font-bold">تسجيل الدخول</p>
        </div>
        <div class="space-y-4">
            <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-center">
            <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-center">
            <button @click="login()" :disabled="loading" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-lg active:scale-95">دخول</button>
        </div>
    </div>
</div>

<template x-if="isLoggedIn">
<div class="max-w-4xl mx-auto relative h-full">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b px-6 py-4 flex justify-between items-center shadow-sm" :class="!isOnline ? 'mt-6' : ''">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-bolt"></i></div>
            <div>
                <h1 class="font-black text-lg leading-tight">2M ERP</h1>
                <p class="text-[10px] font-bold text-blue-600" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ') | فرع: الرئيسي'"></p>
            </div>
        </div>
        <div class="flex gap-2">
            <button x-show="offlineQueue.length > 0" @click="syncOfflineQueue()" class="p-2 bg-amber-50 text-amber-600 rounded-xl active:scale-95"><i class="fa-solid fa-rotate"></i></button>
            <button @click="fetchData()" class="p-2 bg-blue-50 text-blue-600 rounded-xl active:scale-95"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
            <button @click="logout()" class="p-2 bg-rose-50 text-rose-600 rounded-xl active:scale-95"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-4 space-y-6 pb-32">
        
        <div x-show="currentTab === 'home'" class="space-y-6 animate__animated animate__fadeIn">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-xs font-bold opacity-80 uppercase tracking-widest mb-1">إجمالي السيولة النقدية</p>
                    <h3 class="text-4xl font-black tabular-nums" x-text="(shopCash + getTotalWalletBalance()).toLocaleString() + ' ج'"></h3>
                    <div class="h-px bg-white/20 my-4"></div>
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold opacity-80 mb-1"><i class="fa-solid fa-cash-register ml-1"></i>رصيد الدرج</p>
                            <div class="flex items-center gap-2">
                                <p class="text-xl font-black" x-text="shopCash.toLocaleString() + ' ج'"></p>
                                <button x-show="user.role === 'admin'" @click="updateShopCash()" class="bg-white/20 w-6 h-6 flex items-center justify-center rounded-lg hover:bg-white/30 transition-all text-[10px]"><i class="fa-solid fa-pen"></i></button>
                            </div>
                        </div>
                        <div class="text-left">
                            <p class="text-[10px] font-bold opacity-80 mb-1"><i class="fa-solid fa-wallet ml-1"></i>رصيد المحافظ</p>
                            <p class="text-xl font-black" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div @click="showTodaySalesModal = true" class="bg-white p-5 rounded-[2rem] border shadow-sm cursor-pointer hover:border-blue-300">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-3"><i class="fa-solid fa-money-bill-trend-up"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">مبيعات اليوم</p>
                    <p class="text-xl font-black tabular-nums" x-text="(getTotalSales('عام') + getTotalSales('هاتف جديد') + getTotalSales('هاتف مستعمل')).toLocaleString() + ' ج'"></p>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm" x-show="user.role === 'admin'">
                    <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center mb-3"><i class="fa-solid fa-coins"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">صافي الربح</p>
                    <p class="text-xl font-black tabular-nums" x-text="(getFilteredProfits().newPhone + getFilteredProfits().usedPhone + getFilteredProfits().general + getFilteredProfits().wallet).toLocaleString() + ' ج'"></p>
                </div>
                <div @click="currentTab = 'installments'" class="bg-white p-5 rounded-[2rem] border shadow-sm cursor-pointer hover:border-indigo-300">
                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-3"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">إجمالي الأقساط المتبقية</p>
                    <p class="text-xl font-black text-indigo-600 tabular-nums" x-text="getTotalRemainingInstallments().toLocaleString() + ' ج'"></p>
                </div>
                <div @click="currentTab = 'inventory'; invFilter = 'shortages'" class="bg-white p-5 rounded-[2rem] border shadow-sm cursor-pointer hover:border-rose-300">
                    <div class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center mb-3"><i class="fa-solid fa-boxes-stacked"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">المنتجات الناقصة</p>
                    <p class="text-xl font-black text-rose-600 tabular-nums" x-text="processedInventory.filter(i => Number(i.Stock) <= Number(i.Min_Stock||1)).length"></p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm">
                <h3 class="font-black text-xs text-slate-700 mb-4"><i class="fa-solid fa-chart-line ml-2"></i>تحليل المبيعات الشهري</h3>
                <div class="w-full h-40 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 font-bold text-xs border border-dashed border-slate-200">
                    [ مساحة مخصصة لرسم Chart.js ]
                </div>
            </div>
            
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm">
                <h3 class="font-black text-xs text-slate-700 mb-4"><i class="fa-solid fa-clock-rotate-left ml-2"></i>أحدث العمليات</h3>
                <div class="space-y-3">
                    <template x-for="act in getRecentActivity()">
                        <div class="flex items-center gap-3 text-[10px]">
                            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i :class="act.icon"></i></div>
                            <div class="flex-1">
                                <p class="font-black text-slate-700" x-text="act.desc"></p>
                                <p class="text-slate-400 font-bold" x-text="act.time"></p>
                            </div>
                            <div class="font-black" :class="act.type === 'in' ? 'text-emerald-500' : 'text-rose-500'" x-text="act.amount"></div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="currentTab === 'operations'" class="space-y-4 animate__animated animate__fadeIn relative pb-16">
            <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-black text-slate-800 text-sm"><i class="fa-solid fa-cart-plus ml-2 text-blue-600"></i>نقطة البيع (POS)</h3>
                <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                    <button @click="posFilter='all'" :class="posFilter==='all' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'" class="px-3 py-1.5 rounded-lg text-[10px] font-black transition-all">الكل</button>
                    <button @click="posFilter='new'" :class="posFilter==='new' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'" class="px-3 py-1.5 rounded-lg text-[10px] font-black transition-all">جديد</button>
                    <button @click="posFilter='used'" :class="posFilter==='used' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'" class="px-3 py-1.5 rounded-lg text-[10px] font-black transition-all">مستعمل</button>
                </div>
            </div>
            
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" x-model="search" placeholder="بحث بالاسم أو الباركود..." class="w-full p-4 pl-12 bg-white border border-slate-200 rounded-2xl outline-none font-bold text-sm focus:border-blue-500 transition-colors shadow-sm">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <button @click="openScanner('pos')" class="w-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-md active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
            </div>

            <div class="grid grid-cols-2 gap-3 pb-4">
                <template x-for="item in filteredInventoryPOS">
                    <div @click="addToCart(item)" class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm active:scale-95 transition-all relative overflow-hidden cursor-pointer hover:border-blue-400">
                        <template x-if="item.Category && item.Category.includes('هاتف')">
                            <span class="absolute top-0 right-0 bg-blue-600 text-white text-[8px] px-2 py-1 rounded-bl-xl font-black">هاتف</span>
                        </template>
                        <h4 class="font-black text-xs truncate leading-relaxed" x-text="item.Product_Name"></h4>
                        <div class="mt-3 flex justify-between items-center">
                            <span class="text-blue-700 font-black text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></span>
                            <span class="text-[9px] font-bold px-2 py-1 rounded-lg" :class="item.Stock > 0 ? 'bg-blue-50 text-blue-700' : 'bg-red-50 text-red-600'" x-text="item.Stock > 0 ? 'متاح: ' + item.Stock : 'نفد'"></span>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="cart.length > 0" x-transition class="fixed bottom-[88px] left-4 right-4 bg-slate-800 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center z-40 border border-slate-700">
                <div>
                    <p class="text-[10px] text-slate-300 font-bold">إجمالي السلة (<span x-text="cart.length"></span> منتجات)</p>
                    <p class="text-lg font-black tabular-nums text-emerald-400" x-text="netCartTotal().toLocaleString() + ' ج'"></p>
                </div>
                <button @click="showCart = true" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-black text-sm transition-colors shadow-lg shadow-blue-900/50">الدفع الآن</button>
            </div>
        </div>

        <div x-show="currentTab === 'inventory'" class="space-y-4 animate__animated animate__fadeIn">
             <div class="flex gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                <button @click="invTab = 'products'" :class="invTab === 'products' ? 'bg-blue-600 text-white' : 'text-slate-500'" class="flex-1 py-2 rounded-xl text-xs font-black transition-all">المنتجات</button>
                <button @click="invTab = 'purchases'" :class="invTab === 'purchases' ? 'bg-blue-600 text-white' : 'text-slate-500'" class="flex-1 py-2 rounded-xl text-xs font-black transition-all">أوامر الشراء</button>
                <button @click="invTab = 'suppliers'" :class="invTab === 'suppliers' ? 'bg-blue-600 text-white' : 'text-slate-500'" class="flex-1 py-2 rounded-xl text-xs font-black transition-all">الموردين</button>
            </div>

            <div x-show="invTab === 'products'" class="space-y-3">
                <div class="flex gap-2">
                    <button @click="openProductModal('صنف عام')" class="flex-1 bg-emerald-50 text-emerald-700 p-3 rounded-xl font-black text-xs border border-emerald-100"><i class="fa-solid fa-plus ml-1"></i> إضافة منتج</button>
                    <button @click="showStockTransferModal = true" class="flex-1 bg-purple-50 text-purple-700 p-3 rounded-xl font-black text-xs border border-purple-100"><i class="fa-solid fa-truck-moving ml-1"></i> تحويل مخزني</button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center bg-slate-50">
                        <input type="text" x-model="invSearch" placeholder="ابحث باسم المنتج..." class="w-full p-2 bg-white border rounded-lg text-xs font-bold outline-none">
                    </div>
                    <table class="w-full text-[10px] text-right">
                        <thead class="bg-slate-50 text-slate-500 font-black border-b">
                            <tr><th class="p-3">المنتج</th><th class="p-3 text-center">السعر</th><th class="p-3 text-center">الكمية</th></tr>
                        </thead>
                        <tbody class="divide-y">
                            <template x-for="item in processedInventory">
                                <tr @click="openInventoryProduct(item)" class="cursor-pointer hover:bg-slate-50">
                                    <td class="p-3 font-black"><div x-text="item.Product_Name"></div></td>
                                    <td class="p-3 text-center font-black text-blue-600 tabular-nums" x-text="item.Selling_Price + ' ج'"></td>
                                    <td class="p-3 text-center font-black tabular-nums" :class="item.Stock <= (item.Min_Stock||1) ? 'text-red-600 bg-red-50' : ''" x-text="item.Stock"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="invTab === 'purchases'" class="space-y-3">
                <button @click="showPurchaseOrderModal = true" class="w-full bg-slate-800 text-white p-3 rounded-xl font-black text-xs"><i class="fa-solid fa-file-invoice ml-1"></i> إنشاء أمر شراء جديد</button>
                <div class="bg-white p-6 rounded-2xl text-center text-slate-400 font-bold border border-dashed border-slate-200 text-xs">
                    قائمة أوامر الشراء تظهر هنا
                </div>
            </div>
        </div>

        <div x-show="currentTab === 'crm'" class="space-y-4 animate__animated animate__fadeIn">
             <div class="flex gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                <button @click="crmTab = 'customers'" :class="crmTab === 'customers' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="flex-1 py-2 rounded-xl text-xs font-black transition-all">العملاء</button>
                <button @click="crmTab = 'installments'" :class="crmTab === 'installments' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="flex-1 py-2 rounded-xl text-xs font-black transition-all">إدارة الأقساط</button>
            </div>

            <div x-show="crmTab === 'installments'" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl border shadow-sm">
                        <p class="text-[10px] text-slate-500 font-black">أقساط متأخرة</p>
                        <p class="text-lg font-black text-rose-600" x-text="getLateInstallmentsCount() + ' قسط'"></p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border shadow-sm">
                        <p class="text-[10px] text-slate-500 font-black">المحصل اليوم</p>
                        <p class="text-lg font-black text-emerald-600 tabular-nums">0 ج</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-3 bg-slate-50 border-b font-black text-xs text-slate-700"><i class="fa-solid fa-calendar-days ml-1"></i> جدول استحقاق الأقساط</div>
                    <template x-for="inst in activeInstallmentContracts">
                        <div @click="openInstallmentDetails(inst)" class="p-3 border-b border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                            <div>
                                <p class="font-black text-xs text-slate-800" x-text="inst.Customer"></p>
                                <p class="text-[9px] text-slate-400 font-bold" x-text="'باقي: ' + (inst.Total - inst.Paid).toLocaleString() + ' ج'"></p>
                            </div>
                            <span class="text-[9px] px-2 py-1 rounded bg-amber-50 text-amber-600 font-black">عرض الجدول</span>
                        </div>
                    </template>
                </div>
            </div>
            
            <div x-show="crmTab === 'customers'" class="space-y-3">
                 <button @click="showAddCustomerModal = true" class="w-full bg-indigo-50 text-indigo-700 p-3 rounded-xl font-black text-xs border border-indigo-100"><i class="fa-solid fa-user-plus ml-1"></i> عميل جديد</button>
                 <div class="bg-white rounded-2xl border border-slate-200 shadow-sm">
                     <template x-for="cust in getCRMList()">
                        <div @click="openCustomerProfile(cust)" class="p-4 border-b last:border-0 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><i class="fa-solid fa-user"></i></div>
                                <div>
                                    <p class="font-black text-sm text-slate-800" x-text="cust.name"></p>
                                    <p class="text-[10px] text-rose-500 font-bold" x-text="'مديونية: ' + cust.debt.toLocaleString() + ' ج'"></p>
                                </div>
                            </div>
                            <i class="fa-solid fa-chevron-left text-slate-300"></i>
                        </div>
                     </template>
                 </div>
            </div>
        </div>

        <div x-show="currentTab === 'management'" class="space-y-4 animate__animated animate__fadeIn">
            <button @click="showAccountingModal = true" class="w-full bg-teal-50 text-teal-700 p-4 rounded-[2rem] font-black text-sm flex items-center justify-between border border-teal-100 shadow-sm">
                <div class="flex items-center gap-3"><div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm"><i class="fa-solid fa-file-invoice"></i></div> المحاسبة والقيود اليومية</div>
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button @click="activeSection = activeSection === 3 ? null : 3" class="w-full bg-emerald-50 text-emerald-700 p-4 rounded-[2rem] font-black text-sm flex items-center justify-between border border-emerald-100 shadow-sm mt-3">
                <div class="flex items-center gap-3"><div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm"><i class="fa-solid fa-wallet"></i></div> إدارة المحافظ الإلكترونية</div>
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="p-4 bg-slate-100 rounded-2xl text-center text-[10px] font-bold text-slate-500">
                باقي خيارات الإدارة الأصلية محفوظة (المخزون، المستخدمين، التقارير)
            </div>
        </div>
    </main>

        <script>
// الرابط الأصلي لقاعدة البيانات (Google Apps Script) - لا تقم بتغييره
const API_URL = "https://script.google.com/macros/s/AKfycbwUZC4_3232nHjYrFZWY1Y8bEqBghvRkielumR9RTpj7AhmyF6aBFQME5edAKLAW19Y/exec";

function erpApp() {
    return {
        // ==========================================
        // 1. STATE & VARIABLES (Original + Extended)
        // ==========================================
        loading: false, 
        isLoggedIn: false, 
        user: { username: '', role: '' },
        currentTab: 'home', 
        fabOpen: false,
        toast: { show: false, message: '', type: 'success' },
        loginForm: { username: '', password: '' },
        search: '', 
        invSearch: '', 
        posFilter: 'all', 
        invFilter: 'all',
        
        // Data Store
        data: { 
            Inventory: [], 
            Maintenance: [], 
            Wallets: [], 
            Sales: [], 
            Settings: [], 
            Users: [], 
            Expenses: [], 
            Customers: [] 
        },
        
        // Cart & POS
        cart: [], 
        showCart: false,
        checkout: { 
            customer: '', 
            type: 'Cash', 
            paid: '', 
            walletName: '', 
            discount: 0, 
            updateCashOrWallet: true, 
            months: 1, 
            downpaymentType: 'Cash', 
            interestRate: 0, 
            durationCycle: 'monthly' 
        },
        
        shopCash: 0,
        activeSection: null, // For accordions

        // --- NEW ERP PRO STATE ---
        isOnline: navigator.onLine,
        offlineQueue: [],
        invTab: 'products', 
        crmTab: 'customers',
        
        // Modals
        showAccountingModal: false, 
        showPurchaseOrderModal: false, 
        showStockTransferModal: false,
        showCustomerProfileModal: false, 
        showInstallmentDetailsModal: false,
        
        // Selections
        selectedCustomer: null, 
        selectedInstallment: null,

        // Navigation Tabs
        tabs: [
            { id: 'home', name: 'الرئيسية', icon: 'fa-solid fa-house' },
            { id: 'operations', name: 'نقطة بيع', icon: 'fa-solid fa-cash-register' },
            { id: 'inventory', name: 'المخزون', icon: 'fa-solid fa-boxes-stacked' },
            { id: 'crm', name: 'العملاء والأقساط', icon: 'fa-solid fa-users' },
            { id: 'management', name: 'الإدارة', icon: 'fa-solid fa-layer-group' }
        ],

        // ==========================================
        // 2. INITIALIZATION & CORE FUNCTIONS
        // ==========================================
        init() {
            // Offline/Online Listeners
            window.addEventListener('online', () => { 
                this.isOnline = true; 
                this.syncOfflineQueue(); 
            });
            window.addEventListener('offline', () => {
                this.isOnline = false;
                this.showToast('أنت الآن في وضع عدم الاتصال', 'error');
            });
            
            // Load offline queue from LocalStorage
            const q = localStorage.getItem('2m_offline_queue');
            if(q) this.offlineQueue = JSON.parse(q);

            // Session check
            const saved = localStorage.getItem('2m_session'); 
            if (saved) { 
                try { 
                    this.user = JSON.parse(saved); 
                    this.isLoggedIn = true; 
                    this.fetchData(); 
                } catch (e) { 
                    this.logout(); 
                } 
            } 
        },

        showToast(message, type = 'success') {
            this.toast = { show: true, message, type };
            setTimeout(() => { this.toast.show = false; }, 3000);
        },

        showConfirm(msg, onConfirm) {
            if (confirm(msg)) onConfirm();
        },

        // ==========================================
        // 3. API & OFFLINE SYNC LOGIC
        // ==========================================
        async callApi(action, dataObj) {
            this.loading = true; 
            try { 
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action, data: dataObj }) 
                }); 
                const res = await response.json(); 
                this.loading = false; 
                return res; 
            } catch (error) { 
                this.loading = false; 
                this.showToast('خطأ في الاتصال بالخادم', 'error');
                return { success: false, error: error.message }; 
            } 
        },

        async safeCallApi(action, dataObj) {
            if(!this.isOnline) {
                // Queue the request if offline
                this.offlineQueue.push({ action, data: dataObj, timestamp: Date.now() });
                localStorage.setItem('2m_offline_queue', JSON.stringify(this.offlineQueue));
                this.showToast('تم الحفظ محلياً لعدم وجود إنترنت', 'error');
                return { success: true, offline: true };
            }
            return await this.callApi(action, dataObj);
        },

        async syncOfflineQueue() {
            if(this.offlineQueue.length === 0 || !this.isOnline) return;
            this.loading = true;
            this.showToast('جاري مزامنة العمليات المحفوظة...');
            
            for (let item of [...this.offlineQueue]) {
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: item.action, data: item.data }) });
                    this.offlineQueue.shift(); // Remove from queue only if successful
                    localStorage.setItem('2m_offline_queue', JSON.stringify(this.offlineQueue));
                } catch(e) { 
                    break; // Stop syncing to maintain execution order
                }
            }
            this.loading = false;
            this.fetchData();
        },

        // ==========================================
        // 4. AUTH & DATA FETCHING (Retained)
        // ==========================================
        async login() { 
            if (!this.loginForm.username) return this.showToast("أدخل بيانات الدخول", "error"); 
            const res = await this.callApi('login', this.loginForm); 
            if (res && res.success) { 
                this.user = res.user; 
                this.isLoggedIn = true; 
                localStorage.setItem('2m_session', JSON.stringify(res.user)); 
                this.fetchData(); 
            } else {
                this.showToast("بيانات الدخول غير صحيحة", "error");
            }
        },
        
        logout() { 
            localStorage.removeItem('2m_session'); 
            location.reload(); 
        },

        async fetchData() { 
            const res = await this.safeCallApi('getAllData'); 
            if (res && !res.error) { 
                this.data = res; 
                const cash = (res.Settings || []).find(s => s.Key === "Shop_Cash"); 
                this.shopCash = cash ? Number(cash.Value || 0) : 0;
            } 
        },

        async updateShopCash() {
            const currentCash = this.shopCash;
            const newCashStr = prompt('قم بتحديث إجمالي النقدية في الدرج:', currentCash);
            if(newCashStr !== null && !isNaN(newCashStr)) {
                await this.safeCallApi('updateSetting', { key: 'Shop_Cash', value: Number(newCashStr) });
                this.fetchData();
                this.showToast('تم تحديث النقدية بالدرج');
            }
        },

        // ==========================================
        // 5. POS & CART LOGIC (Enhanced)
        // ==========================================
        get filteredInventoryPOS() {
            let items = this.data.Inventory || [];
            if (this.search) {
                const s = this.search.toLowerCase();
                items = items.filter(i => 
                    (i.Product_Name && i.Product_Name.toLowerCase().includes(s)) || 
                    (i.Code && i.Code.toString().includes(s))
                );
            }
            if (this.posFilter === 'new') items = items.filter(i => i.Category === 'هاتف جديد');
            if (this.posFilter === 'used') items = items.filter(i => i.Category === 'هاتف مستعمل');
            return items;
        },

        get processedInventory() {
            let items = this.data.Inventory || [];
            if (this.invSearch) {
                const s = this.invSearch.toLowerCase();
                items = items.filter(i => (i.Product_Name && i.Product_Name.toLowerCase().includes(s)));
            }
            if (this.invFilter === 'shortages') {
                items = items.filter(i => Number(i.Stock) <= Number(i.Min_Stock || 1));
            }
            return items;
        },

        addToCart(product) { 
            if (product.Stock <= 0) return this.showToast('عفواً، نفد المخزن', 'error'); 
            const item = this.cart.find(c => c.code === product.Code); 
            if (item) {
                if(item.qty >= product.Stock) return this.showToast('الحد الأقصى للمخزون', 'error');
                item.qty++; 
            } else {
                this.cart.push({ code: product.Code, name: product.Product_Name, price: product.Selling_Price, qty: 1, cost: product.Cost_Price }); 
            }
            this.checkout.paid = this.netCartTotal(); 
            this.showToast('تمت الإضافة للسلة');
        },

        get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.qty), 0); },
        netCartTotal() { return Math.max(0, this.cartTotal - (Number(this.checkout.discount) || 0)); },

        // ==========================================
        // 6. INSTALLMENTS & FINANCIAL MATH
        // ==========================================
        calculateInstallmentValue() {
            let principal = this.netCartTotal() - (Number(this.checkout.paid) || 0);
            if (principal <= 0) return 0;
            let interest = principal * ((Number(this.checkout.interestRate) || 0) / 100);
            let totalToPay = principal + interest;
            let count = Number(this.checkout.months) || 1;
            return Math.ceil(totalToPay / count);
        },

        generateInstallmentSchedule(instData) {
            if(!instData) return [];
            let count = Number(instData.Months || 1); 
            let amount = Math.ceil((Number(instData.Total) - Number(instData.Paid)) / count);
            let schedule = [];
            let start = new Date(instData.Date || new Date());
            
            for(let i=1; i<=count; i++) {
                let d = new Date(start);
                // Assume monthly for simplicity unless durationCycle was saved
                d.setMonth(d.getMonth() + i); 
                let isLate = d < new Date() && (amount * i) > Number(instData.Paid);
                schedule.push({ 
                    date: d.toISOString().split('T')[0], 
                    amount: amount, 
                    status: isLate ? 'late' : 'pending' 
                });
            }
            return schedule;
        },

        async confirmSaleAdvanced() {
            if (!this.cart.length) return;
            const finalTotal = this.netCartTotal();
            
            const saleData = { 
                total: finalTotal, 
                discount: this.checkout.discount,
                paid: this.checkout.paid === '' ? finalTotal : this.checkout.paid, 
                customer: this.checkout.customer || 'عميل نقدي', 
                paymentType: this.checkout.type, 
                Payment_Type: this.checkout.type, 
                walletName: this.checkout.walletName, 
                updateCashOrWallet: this.checkout.updateCashOrWallet, 
                items: this.cart, 
                user: this.user.username, 
                // Installment specific data
                months: this.checkout.months,
                interestRate: this.checkout.interestRate,
                durationCycle: this.checkout.durationCycle,
                downpaymentType: this.checkout.downpaymentType
            };
            
            this.showConfirm('تأكيد إتمام الفاتورة والعملية نهائياً؟', async () => {
                const res = await this.safeCallApi('processSale', saleData);
                if(res.success !== false) {
                    this.cart = []; 
                    this.showCart = false; 
                    // Reset Checkout Form
                    this.checkout = { customer: '', type: 'Cash', paid: '', discount: 0, walletName: '', updateCashOrWallet: true, months: 1, interestRate: 0, durationCycle: 'monthly', downpaymentType: 'Cash' }; 
                    this.fetchData();
                    this.showToast('تم تسجيل الفاتورة بنجاح');
                }
            });
        },

        // ==========================================
        // 7. CRM & INSTALLMENT MANAGEMENT
        // ==========================================
        get activeInstallmentContracts() {
            return (this.data.Sales || []).filter(s => s.Payment_Type === 'Installment' && (Number(s.Total) - Number(s.Paid)) > 0).reverse();
        },
        
        getTotalRemainingInstallments() {
            return this.activeInstallmentContracts.reduce((sum, s) => sum + (Number(s.Total) - Number(s.Paid)), 0);
        },
        
        getLateInstallmentsCount() {
            const now = new Date();
            return this.activeInstallmentContracts.filter(s => {
                let d = new Date(s.Date);
                let diffTime = Math.abs(now - d);
                let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                return diffDays > 30; // Flag as late if > 30 days old (Can be enhanced based on actual schedule array)
            }).length;
        },
        
        openInstallmentDetails(inst) {
            this.selectedInstallment = inst;
            this.showInstallmentDetailsModal = true;
        },
        
        async paySingleInstallment(inst, amountToPay) {
            this.showConfirm(`تأكيد تحصيل مبلغ ${amountToPay} ج من القسط؟`, async () => {
                await this.safeCallApi('updateSalePayment', { saleId: inst.ID, paid: Number(inst.Paid) + amountToPay });
                this.showInstallmentDetailsModal = false;
                this.fetchData();
                this.showToast('تم التحصيل بنجاح');
            });
        },

        getCRMList() {
            let clients = {};
            (this.data.Sales || []).forEach(s => {
                if(s.Customer && s.Customer !== 'عميل نقدي') {
                    if(!clients[s.Customer]) clients[s.Customer] = { name: s.Customer, debt: 0, totalPurchases: 0 };
                    clients[s.Customer].totalPurchases += Number(s.Total);
                    if(['Credit', 'Installment'].includes(s.Payment_Type)) {
                        clients[s.Customer].debt += Math.max(0, Number(s.Total) - Number(s.Paid));
                    }
                }
            });
            return Object.values(clients);
        },
        
        openCustomerProfile(cust) {
            this.selectedCustomer = cust;
            this.showCustomerProfileModal = true;
        },
        
        getCustomerStats() {
            if(!this.selectedCustomer) return { totalPurchases: 0, debt: 0 };
            return this.getCRMList().find(c => c.name === this.selectedCustomer.name) || { totalPurchases: 0, debt: 0 };
        },
        
        getCustomerHistory() {
            if(!this.selectedCustomer) return [];
            return (this.data.Sales || []).filter(s => s.Customer === this.selectedCustomer.name).reverse();
        },

        // ==========================================
        // 8. DASHBOARD METRICS & FEED
        // ==========================================
        getTotalWalletBalance() {
            return (this.data.Wallets || []).reduce((sum, w) => sum + Number(w.Balance || 0), 0);
        },

        getTotalSales(category = null) {
            const today = new Date().toISOString().split('T')[0];
            let sales = (this.data.Sales || []).filter(s => s.Date.startsWith(today));
            // Category filtering logic can be expanded based on your item structure
            return sales.reduce((sum, s) => sum + Number(s.Total || 0), 0);
        },

        getFilteredProfits() {

            let profits = { newPhone: 0, usedPhone: 0, general: 0, wallet: 0 };
            (this.data.Sales || []).forEach(s => {
                // Calculate logic here based on saved Items JSON in the Sale record

        },

        getRecentActivity() {
            let feed = [];
            (this.data.Sales || []).slice(-3).forEach(s => feed.push({ type: 'in', desc: 'فاتورة مبيعات - ' + s.Customer, time: s.Date.split('T')[0], amount: '+' + s.Total, icon: 'fa-solid fa-cart-shopping' }));
            (this.data.Expenses || []).slice(-2).forEach(e => feed.push({ type: 'out', desc: 'مصروف - ' + (e.Description||''), time: e.Date.split('T')[0], amount: '-' + e.Amount, icon: 'fa-solid fa-money-bill-transfer' }));
            return feed.sort((a,b) => new Date(b.time) - new Date(a.time)).slice(0, 5);
        },
