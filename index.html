<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abo yahia | صاحبي</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s;
        }

        [x-cloak] {
            display: none !important;
        }

        .tab-active {
            color: #2563eb;
            transform: translateY(-3px);
            font-weight: 900;
            border-top: 3px solid #2563eb;
            padding-top: 8px;
        }

        .modal-bg {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body x-data="erpApp()" x-init="initApp()" class="bg-slate-50 text-slate-900"
    :class="isDark ? 'dark bg-slate-950 text-white' : ''">

    <div x-show="loading" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center modal-bg text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="font-black animate-pulse">جاري تحديث البيانات من Google Sheets...</p>
    </div>

    <header
        class="fixed top-0 w-full z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1 class="font-black text-lg">أبو يحي <span class="text-blue-600">Abo yahia</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button @click="isDark = !isDark" class="p-2 text-slate-500"><i class="fa-solid"
                    :class="isDark ? 'fa-sun text-yellow-400' : 'fa-moon'"></i></button>
            <button @click="fetchData()" class="p-2 text-blue-600 bg-blue-50 dark:bg-blue-900/30 rounded-full">
                <i class="fa-solid fa-sync-alt" :class="loading ? 'animate-spin' : ''"></i>
            </button>
        </div>
    </header>

    <nav
        class="fixed bottom-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t dark:border-slate-800 z-50 pb-6 pt-2 shadow-2xl">
        <div class="flex justify-around items-center px-2">
            <template x-for="tab in tabs" :key="tab.id">
                <button @click="currentTab = tab.id" class="flex flex-col items-center min-w-[50px] transition-all"
                    :class="currentTab === tab.id ? 'tab-active' : 'text-slate-400'">
                    <i :class="tab.icon" class="text-lg mb-1"></i>
                    <span class="text-[9px] font-black" x-text="tab.name"></span>
                </button>
            </template>
        </div>
    </nav>

    <main class="pt-20 pb-32 px-4 max-w-4xl mx-auto min-h-screen">

        <div x-show="currentTab === 'reports'" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-5 rounded-[2rem] text-white shadow-xl">
                    <p class="text-[10px] font-bold opacity-80 mb-1">مبيعات اليوم</p>
                    <h3 class="text-2xl font-black tabular-nums" x-text="(stats.todaySales || 0) + ' ج'"></h3>
                </div>
                <div class="bg-gradient-to-br from-red-500 to-red-700 p-5 rounded-[2rem] text-white shadow-xl">
                    <p class="text-[10px] font-bold opacity-80 mb-1">إجمالي الديون</p>
                    <h3 class="text-2xl font-black tabular-nums" x-text="(stats.totalDebts || 0) + ' ج'"></h3>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button @click="openWalletModal('وارد')"
                    class="bg-emerald-500 text-white p-4 rounded-3xl font-black text-xs shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus-circle text-lg"></i> تسجيل وارد (إيداع)
                </button>
                <button @click="openWalletModal('صادر')"
                    class="bg-rose-500 text-white p-4 rounded-3xl font-black text-xs shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-minus-circle text-lg"></i> تسجيل صادر (سحب)
                </button>
            </div>
            <h4 class="font-black text-slate-600 dark:text-slate-400 flex items-center gap-2 px-1">
                <i class="fa-solid fa-wallet text-blue-600"></i> ملخص المحافظ
            </h4>

            <template x-for="wName in ['VodafoneCash', 'Insta', 'EtisalatCash']">
                <div
                    class="bg-white dark:bg-slate-800 rounded-[2rem] p-5 shadow-sm border dark:border-slate-700 transition-all">
                    <div class="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-3">
                        <span class="font-black text-lg" x-text="wName"></span>
                        <span class="text-xl font-black tabular-nums"
                            :class="calcWallet(wName).balance >= 0 ? 'text-emerald-500' : 'text-red-500'"
                            x-text="(calcWallet(wName).balance || 0).toLocaleString() + ' ج'"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div
                            class="bg-emerald-50/50 dark:bg-emerald-900/10 p-3 rounded-2xl text-center border border-emerald-100 dark:border-emerald-800/20">
                            <p class="text-[9px] font-bold text-emerald-600 mb-1">وارد (+)</p>
                            <p class="font-black text-emerald-700 dark:text-emerald-400 tabular-nums"
                                x-text="(calcWallet(wName).in || 0).toLocaleString()"></p>
                        </div>
                        <div
                            class="bg-red-50/50 dark:bg-red-900/10 p-3 rounded-2xl text-center border border-red-100 dark:border-red-800/20">
                            <p class="text-[9px] font-bold text-red-600 mb-1">صادر (-)</p>
                            <p class="font-black text-red-700 dark:text-red-400 tabular-nums"
                                x-text="(calcWallet(wName).out || 0).toLocaleString()"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="currentTab === 'pos'" class="space-y-4">
            <div class="relative">
                <input type="text" x-model="searchQuery" placeholder="ابحث عن منتج أو باركود..."
                    class="w-full p-4 pr-12 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border dark:border-slate-700 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <template x-for="item in filteredInventory">
                    <div @click="addToCart(item)"
                        class="bg-white dark:bg-slate-800 p-4 rounded-3xl border-2 border-transparent active:border-blue-500 shadow-sm relative overflow-hidden transition-all">
                        <div x-show="item.Stock <= 0"
                            class="absolute inset-0 bg-white/60 dark:bg-slate-900/60 z-10 flex items-center justify-center">
                            <span class="bg-red-600 text-white px-3 py-1 rounded-full text-[10px] font-black">نفد من
                                المخزن</span>
                        </div>
                        <h4 class="font-black text-xs mb-3 truncate" x-text="item.Product_Name"></h4>
                        <div class="flex justify-between items-end">
                            <span class="text-blue-600 font-black text-sm" x-text="item.Selling_Price + ' ج'"></span>
                            <span class="text-[9px] text-slate-400 font-bold" x-text="'المخزون: ' + item.Stock"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentTab === 'inventory'" class="space-y-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-slate-600 dark:text-slate-400">قائمة المنتجات</h3>
                <button @click="openProductModal()"
                    class="bg-blue-600 text-white px-4 py-2 rounded-2xl font-black text-xs shadow-lg active:scale-90 transition-all">
                    <i class="fa-solid fa-plus ml-1"></i> منتج جديد
                </button>
            </div>

            <div class="grid gap-3">
                <template x-for="item in filteredInventory" :key="item.Code">
                    <div @click="openProductModal(item)"
                        class="bg-white dark:bg-slate-800 p-4 rounded-3xl border dark:border-slate-700 flex justify-between items-center shadow-sm active:scale-95 cursor-pointer">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-10 h-10 bg-slate-100 dark:bg-slate-700 rounded-xl flex items-center justify-center text-blue-600">
                                <i class="fa-solid fa-box"></i>
                            </div>
                            <div>
                                <h4 class="font-black text-xs" x-text="item.Product_Name"></h4>
                                <p class="text-[9px] text-slate-400 font-bold" x-text="'كود: ' + item.Code"></p>
                            </div>
                        </div>
                        <div class="text-left">
                            <p class="text-blue-600 font-black text-sm" x-text="item.Selling_Price + ' ج'"></p>
                            <p class="text-[9px] font-bold"
                                :class="item.Stock <= item.Min_Limit ? 'text-rose-500' : 'text-emerald-500'"
                                x-text="'المخزن: ' + item.Stock"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentTab === 'wallets'" class="space-y-4">

            <div
                class="bg-white dark:bg-slate-900 p-5 rounded-[2.5rem] shadow-sm border dark:border-slate-800 space-y-4">
                <h3 class="font-black text-blue-600 text-sm mb-2"><i class="fa-solid fa-filter ml-2"></i>فلتر المعاملات
                    الذكي</h3>

                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <input type="text" x-model="walletSearch" placeholder="بحث بالاسم أو الملاحظات..."
                            class="w-full p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none text-xs font-bold">
                    </div>

                    <select x-model="filterWalletName"
                        class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none text-xs font-bold">
                        <option value="">كل المحافظ</option>
                        <option value="VodafoneCash">فودافون كاش</option>
                        <option value="Insta">انستا باي</option>
                        <option value="EtisalatCash">اتصالات كاش</option>
                    </select>

                    <select x-model.number="displayLimit"
                        class="p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none text-xs font-bold">
                        <option value="10">أخر 10 عمليات</option>
                        <option value="20">أخر 20 عملية</option>
                        <option value="50">أخر 50 عملية</option>
                        <option value="100000">الكل</option>
                    </select>

                    <div>
                        <label class="block text-[8px] font-black text-slate-400 mr-2">من تاريخ</label>
                        <input type="date" x-model="filterDateFrom"
                            class="w-full p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none text-xs font-bold">
                    </div>

                    <div>
                        <label class="block text-[8px] font-black text-slate-400 mr-2">إلى تاريخ</label>
                        <input type="date" x-model="filterDateTo"
                            class="w-full p-3 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none text-xs font-bold">
                    </div>
                </div>

                <button
                    @click="walletSearch=''; filterWalletName=''; filterDateFrom=''; filterDateTo=''; displayLimit=20"
                    class="w-full py-2 text-[10px] font-black text-rose-500 bg-rose-50 dark:bg-rose-900/20 rounded-xl">
                    إعادة تعيين الفلتر
                </button>
            </div>

            <div class="space-y-3">
                <template x-for="(tx, index) in filteredWallets" :key="index">
                    <div
                        class="bg-white dark:bg-slate-800 p-4 rounded-[1.8rem] shadow-sm border dark:border-slate-700 flex justify-between items-center transition-all">
                        <div class="flex items-center gap-3">
                            <div :class="(tx.Type === 'وارد' || tx.type === 'وارد') ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'"
                                class="w-10 h-10 rounded-full flex items-center justify-center text-sm shadow-inner">
                                <i
                                    :class="(tx.Type === 'وارد' || tx.type === 'وارد') ? 'fa-solid fa-arrow-down' : 'fa-solid fa-arrow-up'"></i>
                            </div>
                            <div>
                                <h4 class="font-black text-xs" x-text="tx.Wallet_Name || tx.wallet"></h4>
                                <p class="text-[9px] text-slate-400 font-bold">
                                    <span x-text="formatDate(tx.Date || tx.date)"></span>
                                    <span class="mx-1 font-light opacity-50">|</span>
                                    <span x-text="tx.Notes || tx.notes || 'بدون ملاحظات'"></span>
                                </p>
                            </div>
                        </div>
                        <div class="text-left">
                            <span
                                :class="(tx.Type === 'وارد' || tx.type === 'وارد') ? 'text-emerald-500' : 'text-rose-500'"
                                class="font-black text-sm tabular-nums"
                                x-text="((tx.Type === 'وارد' || tx.type === 'وارد') ? '+' : '-') + (tx.Amount || tx.amount || 0) + ' ج'"></span>
                        </div>
                    </div>
                </template>

                <div x-show="filteredWallets.length === 0" class="text-center py-10 opacity-40">
                    <i class="fa-solid fa-folder-open text-4xl mb-2"></i>
                    <p class="text-xs font-black">لا توجد معاملات تطابق هذا البحث</p>
                </div>
            </div>
        </div>

        <div x-show="currentTab === 'crm'" class="space-y-4">
            <div class="relative mb-4">
                <input type="text" x-model="crmSearch" placeholder="ابحث عن عميل..."
                    class="w-full p-4 pr-12 rounded-2xl bg-white dark:bg-slate-800 shadow-sm font-bold border dark:border-slate-700 outline-none">
                <i class="fa-solid fa-user-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
            <div class="space-y-3">
                <template x-for="person in filteredCrm">
                    <div @click="openCustomerDetails(person.Name)"
                        class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] shadow-sm border dark:border-slate-700 flex justify-between items-center active:scale-95 transition-transform cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-2xl flex items-center justify-center font-black text-lg"
                                x-text="person.Name.charAt(0)"></div>
                            <div>
                                <h4 class="font-black text-sm" x-text="person.Name"></h4>
                                <p class="text-[10px] text-slate-400 font-bold italic"
                                    x-text="'تحديث: ' + formatDate(person.Last_Update)"></p>
                            </div>
                        </div>
                        <div class="text-left">
                            <span class="text-red-500 font-black text-xl block tabular-nums"
                                x-text="person.Total_Debt + ' ج'"></span>
                            <span class="text-[9px] font-black text-blue-600 uppercase tracking-tighter">كشف
                                الحساب</span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentTab === 'sales_report'" class="space-y-6">
            <div
                class="bg-white dark:bg-slate-800 p-5 rounded-[2.5rem] shadow-sm border dark:border-slate-700 space-y-4">
                <h4 class="font-black text-blue-600 flex items-center gap-2"><i class="fa-solid fa-filter"></i> فلاتر
                    البحث</h4>
                <div class="grid grid-cols-2 gap-3">
                    <select x-model="salesReportFilter.type"
                        class="col-span-2 p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl font-bold border-none outline-none">
                        <option value="today">مبيعات اليوم</option>
                        <option value="month">الشهر الحالي</option>
                        <option value="custom">فترة مخصصة (من-إلى)</option>
                    </select>
                    <template x-if="salesReportFilter.type === 'custom'">
                        <div class="contents">
                            <input type="date" x-model="salesReportFilter.start"
                                class="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl font-bold text-xs">
                            <input type="date" x-model="salesReportFilter.end"
                                class="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl font-bold text-xs">
                        </div>
                    </template>
                </div>
            </div>

            <div class="bg-blue-600 text-white p-6 rounded-[2rem] flex justify-between items-center shadow-lg">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase">إجمالي المبيعات</p>
                    <h3 class="text-2xl font-black tabular-nums" x-text="filteredSalesReport.total + ' ج'"></h3>
                </div>
                <div class="text-left">
                    <p class="text-[10px] font-bold opacity-80 uppercase">عدد العمليات</p>
                    <h3 class="text-2xl font-black tabular-nums" x-text="filteredSalesReport.count"></h3>
                </div>
            </div>

            <div class="space-y-3">
                <template x-for="s in filteredSalesReport.data" :key="s.Invoice_ID">
                    <div
                        class="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 flex justify-between items-center">
                        <div>
                            <p class="font-black text-xs mb-1" x-text="s.Customer_Name"></p>
                            <p class="text-[9px] text-slate-400 font-bold"
                                x-text="formatDate(s.Date_Time) + ' | ' + s.Invoice_ID"></p>
                        </div>
                        <div class="text-left font-black">
                            <span class="text-blue-600 text-sm" x-text="s.Total_Amount + ' ج'"></span>
                            <span
                                :class="s.Payment_Type === 'cash' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'"
                                class="text-[8px] px-2 py-0.5 rounded-full block mt-1 text-center"
                                x-text="s.Payment_Type === 'cash' ? 'كاش' : 'آجل'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <div x-show="showCartDrawer" x-cloak class="fixed inset-0 z-[200]">
        <div @click="showCartDrawer = false" class="absolute inset-0 modal-bg"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-slate-900 rounded-t-[3rem] p-6 max-h-[90vh] flex flex-col shadow-2xl transition-all"
            x-transition:enter="transform translate-y-full" x-transition:enter-end="transform translate-y-0">
            <div class="w-16 h-1 bg-slate-200 dark:bg-slate-800 rounded-full mx-auto mb-6"></div>
            <h3 class="text-2xl font-black mb-6 flex items-center gap-2"><i
                    class="fa-solid fa-shopping-bag text-blue-600"></i> مراجعة السلة</h3>
            <div class="flex-1 overflow-y-auto space-y-4 mb-6 custom-scroll pr-2">
                <template x-for="(ci, index) in cart">
                    <div
                        class="bg-slate-50 dark:bg-slate-800 p-4 rounded-3xl flex justify-between items-center border dark:border-slate-700">
                        <div class="flex-1">
                            <p class="font-black text-sm mb-2" x-text="ci.name"></p>
                            <div class="flex items-center gap-4">
                                <div class="flex items-center bg-white dark:bg-slate-700 rounded-xl p-1 shadow-inner">
                                    <button @click="if(ci.qty > 1) ci.qty--"
                                        class="w-8 h-8 font-black text-lg">-</button>
                                    <span class="px-3 font-black text-sm tabular-nums" x-text="ci.qty"></span>
                                    <button @click="ci.qty++" class="w-8 h-8 font-black text-lg">+</button>
                                </div>
                                <span class="font-black text-blue-600 tabular-nums" x-text="ci.price + ' ج'"></span>
                            </div>
                        </div>
                        <button @click="cart.splice(index, 1)"
                            class="w-10 h-10 text-red-500 bg-red-50 dark:bg-red-900/20 rounded-xl"><i
                                class="fa-solid fa-trash"></i></button>
                    </div>
                </template>
            </div>
            <div class="space-y-4 border-t dark:border-slate-800 pt-6">
                <div class="flex justify-between items-center text-2xl font-black text-blue-600">
                    <span>الإجمالي</span>
                    <span class="tabular-nums" x-text="cartTotal + ' ج'"></span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" x-model="customerName" placeholder="اسم العميل (اختياري)"
                        class="col-span-2 p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 font-bold border-none outline-none">
                    <select x-model="paymentType"
                        class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 font-bold border-none outline-none">
                        <option value="cash">نقدي (كاش)</option>
                        <option value="credit">آجل (مديونية)</option>
                    </select>
                    <input x-show="paymentType === 'credit'" type="number" x-model.number="paidAmount"
                        placeholder="المدفوع حالياً"
                        class="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 font-bold text-blue-600 border-none outline-none">
                </div>
                <button @click="processSale()"
                    class="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all">تأكيد
                    البيع</button>
            </div>
        </div>
    </div>

    <div x-show="showCustomerModal" x-cloak
        class="fixed inset-0 z-[300] flex items-end sm:items-center justify-center p-0 sm:p-4 modal-bg">
        <div
            class="bg-white dark:bg-slate-900 w-full max-w-lg h-[85vh] sm:h-auto rounded-t-[3rem] sm:rounded-[3rem] p-6 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="text-2xl font-black text-blue-600" x-text="selectedCustomer"></h3>
                    <p class="text-xs font-bold text-slate-400">إدارة فواتير ومديونية العميل</p>
                </div>
                <button @click="showCustomerModal = false"

    <script>
        function erpApp() {
            return {
                showProductModal: false,
                editProd: { isNew: true, Code: '', Product_Name: '', Cost_Price: 0, Selling_Price: 0, Stock: 0, Min_Limit: 5 },
                walletSearch: '',       // البحث بالاسم أو الملاحظات
                filterWalletName: '',   // فلتر بنوع المحفظة (فودافون، انستا، إلخ)
                filterDateFrom: '',     // التاريخ من
                filterDateTo: '',       // التاريخ إلى
                displayLimit: 20,
                // 1. أضف هذه المتغيرات في بداية erpApp()
                showWalletModal: false,
                newTx: { wallet: 'VodafoneCash', type: 'وارد', amount: null, notes: '' },

                // 2. أضف هذه الدوال داخل erpApp()
                openWalletModal(type) {
                    this.newTx = { wallet: 'VodafoneCash', type: type, amount: null, notes: '' };
                    this.showWalletModal = true;
                },

                async submitWalletTx() {
                    if (!this.newTx.amount || this.newTx.amount <= 0) return;

                    this.loading = true;
                    try {
                        const payload = {
                            action: 'addWalletTx', // الأكشن الموجود في السيرفر القديم
                            data: {
                                wallet: this.newTx.wallet,
                                type: this.newTx.type,
                                amount: this.newTx.amount,
                                notes: this.newTx.notes
                            }
                        };

                        const res = await fetch(this.scriptURL, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });

                        const result = await res.json();
                        if (result.success) {
                            this.showWalletModal = false;
                            await this.fetchData(); // تحديث الأرقام في الرئيسية فوراً
                            alert("تم تسجيل المعاملة بنجاح");
                        }
                    } catch (e) {
                        alert("فشل الاتصال بالسيرفر");
                    } finally {
                        this.loading = false;
                    }
                },
                // أضف هذه الدوال
                openProductModal(item = null) {
                    if (item) {
                        // في حالة التعديل: نقوم بنسخ بيانات المنتج الموجودة
                        // مع العلم أن الأسماء في المخزن هي (Product_Name, Code, etc)
                        this.editProd = {
                            isNew: false,
                            Code: item.Code,
                            Product_Name: item.Product_Name,
                            Cost_Price: item.Cost_Price,
                            Selling_Price: item.Selling_Price,
                            Stock: item.Stock,
                            Min_Limit: item.Min_Limit || 5
                        };
                    } else {
                        // في حالة إضافة منتج جديد: نصفر القيم
                        this.editProd = {
                            isNew: true,
                            Code: '',
                            Product_Name: '',
                            Cost_Price: 0,
                            Selling_Price: 0,
                            Stock: 0,
                            Min_Limit: 5
                        };
                    }
                    this.showProductModal = true;
                },
                async saveProduct() {
                    // التحقق من إدخال البيانات الأساسية
                    if (!this.editProd.Code || !this.editProd.Product_Name) {
                        alert("يرجى إدخال كود واسم المنتج");
                        return;
                    }

                    this.loading = true;
                    try {
                        // التحويل للمسميات التي يطلبها السيرفر القديم في دالة updateInventoryItem
                        const mappedData = {
                            code: this.editProd.Code,
                            name: this.editProd.Product_Name,
                            cost: this.editProd.Cost_Price,
                            price: this.editProd.Selling_Price,
                            stock: this.editProd.Stock
                            // ملاحظة: السيرفر القديم لا يستقبل Min_Limit في دالة التعديل الحالية
                        };

                        const res = await fetch(this.scriptURL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'updateInventory',
                                data: mappedData
                            })
                        });

                        const result = await res.json();

                        if (result.success) {
                            this.showProductModal = false; // إغلاق النافذة
                            await this.fetchData(); // تحديث البيانات فوراً في الواجهة
                            alert("تم حفظ البيانات بنجاح");
                        } else {
                            alert("حدث خطأ في السيرفر: " + result.error);
                        }
                    } catch (e) {
                        console.error("Save Error:", e);
                        alert("فشل الاتصال بالسيرفر");
                    } finally {
                        this.loading = false;
                    }
                },
                async deleteProduct() {
                    if (!confirm("هل أنت متأكد من حذف هذا المنتج نهائياً من المخزن؟")) return;

                    this.loading = true;
                    try {
                        const payload = {
                            action: 'deleteRow',
                            data: {
                                sheet: "Inventory",
                                colIndex: 0, // العمود الأول الذي يحتوي على الكود
                                value: this.editProd.Code
                            }
                        };

                        const res = await fetch(this.scriptURL, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });

                        const result = await res.json();
                        if (result.success) {
                            this.showProductModal = false;
                            await this.fetchData();
                            alert("تم حذف المنتج بنجاح");
                        }
                    } catch (e) {
                        alert("حدث خطأ أثناء الحذف");
                    } finally {
                        this.loading = false;
                    }
                },
                isDark: false, loading: false, currentTab: 'reports',
                scriptURL: 'https://script.google.com/macros/s/AKfycbxOmkO961-II0fBnVQHzy4Wuu13HJLuSAXN5b1WClBV5s_43XR7A5Rza2cuG3HJgXAPlA/exec',

                // مخازن البيانات
                inventory: [], sales: [], wallets: [], crm: [], cart: [],

                // حالات البحث والتحكم
                searchQuery: '', crmSearch: '', customerName: '', paymentType: 'cash', paidAmount: 0,
                showCartDrawer: false, showAddProductModal: false, showAddWalletModal: false,
                showCustomerModal: false, showEditInvoiceModal: false,
                selectedCustomer: '', customerInvoices: [],
                editInvData: { id: '', total: 0, paid: 0 },
                salesReportFilter: { type: 'today', start: '', end: '' },

                tabs: [
                    { id: 'reports', name: 'الرئيسية', icon: 'fa-solid fa-house' },
                    { id: 'pos', name: 'البيع', icon: 'fa-solid fa-cash-register' },
                    { id: 'inventory', name: 'المخزن', icon: 'fa-solid fa-boxes-stacked' },
                    { id: 'wallets', name: 'المحافظ', icon: 'fa-solid fa-wallet' },
                    { id: 'crm', name: 'الديون', icon: 'fa-solid fa-user-clock' },
                    { id: 'sales_report', name: 'المبيعات', icon: 'fa-solid fa-chart-pie' }
                ],

                async initApp() {
                    if (window.matchMedia('(prefers-color-scheme: dark)').matches) this.isDark = true;
                    await this.fetchData();
                },

                async fetchData() {
                    this.loading = true;
                    try {
                        const res = await fetch(this.scriptURL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                        const data = await res.json();

                        this.inventory = data.inventory || [];
                        this.sales = data.sales || [];
                        this.crm = data.crm || [];

                        // تنظيف وتأمين مصفوفة المحافظ (لمنع undefined)
                        this.wallets = (data.wallets || []).map(w => ({
                            Wallet_Name: String(w.Wallet_Name || "").trim(),
                            Type: String(w.Type || "").trim(),
                            Amount: Number(w.Amount) || 0,
                            Date: w.Date,
                            Notes: w.Notes || ""
                        }));

                        console.log("تم تحديث البيانات بنجاح");
                    } catch (e) {
                        console.error("Fetch Error:", e);
                        alert("فشل الاتصال بالخادم. يرجى التحقق من رابط Script URL.");
                    }
                    this.loading = false;
                },

                // 1. منطق المحافظ (المُصلّح)
                calcWallet(name) {
                    if (!this.wallets || !Array.isArray(this.wallets)) return { in: 0, out: 0, balance: 0 };

                    const targetName = String(name).trim();
                    const txs = this.wallets.filter(w => w.Wallet_Name === targetName);

                    const win = txs.filter(w => w.Type === 'وارد').reduce((s, w) => s + w.Amount, 0);
                    const wout = txs.filter(w => w.Type === 'صادر').reduce((s, w) => s + w.Amount, 0);

                    return {
                        in: win,
                        out: wout,
                        balance: win - wout
                    };
                },

                // 2. منطق كشف حساب العميل وتعديله
                get filteredCrm() {
                    return this.crm.filter(c => c.Name.toLowerCase().includes(this.crmSearch.toLowerCase()));
                },

                openCustomerDetails(name) {
                    this.selectedCustomer = name;
                    this.customerInvoices = this.sales.filter(s => s.Customer_Name === name).reverse();
                    this.showCustomerModal = true;
                },

                openEditInvoice(inv) {
                    this.editInvData = { id: inv.Invoice_ID, total: Number(inv.Total_Amount), paid: Number(inv.Paid_Amount) };
                    this.showEditInvoiceModal = true;
                },

                async saveInvoiceEdit() {
                    this.loading = true;
                    try {
                        await fetch(this.scriptURL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'updateInvoiceData', data: this.editInvData })
                        });
                        this.showEditInvoiceModal = false;
                        await this.fetchData();
                        // تحديث القائمة الفرعية بعد جلب البيانات الجديدة
                        this.customerInvoices = this.sales.filter(s => s.Customer_Name === this.selectedCustomer).reverse();
                    } catch (e) { alert("فشل تحديث الفاتورة"); }
                    this.loading = false;
                },

                // 3. تقرير المبيعات المفلتر
                get filteredSalesReport() {
                    let list = this.sales.slice().reverse();
                    const now = new Date();
                    const todayStr = now.toLocaleDateString('en-CA');

                    if (this.salesReportFilter.type === 'today') {
                        list = list.filter(s => new Date(s.Date_Time).toLocaleDateString('en-CA') === todayStr);
                    } else if (this.salesReportFilter.type === 'month') {
                        list = list.filter(s => {
                            const d = new Date(s.Date_Time);
                            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                        });
                    } else if (this.salesReportFilter.type === 'custom' && this.salesReportFilter.start && this.salesReportFilter.end) {
                        const start = new Date(this.salesReportFilter.start);
                        const end = new Date(this.salesReportFilter.end);
                        end.setHours(23, 59, 59);
                        list = list.filter(s => {
                            const d = new Date(s.Date_Time);
                            return d >= start && d <= end;
                        });
                    }

                    return {
                        data: list,
                        total: list.reduce((s, i) => s + Number(i.Total_Amount), 0),
                        count: list.length
                    };
                },

                // 4. منطق البيع (POS)
                get filteredInventory() {
                    const q = this.searchQuery.toLowerCase();
                    return this.inventory.filter(i => String(i.Product_Name).toLowerCase().includes(q) || String(i.Code).includes(q));
                },
                get filteredWallets() {
                    // التأكد من وجود بيانات في المحافظ
                    if (!this.wallets || !Array.isArray(this.wallets)) return [];

                    let list = [...this.wallets];

                    // 1. الفلترة بالبحث النصي (اسم المحفظة أو الملاحظات)
                    if (this.walletSearch) {
                        const q = this.walletSearch.toLowerCase().trim();
                        list = list.filter(w => {
                            const name = String(w.Wallet_Name || w.wallet || "").toLowerCase();
                            const note = String(w.Notes || w.notes || "").toLowerCase();
                            return name.includes(q) || note.includes(q);
                        });
                    }

                    // 2. الفلترة بنوع المحفظة المحددة من القائمة المنسدلة
                    if (this.filterWalletName) {
                        const target = this.filterWalletName.trim();
                        list = list.filter(w => String(w.Wallet_Name || w.wallet || "").trim() === target);
                    }

                    // 3. الفلترة بالتاريخ (من وإلى)
                    if (this.filterDateFrom) {
                        const from = new Date(this.filterDateFrom).setHours(0, 0, 0, 0);
                        list = list.filter(w => new Date(w.Date || w.date).getTime() >= from);
                    }
                    if (this.filterDateTo) {
                        const to = new Date(this.filterDateTo).setHours(23, 59, 59, 999);
                        list = list.filter(w => new Date(w.Date || w.date).getTime() <= to);
                    }

                    // 4. الترتيب: الأحدث أولاً ثم القطع حسب العدد المطلوب (Limit)
                    // ملاحظة: إذا كانت البيانات تأتي مرتبة قديم -> جديد، نستخدم reverse()
                    return list.slice().reverse().slice(0, this.displayLimit || 20);
                },
                addToCart(item) {
                    if (item.Stock <= 0) return;
                    const exist = this.cart.find(c => c.code === item.Code);
                    if (exist) {
                        if (exist.qty < item.Stock) exist.qty++;
                    } else {
                        this.cart.push({ code: item.Code, name: item.Product_Name, price: item.Selling_Price, qty: 1 });
                    }
                    if (window.navigator.vibrate) window.navigator.vibrate(40);
                },

                get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.qty), 0); },

                async processSale() {
                    if (this.cart.length === 0) return;
                    this.loading = true;
                    const payload = {
                        action: 'processSale',
                        data: {
                            id: 'INV-' + Date.now().toString().slice(-6),
                            customerName: this.customerName || 'عميل نقدي',
                            total: this.cartTotal,
                            paymentType: this.paymentType,
                            paidAmount: this.paymentType === 'cash' ? this.cartTotal : (this.paidAmount || 0),
                            items: this.cart
                        }
                    };
                    try {
                        await fetch(this.scriptURL, { method: 'POST', body: JSON.stringify(payload) });
                        this.cart = []; this.customerName = ''; this.showCartDrawer = false;
                        await this.fetchData();
                        alert("تمت عملية البيع بنجاح");
                    } catch (e) { alert("حدث خطأ في الشبكة"); }
                    this.loading = false;
                },

                // 5. إحصائيات عامة
                get stats() {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const todaySales = this.sales.filter(s => new Date(s.Date_Time).toLocaleDateString('en-CA') === todayStr)
                        .reduce((sum, s) => sum + Number(s.Total_Amount), 0);
                    const totalDebts = this.crm.reduce((sum, c) => sum + Number(c.Total_Debt), 0);
                    return { todaySales, totalDebts };
                },

                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('ar-EG', { day: '2-digit', month: '2-digit', year: 'numeric' });
                }
            }
        }

    </script>
</body>
