<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3b82f6">
<meta name="description" content="تطبيق STEP لإدارة الأعمال">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="STEP">
<title>Abo Yahia | STEP</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
  [x-cloak] { display: none !important; }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
  .m-pending { border-right: 8px solid #f59e0b; background: #fffbeb; }
  .m-repaired { border-right: 8px solid #3b82f6; background: #eff6ff; }
  .m-delivered { border-right: 8px solid #10b981; background: #ecfdf5; }
  .m-rejected { border-right: 8px solid #ef4444; background: #fef2f2; }
</style>
</head>
<body x-data="erpApp()" x-init="init()" class="bg-slate-50 text-slate-900 min-h-screen pb-24 transition-colors duration-300">

<div x-show="loading" class="fixed inset-0 z-[1000] bg-black/60 backdrop-blur-md flex flex-col items-center justify-center text-white">
  <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mb-4"></div>
  <p class="font-black animate-pulse">جاري المعالجة...</p>
</div>

<div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-slate-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-4xl mb-4 shadow-xl shadow-blue-200">
        <i class="fa-solid fa-rocket"></i>
      </div>
      <h2 class="text-3xl font-black text-slate-800">STEP</h2>
      <p class="text-slate-400 font-bold">تسجيل الدخول للنظام</p>
    </div>
    <div class="space-y-4">
      <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-center transition-all">
      <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-center transition-all">
      <button @click="login()" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">دخول</button>
    </div>
  </div>
</div>

<template x-if="isLoggedIn">
<div class="max-w-4xl mx-auto">
  <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b px-6 py-4 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-bolt"></i></div>
      <div>
        <h1 class="font-black text-lg leading-tight" :class="user.role === 'admin' ? 'cursor-pointer' : ''" @click="user.role === 'admin' ? openAddUserModal() : null">STEP</h2>
        <p class="text-[10px] font-bold text-blue-600" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ')'"></p>
      </div>
    </div>
    <div class="flex gap-2">
      <button @click="fetchData()" class="p-2 bg-blue-50 text-blue-600 rounded-xl"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
      <button @click="logout()" class="p-2 bg-rose-50 text-rose-600 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
    </div>
  </header>

  <main class="p-4 space-y-6">
    <div x-show="currentTab === 'reports' && user.role === 'admin'" class="space-y-6 animate__animated animate__fadeIn">
      
      <!-- كاش المحل -->
      <div class="bg-gradient-to-br from-blue-600 to-blue-700 p-4 rounded-2xl text-white shadow-xl relative overflow-hidden">
        <div class="relative z-10">
          <div class="flex justify-between items-center">
            <p class="text-xs font-bold opacity-80 uppercase tracking-widest"><i class="fa-solid fa-cash-register ml-1"></i> كاش المحل</p>
            <button @click="updateShopCash()" class="bg-white/20 px-3 py-1 rounded-full text-[9px] font-black hover:bg-white/30 transition-all">تحديث</button>
          </div>
          <h3 class="text-3xl font-black tabular-nums mt-2" x-text="shopCash.toLocaleString() + ' ج'"></h3>
        </div>
        <i class="fa-solid fa-vault absolute -bottom-4 -right-4 text-8xl opacity-10"></i>
      </div>

      <!-- فلتر التقارير -->
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <p class="text-[10px] font-black text-slate-500 mb-3 uppercase">فلتر التقارير</p>
        
        <!-- الأزرار الفورية -->
        <div class="flex gap-2 mb-3">
          <button @click="setTodayFilter(); fetchData()" class="flex-1 p-2 bg-blue-600 text-white rounded-xl text-[9px] font-black">اليوم</button>
          <button @click="setMonthFilter(); fetchData()" class="flex-1 p-2 bg-emerald-600 text-white rounded-xl text-[9px] font-black">الشهر الحالي</button>
        </div>
        
        <!-- حقول من إلى -->
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[9px] font-bold text-slate-500">من</label>
            <input type="date" x-model="filterDate.from" @change="fetchData()" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
          </div>
          <div>
            <label class="text-[9px] font-bold text-slate-500">إلى</label>
            <input type="date" x-model="filterDate.to" @change="fetchData()" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
          </div>
        </div>
      </div>

      <!-- تفاصيل الأرباح -->
      <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
        <h3 class="font-black text-slate-700 mb-4 border-b pb-2"><i class="fa-solid fa-chart-pie text-blue-600 ml-2"></i>تفاصيل الأرباح</h3>
        <div class="grid grid-cols-2 gap-3">
          <!-- الهواتف الجديدة -->
          <div class="bg-blue-50 p-4 rounded-2xl">
            <p class="text-[10px] font-black text-blue-600 mb-3 border-b pb-2">الهواتف الجديدة</p>
            <div class="space-y-2">
              <div>
                <p class="text-[9px] text-slate-500 font-bold">إجمالي المبيعات</p>
                <p class="text-lg font-black tabular-nums text-slate-800" x-text="getTotalSales('هاتف جديد').toLocaleString() + ' ج'"></p>
              </div>
              <div class="pt-2 border-t border-blue-200">
                <p class="text-[9px] text-slate-500 font-bold">إجمالي الأرباح</p>
                <p class="text-lg font-black tabular-nums text-blue-700" x-text="getFilteredProfits().newPhone.toLocaleString() + ' ج'"></p>
              </div>
            </div>
          </div>

          <!-- الهواتف المستعملة -->
          <div class="bg-amber-50 p-4 rounded-2xl">
            <p class="text-[10px] font-black text-amber-600 mb-3 border-b pb-2">الهواتف المستعملة</p>
            <div class="space-y-2">
              <div>
                <p class="text-[9px] text-slate-500 font-bold">إجمالي المبيعات</p>
                <p class="text-lg font-black tabular-nums text-slate-800 tabular-nums" x-text="getTotalSales('هاتف مستعمل').toLocaleString() + ' ج'"></p>
              </div>
              <div class="pt-2 border-t border-amber-200">
                <p class="text-[9px] text-slate-500 font-bold">إجمالي الأرباح</p>
                <p class="text-lg font-black tabular-nums text-amber-700" x-text="getFilteredProfits().usedPhone.toLocaleString() + ' ج'"></p>
              </div>
            </div>
          </div>

          <!-- أرباح المحافظ -->
          <div class="bg-emerald-50 p-4 rounded-2xl">
            <p class="text-[10px] font-black text-emerald-600 mb-3 border-b pb-2">أرباح المحافظ</p>
            <div class="space-y-2">
              <div>
                <p class="text-[9px] text-slate-500 font-bold">إجمالي الرصيد</p>
                <p class="text-lg font-black tabular-nums text-slate-800" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
              </div>
              <div class="pt-2 border-t border-emerald-200">
                <p class="text-[9px] text-slate-500 font-bold">إجمالي الأرباح</p>
                <p class="text-lg font-black tabular-nums text-emerald-700" x-text="getFilteredProfits().wallet.toLocaleString() + ' ج'"></p>
              </div>
            </div>
          </div>

          <!-- أرباح عامة وإكسسوارات -->
          <div class="bg-slate-100 p-4 rounded-2xl">
            <p class="text-[10px] font-black text-slate-600 mb-3 border-b pb-2">أرباح عامة وإكسسوارات</p>
            <div class="space-y-2">
              <div>
                <p class="text-[9px] text-slate-500 font-bold">إجمالي المبيعات</p>
                <p class="text-lg font-black text-slate-800 tabular-nums" x-text="getTotalSales('عام').toLocaleString() + ' ج'"></p>
              </div>
              <div class="pt-2 border-t border-slate-300">
                <p class="text-[9px] text-slate-500 font-bold">إجمالي الأرباح</p>
                <p class="text-lg font-black text-slate-700 tabular-nums" x-text="getFilteredProfits().general.toLocaleString() + ' ج'"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- إحصائيات الصيانة -->
      <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
        <h3 class="font-black text-slate-700 mb-4 border-b pb-2"><i class="fa-solid fa-screwdriver-wrench text-blue-600 ml-2"></i>إحصائيات الصيانة (للأجهزة المسلمة)</h3>
        <div class="grid grid-cols-3 gap-2 text-center">
          <div class="bg-blue-50 p-3 rounded-2xl">
            <p class="text-[10px] font-black text-blue-600 mb-1">إجمالي المدفوع</p>
            <p class="text-sm font-black text-slate-800 tabular-nums" x-text="getFilteredMaintStats().totalPaid.toLocaleString() + ' ج'"></p>
          </div>
          <div class="bg-blue-50 p-3 rounded-2xl">
            <p class="text-[10px] font-black text-blue-600 mb-1">إجمالي التكاليف</p>
            <p class="text-sm font-black text-slate-800 tabular-nums" x-text="getFilteredMaintStats().totalCost.toLocaleString() + ' ج'"></p>
          </div>
          <div class="bg-blue-50 p-3 rounded-2xl shadow-sm border border-blue-100">
            <p class="text-[10px] font-black text-blue-600 mb-1">صافي الربح</p>
            <p class="text-sm font-black text-slate-800 tabular-nums" x-text="getFilteredMaintStats().netProfit.toLocaleString() + ' ج'"></p>
          </div>
        </div>
      </div>

    </div>

    <div x-show="currentTab === 'reports' && user.role !== 'admin'" class="flex flex-col items-center justify-center py-20 text-slate-400">
      <i class="fa-solid fa-lock text-6xl mb-4 text-slate-200"></i>
      <p class="font-black text-lg">عذراً، لا تمتلك صلاحية لعرض التقارير</p>
    </div>

    <div x-show="currentTab === 'wallets'" class="space-y-4">
      <!-- فلتر المحافظ -->
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <p class="text-[10px] font-black text-slate-500 mb-3 uppercase">فلتر المحافظ</p>
        <div class="flex gap-2 mb-3">
          <button @click="setTodayFilter(); fetchData()" class="flex-1 p-2 bg-blue-600 text-white rounded-xl text-[9px] font-black">اليوم</button>
          <button @click="setMonthFilter(); fetchData()" class="flex-1 p-2 bg-blue-600 text-white rounded-xl text-[9px] font-black">الشهر الحالي</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[9px] font-bold text-slate-500">من</label>
            <input type="date" x-model="filterDate.from" @change="fetchData()" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
          </div>
          <div>
            <label class="text-[9px] font-bold text-slate-500">إلى</label>
            <input type="date" x-model="filterDate.to" @change="fetchData()" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
          </div>
        </div>
        <div class="mt-3">
          <label class="text-[9px] font-bold text-slate-500">بحث باسم المحفظة</label>
          <input type="text" x-model="searchWallet" placeholder="اكتب اسم المحفظة" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none" />
        </div>
      </div>

      <!-- باقي قسم المحافظ -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <button @click="openWalletTxModal('وارد')" class="bg-emerald-500 text-white p-4 rounded-3xl font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
          <i class="fa-solid fa-arrow-down"></i> استلام كاش
        </button>
        <button @click="openWalletTxModal('صادر')" class="bg-rose-500 text-white p-4 rounded-3xl font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
          <i class="fa-solid fa-arrow-up"></i> تحويل كاش
        </button>
      </div>
      <div class="grid grid-cols-1 gap-3">
        <template x-for="w in filteredWallets">
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3">
            <div class="flex items-start gap-3">
              <div class="flex items-center gap-3">
                <div class="flex-shrink-0 flex items-center justify-center w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl">
                  <i class="fa-solid fa-wallet text-xl"></i>
                </div>
                <div>
                  <p class="text-sm font-black text-slate-800" x-text="w.name"></p>
                  <p class="text-[10px] text-slate-500">الليمیت: <span class="font-black text-slate-800" x-text="w.limit.toLocaleString() + ' ج'"></span></p>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-3 gap-2 text-center">
              <div class="space-y-1">
                <p class="text-[9px] font-black text-emerald-600 uppercase">صـــادر</p>
                <p class="text-lg font-black tabular-nums text-emerald-700" x-text="calcWalletFiltered(w.name).outgoing.toLocaleString() + ' ج'"></p>
                <p class="text-[10px] text-slate-500">باقي: <span class="font-black text-emerald-600" x-text="getLimitRemaining(w.name, w.limit).outgoing.toLocaleString() + ' ج'"></span></p>
                <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full bg-emerald-500" :style="`width: ${getLimitPercent(w.name, w.limit, 'outgoing')}%`"></div>
                </div>
                <p class="text-[10px] text-slate-500"><span class="font-black" x-text="getLimitPercent(w.name, w.limit, 'outgoing').toFixed(0) + '%'" ></span></p>
              </div>
              <div class="space-y-1">
                <p class="text-[9px] font-black text-rose-600 uppercase">وارد</p>
                <p class="text-lg font-black tabular-nums text-rose-700" x-text="calcWalletFiltered(w.name).incoming.toLocaleString() + ' ج'"></p>
                <p class="text-[10px] text-slate-500">باقي: <span class="font-black text-rose-600" x-text="getLimitRemaining(w.name, w.limit).incoming.toLocaleString() + ' ج'"></span></p>
                <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full bg-rose-500" :style="`width: ${getLimitPercent(w.name, w.limit, 'incoming')}%`"></div>
                </div>
                <p class="text-[10px] text-slate-500"><span class="font-black" x-text="getLimitPercent(w.name, w.limit, 'incoming').toFixed(0) + '%'" ></span></p>
              </div>
              <div class="space-y-1">
                <p class="text-[9px] font-black text-blue-600 uppercase">الرصيد</p>
                <p class="text-lg font-black tabular-nums text-slate-800" x-text="calcWallet(w.name).balance.toLocaleString() + ' ج'"></p>
              </div>
            </div>

            <div x-show="Math.max(getLimitPercent(w.name, w.limit, 'outgoing'), getLimitPercent(w.name, w.limit, 'incoming')) >= 95" class="text-[10px] text-blue-700 bg-blue-100 px-3 py-2 rounded-xl font-black text-center">
              ⚠️ وصلت إلى 95% أو أكثر من ليميت هذه المحفظة
            </div>
          </div>
        </template>
        <button x-show="user.role === 'admin'" @click="addNewWallet()" class="w-full py-4 border-2 border-dashed border-blue-300 text-blue-400 rounded-3xl font-black hover:border-blue-400 hover:text-blue-600 transition-all">+ إضافة محفظة جديدة</button>
      </div>
    </div>

    <div x-show="currentTab === 'maintenance'" class="space-y-4">
      <div class="flex gap-1 p-1 bg-slate-200 rounded-2xl overflow-x-auto custom-scrollbar">
        <button @click="mFilter = 'قيد الانتظار'" :class="mFilter === 'قيد الانتظار' ? 'bg-amber-500 text-white shadow-md' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">انتظار</button>
        <button @click="mFilter = 'تم التصليح'" :class="mFilter === 'تم التصليح' ? 'bg-blue-500 text-white shadow-md' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">تم التصليح</button>
        <button @click="mFilter = 'تم التسليم'" :class="mFilter === 'تم التسليم' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">مُسلم</button>
        <button @click="mFilter = 'مرفوض'" :class="mFilter === 'مرفوض' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">مرفوض</button>
      </div>
      
      <button @click="openMaintenanceModal()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 transition-all active:scale-95">
        <i class="fa-solid fa-plus-circle ml-2"></i> استلام جهاز صيانة جديد
      </button>

      <div class="space-y-3">
        <template x-for="m in filteredMaintenance">
          <div :class="getMClass(m.Status)" class="p-4 rounded-3xl shadow-sm flex justify-between items-center bg-white border border-slate-100">
            <div class="flex-1">
              <div class="flex justify-between items-center mb-1">
                <h4 class="font-black text-sm text-slate-800" x-text="m.Phone_Type || 'جهاز غير محدد'"></h4>
                <span class="text-[9px] font-black px-2 py-0.5 rounded-lg bg-white/60" x-text="m.Status"></span>
              </div>
              <p class="text-[11px] font-bold text-slate-500 line-clamp-1" x-text="'العطل: ' + (m.Issue || 'غير محدد')"></p>
              <div class="flex gap-3 mt-2">
                <p class="text-[9px] font-black text-blue-600"><i class="fa-solid fa-user ml-1"></i> <span x-text="m.Client_Name || 'بدون اسم'"></span></p>
                <p class="text-[9px] font-black text-emerald-600"><i class="fa-solid fa-phone ml-1"></i> <span x-text="m.Phone_Number || 'لا يوجد رقم'"></span></p>
              </div>
            </div>
            <div class="text-left mr-4 flex flex-col items-end">
              <p class="text-xs font-black tabular-nums text-slate-700" x-text="(m.Expected_Cost || 0) + ' ج'"></p>
              <button @click="openEditMaintenanceModal(m)" class="mt-2 text-[10px] font-black text-white bg-slate-800 px-3 py-1 rounded-lg shadow-sm active:scale-95">تحديث / تسليم</button>
            </div>
          </div>
        </template>
        <div x-show="filteredMaintenance.length === 0" class="text-center py-10 text-slate-400 font-bold text-sm">لا توجد أجهزة بهذه الحالة.</div>
      </div>
    </div>

    <div x-show="currentTab === 'pos'" class="space-y-4">
           <!-- أزرار استلام كاش وصادر -->
       <div class="flex gap-2">
        <button @click="openWalletTxModal('وارد')" class="bg-emerald-500 text-[10px] text-white p-4 rounded-3xl font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
          <i class="fa-solid fa-arrow-down"></i> استلام كاش
        </button>
        <button @click="openWalletTxModal('صادر')" class="bg-rose-500 text-[10px] text-white p-4 rounded-3xl font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
          <i class="fa-solid fa-arrow-up"></i> تحويل كاش
        </button>
         <button @click="openMaintenanceModal()" class="w-full text-[10px] py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 transition-all active:scale-95">
        <i class="fa-solid fa-plus-circle ml-2"></i> استلام صيانة 
      </button>
      </div>

      <div class="flex gap-2">

    pForm: {},
    wTxForm: { type: 'وارد', wallet: '', amount: '', profit: '', notes: '', fromCash: false },
    mForm: { Client_Name: '', Phone_Number: '', Phone_Type: '', Issue: '', Expected_Cost: '' },
    mEditForm: { Ticket_ID: '', Status: '', Expected_Cost: '', paid: '', Cost_Price: '' },
    addUserForm: { username: '', password: '', role: 'worker' },
    transferForm: { type: 'وارد', fromWallet: '', toWallet: '', amount: '', notes: '' },

    mFilter: 'قيد الانتظار',
    shopCash: 0,

    tabs: [
      { id: 'reports', name: 'التقارير', icon: 'fa-solid fa-chart-line' },
      { id: 'pos', name: 'الكاشير', icon: 'fa-solid fa-cash-register' },
      { id: 'maintenance', name: 'الصيانة', icon: 'fa-solid fa-screwdriver-wrench' },
      { id: 'inventory', name: 'المخزن', icon: 'fa-solid fa-boxes-stacked' },
      { id: 'wallets', name: 'المحافظ', icon: 'fa-solid fa-wallet' }
    ],

    // مساعدة
    getFirstDayOfMonth() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    },

    setTodayFilter() {
      const today = new Date().toISOString().split('T')[0];
      this.filterDate.from = today;
      this.filterDate.to = today;
      this.filterDate.month = '';
    },

    setMonthFilter() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth(); // الشهر الحالي
      this.filterDate.from = new Date(year, month, 1).toISOString().split('T')[0];
      this.filterDate.to = new Date(year, month + 1, 0).toISOString().split('T')[0];
      this.filterDate.month = '';
    },

    isDateInRange(dateString) {
      if (!dateString) return false;
      const date = new Date(dateString).toISOString().split('T')[0];
      return date >= this.filterDate.from && date <= this.filterDate.to;
    },

    async callApi(action, dataObj = {}) {
      if (!API_URL.includes("script.google.com")) {
        alert("يرجى تعيين رابط الـ API_URL بشكل صحيح في الكود.");
        return { success: false };
      }
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: action, data: dataObj })
        });
        return await response.json();
      } catch (error) {
        console.error("Fetch Error:", error);
        return { success: false, error: "فشل الاتصال." };
      }
    },

    init() {
      const saved = localStorage.getItem('sa7by_session');
      if (saved) {
        try {
          this.user = JSON.parse(saved);
          this.isLoggedIn = true;
          this.currentTab = this.user.role === 'admin' ? 'reports' : 'pos';
          this.fetchData();
        } catch(e) { this.logout(); }
      }
    },

    async login() {
      if(!this.loginForm.username || !this.loginForm.password) return alert("أدخل البيانات!");
      this.loading = true;
      const res = await this.callApi('login', this.loginForm);
      this.loading = false;

      if (res && res.success) {
        this.user = res.user;
        this.isLoggedIn = true;
        this.currentTab = this.user.role === 'admin' ? 'reports' : 'pos';
        localStorage.setItem('sa7by_session', JSON.stringify(res.user));
        this.fetchData();
      } else {
        alert(res ? res.error : "خطأ في تسجيل الدخول");
      }
    },

    logout() {
      localStorage.removeItem('sa7by_session');
      location.reload();
    },

    async fetchData() {
      this.loading = true;
      const res = await this.callApi('getAllData');
      if (res && !res.error) {
        this.data = res;
        const cash = (res.Settings || []).find(s => s.Key === "Shop_Cash" || s.Setting_Name === "Shop_Cash" || s[0] === "Shop_Cash");
        this.shopCash = cash ? Number(cash.Value || cash[1] || 0) : 0;
      }
      this.loading = false;
    },

    // الأرباح بفلتر التاريخ
    getFilteredProfits() {
      let newPhone = 0, usedPhone = 0, general = 0, wallet = 0;
      
      // أرباح المحافظ
      (this.data.Wallets || []).forEach(w => {
        if (this.isDateInRange(w.Date)) {
          wallet += Number(w.Profit_Margin || w.profit || 0);
        }
      });
      
      // أرباح المبيعات
      (this.data.Sales || []).forEach(sale => {
        if (this.isDateInRange(sale.Date)) {
          try {
            let items = JSON.parse(sale.Items_JSON || "[]");
            items.forEach(item => {
              let invItem = (this.data.Inventory || []).find(i => i.Code == item.code);
              let cost = invItem ? Number(invItem.Cost_Price || 0) : 0;
              let profit = (Number(item.price) - cost) * Number(item.qty);

              if (invItem) {
                if (invItem.Category === 'هاتف جديد') newPhone += profit;
                else if (invItem.Category === 'هاتف مستعمل') usedPhone += profit;
                else general += profit;
              } else {
                general += profit;
              }
            });
          } catch(e) {}
        }
      });
      
      return { newPhone, usedPhone, general, wallet };
    },

    get profits() {
      return this.getFilteredProfits();
    },

    // إحصائيات الصيانة بفلتر
    getFilteredMaintStats() {
      let totalPaid = 0, totalCost = 0;
      (this.data.Maintenance || []).forEach(m => {
        if (m.Status === 'تم التسليم' && this.isDateInRange(m.Date)) {
          totalPaid += Number(m.paid || m.Paid || 0);
          totalCost += Number(m.Cost_Price || 0);
        }
      });
      return { totalPaid, totalCost, netProfit: totalPaid - totalCost };
    },

    get maintStats() {
      return this.getFilteredMaintStats();
    },

    get inventory() { return this.data.Inventory || []; },
    get filteredInventory() {
      const q = this.search.toLowerCase().trim();
      return this.inventory.filter(i => {
        const matchesSearch = !q ||
          String(i.Product_Name||'').toLowerCase().includes(q) ||
          String(i.Code||'').includes(q);

        const category = String(i.Category||'');
        const matchesTab = this.posFilter === 'all'
          ? !category.includes('هاتف')
          : this.posFilter === 'new'
            ? category === 'هاتف جديد'
            : this.posFilter === 'used'
              ? category === 'هاتف مستعمل'
              : true;

        return matchesSearch && matchesTab;
      });
    },

    get filteredWallets() {
      const q = this.searchWallet.toLowerCase();
      if (!q) return this.dynamicWallets;
      return this.dynamicWallets.filter(w =>
        String(w.name||'').toLowerCase().includes(q)
      );
    },

    addToCart(product) {
      if (product.Stock <= 0) return alert('هذا المنتج نفد من المخزن!');
      const item = this.cart.find(c => c.code === product.Code);
      if (item) item.qty++;
      else this.cart.push({ code: product.Code, name: product.Product_Name, price: product.Selling_Price, qty: 1 });
    },
    
    get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.qty), 0); },

    async confirmSale() {
      if (!this.cart.length) return;
      this.loading = true;
      const saleData = {
        total: this.cartTotal,
        paid: this.checkout.paid || this.cartTotal,
        customer: this.checkout.customer || 'عميل نقدي',
        paymentType: this.checkout.type,
        items: this.cart,
        user: this.user.username
      };
      await this.callApi('processSale', saleData);
      this.cart = [];
      this.showCart = false;
      this.checkout = { customer: '', type: 'Cash', paid: 0 };
      this.fetchData();
    },

    openProductModal(cat) {
      this.isEditingProduct = false;
      this.pForm = { Category: cat, Code: '', Product_Name: '', Cost_Price: '', Selling_Price: '', Stock: 1, Min_Stock: 1, User: this.user.username, Model: '', Storage: '', RAM: '', Color: '', Battery: '', Serial: '', Details: '' };
      this.showProductModal = true;
    },

    openInventoryProduct(item) {
      this.isEditingProduct = true;
      this.pForm = {
        Category: item.Category || '',
        Code: item.Code || '',
        Product_Name: item.Product_Name || '',
        Cost_Price: item.Cost_Price || '',
        Selling_Price: item.Selling_Price || '',
        Stock: item.Stock || 0,
        Min_Stock: item.Min_Stock || 1,
        User: item.User || this.user.username,
        Model: item.Model || '',
        Storage: item.Storage || '',
        RAM: item.RAM || '',
        Color: item.Color || '',
        Battery: item.Battery || '',
        Serial: item.Serial || '',
        Details: item.Details || ''
      };
      this.showProductModal = true;
    },

    openAddUserModal() {
      this.addUserForm = { username: '', password: '', role: 'worker' };
      this.showAddUserModal = true;
    },

    async addNewUser() {
      if (!this.addUserForm.username || !this.addUserForm.password) return alert("أدخل اسم المستخدم وكلمة المرور");
      this.loading = true;
      await this.callApi('addUser', this.addUserForm);
      this.showAddUserModal = false;
      this.fetchData();
    },

    openWalletTransferModal(type) {
      this.transferForm = { type: type, fromWallet: '', toWallet: '', amount: '', notes: '' };
      this.showWalletTransferModal = true;
    },

    async submitWalletTransfer() {
      if (!this.transferForm.fromWallet || !this.transferForm.toWallet || !this.transferForm.amount) return alert("أدخل جميع البيانات");
      if (this.transferForm.fromWallet === this.transferForm.toWallet) return alert("لا يمكن التحويل لنفس المحفظة");
      this.loading = true;
      await this.callApi('transferBetweenWallets', this.transferForm);
      this.showWalletTransferModal = false;
      this.fetchData();
    },
    
    async saveProduct() {
      if(!this.pForm.Code || !this.pForm.Product_Name || !this.pForm.Selling_Price) return alert("أدخل البيانات الأساسية (الكود، الاسم، السعر)");
      this.loading = true;
      await this.callApi('saveProduct', this.pForm);
      this.showProductModal = false;
      this.fetchData();
    },

    get filteredMaintenance() {
      return (this.data.Maintenance || []).filter(m => String(m.Status||'').trim() === String(this.mFilter).trim() && this.isDateInRange(m.Date));
    },
    
    getMClass(status) {
      status = String(status).trim();
      if (status === 'قيد الانتظار') return 'm-pending';
      if (status === 'تم التصليح') return 'm-repaired';
      if (status === 'تم التسليم') return 'm-delivered';
      return 'm-rejected';
    },

    openMaintenanceModal() {
      this.mForm = { Client_Name: '', Phone_Number: '', Phone_Type: '', Issue: '', Expected_Cost: '' };
      this.showMaintenanceModal = true;
    },
    
    async saveNewMaintenance() {
      this.loading = true;
      await this.callApi('saveMaintenance', {
        Ticket_ID: "T-" + Date.now().toString().slice(-6),
        Status: 'قيد الانتظار',
        Client_Name: this.mForm.Client_Name || "بدون اسم",
        Phone_Number: this.mForm.Phone_Number || "",
        Phone_Type: this.mForm.Phone_Type || "غير محدد",
        Issue: this.mForm.Issue || "غير محدد",
        Expected_Cost: this.mForm.Expected_Cost || 0,
        paid: 0,
        Cost_Price: 0,
        User: this.user.username
      });
      this.showMaintenanceModal = false;
      this.fetchData();
    },

    openEditMaintenanceModal(m) {
      this.mEditForm = {
        Ticket_ID: m.Ticket_ID,
        Status: m.Status || 'قيد الانتظار',
        Expected_Cost: m.Expected_Cost || 0,
        paid: m.paid || m.Paid || 0,
        Cost_Price: m.Cost_Price || 0
      };
      this.showEditMaintenanceModal = true;
    },
    
    async submitEditMaintenance() {
      this.loading = true;
      await this.callApi('updateMaintenance', {
        Ticket_ID: this.mEditForm.Ticket_ID,
        Status: this.mEditForm.Status,
        Expected_Cost: this.mEditForm.Expected_Cost || 0,
        paid: this.mEditForm.paid || 0,
        Cost_Price: this.mEditForm.Cost_Price || 0
      });
      this.showEditMaintenanceModal = false;
      this.fetchData();
    },

    // المحافظ
    get dynamicWallets() {
      return (this.data.Settings || []).filter(s => {
        const key = s.Key || s.Setting_Name || s[0];
        return key && key.toString().startsWith("Limit_");
      }).map(s => {
        const key = s.Key || s.Setting_Name || s[0];
        const val = s.Value || s[1] || 0;
        return { name: key.replace("Limit_", ""), limit: Number(val) };
      });
    },

    calcWallet(name) {
      const txs = (this.data.Wallets || []).filter(w => String(w.Wallet_Name || "").trim() === String(name).trim());
      const now = new Date();
      let incoming = 0, outgoing = 0, balance = 0;
      let monthlyIncoming = 0, monthlyOutgoing = 0;
      
      txs.forEach(t => {
        const amt = Number(t.Amount || 0);
        const type = String(t.Type || "").trim();
        const d = new Date(t.Date);
        
        if (type === 'وارد') {
          incoming += amt;
          balance += amt;
          if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthlyIncoming += amt;
        } else if (type === 'صادر') {
          outgoing += amt;
          balance -= amt;
          if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthlyOutgoing += amt;
        }
      });
      
      return { incoming, outgoing, balance, monthlyIncoming, monthlyOutgoing };
    },

    calcWalletFiltered(name) {
      const txs = (this.data.Wallets || []).filter(w => String(w.Wallet_Name || "").trim() === String(name).trim() && this.isDateInRange(w.Date));
      let incoming = 0, outgoing = 0;
      txs.forEach(t => {
        const amt = Number(t.Amount || 0);
        const type = String(t.Type || "").trim();
        if (type === 'وارد') incoming += amt;
        else if (type === 'صادر') outgoing += amt;
      });
      return { incoming, outgoing };
    },

    getLimitRemaining(name, limit) {
      const { monthlyIncoming, monthlyOutgoing } = this.calcWallet(name);
      return {
        incoming: limit ? Math.max(limit - monthlyIncoming, 0) : 0,
        outgoing: limit ? Math.max(limit - monthlyOutgoing, 0) : 0
      };
    },

    openWalletTxModal(type) {
      this.wTxForm = { type: type, wallet: '', amount: '', profit: '', notes: '', fromCash: false };
      this.showWalletTxModal = true;
    },
    
    async submitWalletTx() {
      if (!this.wTxForm.wallet || !this.wTxForm.amount) return alert("الرجاء اختيار المحفظة وكتابة المبلغ");
      
      const wData = this.calcWallet(this.wTxForm.wallet);
      const walletObj = this.dynamicWallets.find(dw => dw.name === this.wTxForm.wallet);

      if (this.wTxForm.type === 'صادر' && walletObj && walletObj.limit > 0) {
        if ((wData.monthlyOutgoing + Number(this.wTxForm.amount)) > walletObj.limit) {
          if(!confirm(" ⚠️  تنبيه: هذه العملية ستتخطى الليميت الشهري للمحفظة! هل تريد الاستمرار؟")) return;
        }
      }

      this.loading = true;
      await this.callApi('saveWalletTransaction', {
        wallet: this.wTxForm.wallet,
        type: this.wTxForm.type,
        amount: Number(this.wTxForm.amount),
        notes: this.wTxForm.notes,
        user: this.user.username,
        profit: Number(this.wTxForm.profit || 0),
        fromCash: this.wTxForm.fromCash
      });

      this.showWalletTxModal = false;
      this.fetchData();
    },

    async addNewWallet() {
      const name = prompt("اسم المحفظة الجديدة:");
      if (name) {
        const limit = prompt("أدخل الليميت الشهري لمحفظة " + name, 50000);
        if(limit) {
          this.loading = true;
          await this.callApi('saveWalletConfig', { name: name, limit: limit });
          this.fetchData();
        }
      }
    },
    
    async setWalletLimit(name) {
      const limit = prompt(" تعديل الليميت الشهري لمحفظة " + name, 50000);
      if (limit) {
        this.loading = true;
        await this.callApi('saveWalletConfig', { name: name, limit: limit });
        this.fetchData();
      }
    },
    
    async updateShopCash() {
      const amt = prompt("أدخل المبلغ الفعلي الموجود في كاش المحل حالياً:", this.shopCash);
      if (amt !== null && amt !== "") {
        this.loading = true;
        await this.callApi('setShopCash', { amount: Number(amt) });
        this.fetchData();
      }
    },

    getTotalSales(category) {
      let total = 0;
      (this.data.Sales || []).forEach(sale => {
        if (this.isDateInRange(sale.Date)) {
          try {
            let items = JSON.parse(sale.Items_JSON || "[]");
            items.forEach(item => {
              let invItem = (this.data.Inventory || []).find(i => i.Code == item.code);
              if (invItem) {
                let itemCategory = invItem.Category || 'عام';
                if (category === 'عام' && !itemCategory.includes('هاتف')) {
                  total += Number(item.price) * Number(item.qty);
                } else if (itemCategory === category) {
                  total += Number(item.price) * Number(item.qty);
                }
              } else if (category === 'عام') {
                total += Number(item.price) * Number(item.qty);
              }
            });
          } catch(e) {}
        }
      });
      return total;
    },

    getTotalWalletBalance() {
      let total = 0;
      this.dynamicWallets.forEach(w => {
        total += this.calcWallet(w.name).balance;
      });
      return total;
    },

    getLimitPercent(name, limit, type = 'outgoing') {
      if (!limit) return 0;
      const wallet = this.calcWallet(name);
      const used = type === 'incoming' ? wallet.monthlyIncoming : wallet.monthlyOutgoing;
      return Math.min((used / limit) * 100, 100);
    },

    getLimitColor(name, limit, type = 'outgoing') {
      const percent = this.getLimitPercent(name, limit, type);
      if (percent >= 80) return 'bg-rose-500';
      if (percent >= 50) return 'bg-amber-500';
      return 'bg-emerald-500';
    }
  }
}
</script>

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(registration => {
        console.log('SW registered: ', registration);
      })
      .catch(registrationError => {
        console.log('SW registration failed: ', registrationError);
      });
  });
}
</script>
