<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">
<title>2M - Super Mobile Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
    [x-cloak] { display: none !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    
    /* Modern Glassmorphism Utilities */
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03); }
    .glass-nav { background: rgba(255, 255, 255, 0.90); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.5); }
    
    /* Bottom Sheet Animation Utilities */
    .sheet-enter { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
    .sheet-enter-active { transform: translateY(0); }
    .sheet-leave { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(0); }
    .sheet-leave-active { transform: translateY(100%); }
    
    /* Status Indicators */
    .m-pending { border-right: 4px solid #f59e0b; }
    .m-repaired { border-right: 4px solid #3b82f6; }
    .m-delivered { border-right: 4px solid #10b981; }
    .m-rejected { border-right: 4px solid #ef4444; }
</style>
</head>
<body x-data="erpApp()" x-init="init()" class="text-slate-800 min-h-screen pb-28">

<div x-show="loading" class="fixed inset-0 z-[1000] bg-slate-900/50 backdrop-blur-lg flex flex-col items-center justify-center text-white transition-all">
    <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
    <p class="font-black tracking-widest animate-pulse">جاري المعالجة...</p>
</div>

<div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel p-10 rounded-[2.5rem] relative overflow-hidden">
        <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-indigo-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="relative z-10 text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl mb-6 shadow-xl transform rotate-3"><i class="fa-solid fa-rocket -rotate-3"></i></div>
            <h2 class="text-4xl font-black text-slate-800 tracking-tight">2M</h2>
            <p class="text-slate-500 font-bold mt-2">تسجيل الدخول للنظام</p>
        </div>
        <div class="relative z-10 space-y-5">
            <div class="relative">
                <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl outline-none font-bold transition-all">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl outline-none font-bold transition-all">
            </div>
            <button @click="login()" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 mt-2">دخول</button>
        </div>
    </div>
</div>

<template x-if="isLoggedIn">
<div class="max-w-4xl mx-auto relative h-full">
    <header class="glass-nav sticky top-0 z-40 px-6 py-4 flex justify-between items-center rounded-b-3xl shadow-sm mb-6 mx-2">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-[14px] flex items-center justify-center text-white shadow-md">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <div>
                <h1 class="font-black text-lg text-slate-800 leading-none mb-1">2M System</h1>
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <p class="text-[9px] font-bold text-slate-500" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ')'"></p>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button @click="fetchData()" class="w-10 h-10 bg-white text-indigo-600 rounded-[14px] shadow-sm active:scale-95 flex items-center justify-center border border-slate-100"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
        </div>
    </header>

    <main class="px-4 space-y-6">

        <div x-show="currentTab === 'home' && activeView === ''" x-transition.opacity class="space-y-4">
            
            <div x-show="user.role === 'admin'" class="bg-gradient-to-br from-slate-900 to-indigo-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                <div class="relative z-10 flex flex-col gap-5">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-bold text-indigo-200 mb-1">إجمالي السيولة النقدية (الخزينة والمحافظ)</p>
                            <h3 class="text-4xl font-black tabular-nums tracking-tight text-white" x-text="(shopCash + getTotalWalletBalance()).toLocaleString() + ' ج'"></h3>
                        </div>
                        <button @click="updateShopCash()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center backdrop-blur-md active:scale-95 shadow-inner border border-white/20"><i class="fa-solid fa-pen text-sm"></i></button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mt-2 pt-4 border-t border-indigo-500/30">
                        <div>
                            <p class="text-[10px] font-bold text-emerald-300 mb-1 flex items-center gap-1"><i class="fa-solid fa-cash-register"></i> كاش المحل</p>
                            <p class="text-xl font-black text-emerald-400 tabular-nums" x-text="shopCash.toLocaleString() + ' ج'"></p>
                        </div>
                        <div class="border-r border-indigo-500/30 pr-4">
                            <p class="text-[10px] font-bold text-blue-300 mb-1 flex items-center gap-1"><i class="fa-solid fa-wallet"></i> إجمالي المحافظ</p>
                            <p class="text-xl font-black text-blue-400 tabular-nums" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="glass-panel p-4 rounded-[2rem] flex flex-col justify-center gap-3 active:scale-95 bg-white border border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-[1.2rem] flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-chart-line"></i></div>
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold mb-0.5">مبيعات اليوم</p>
                            <p class="font-black text-slate-800 text-lg tabular-nums" x-text="getTodaySales().toLocaleString() + ' ج'"></p>
                        </div>
                    </div>
                </div>
                
                <div @click="showDebtorsModal = true" class="glass-panel p-4 rounded-[2rem] flex flex-col justify-center gap-3 active:scale-95 cursor-pointer bg-white border border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-[1.2rem] flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold mb-0.5">ديون السوق (الآجل)</p>
                            <p class="font-black text-rose-600 text-lg tabular-nums" x-text="getTotalDebts().toLocaleString() + ' ج'"></p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div x-show="getTodaySales() === 0" class="bg-indigo-50/50 border border-indigo-100 p-4 rounded-3xl text-center">
                <i class="fa-solid fa-mug-hot text-indigo-300 text-2xl mb-2"></i>
                <p class="text-sm font-bold text-indigo-600">يوم سعيد! استخدم زر الإضافة (+) لبدء العمليات.</p>
            </div>
            
        </div>
        <div x-show="currentTab === 'pos' && activeView === ''" x-transition.opacity class="flex flex-col h-full space-y-4">
            
            <div class="sticky top-[80px] z-30 glass-nav p-3 rounded-[2rem] space-y-3 shadow-sm border border-slate-200/60">
                <div class="relative flex gap-2">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" x-model="search" placeholder="ابحث لبيع منتج..." class="w-full py-3 pr-12 pl-4 bg-slate-50 border border-slate-200 focus:border-indigo-500 rounded-[1rem] outline-none font-bold text-sm transition-all shadow-inner">
                    </div>
                    <button @click="openScanner('pos')" class="w-12 bg-indigo-50 text-indigo-600 rounded-[1rem] flex items-center justify-center active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
                </div>
                
                <div class="flex gap-1.5 overflow-x-auto custom-scrollbar pb-1">
                    <button @click="posFilter='new'" :class="posFilter==='new' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">هواتف جديدة</button>
                    <button @click="posFilter='used'" :class="posFilter==='used' ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">مستعملة</button>
                    <button @click="posFilter='all'" :class="posFilter==='all' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">إكسسوار وعام</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pb-24">
                <template x-for="item in filteredInventoryPOS">
                    <div @click="addToCart(item)" class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm active:scale-95 hover:border-indigo-300 transition-all cursor-pointer relative overflow-hidden">
                        <template x-if="item.Category && item.Category.includes('هاتف')">
                            <span class="inline-block bg-indigo-50 text-indigo-600 text-[8px] px-2 py-0.5 rounded-md font-black mb-2 absolute top-3 left-3">هاتف</span>
                        </template>
                        <h4 class="font-black text-xs text-slate-800 line-clamp-2 leading-snug h-8 pr-1 mt-1" x-text="item.Product_Name"></h4>
                        <div class="mt-4 flex justify-between items-end border-t border-slate-50 pt-2">
                            <span class="text-indigo-600 font-black text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></span>
                            <span class="text-[9px] font-bold px-2 py-1 rounded-lg" :class="item.Stock > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'" x-text="item.Stock > 0 ? 'مخزن: ' + item.Stock : 'نفد'"></span>
                        </div>
                    </div>
                </template>
                <div x-show="filteredInventoryPOS.length === 0" class="col-span-2 py-12 text-center">
                    <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto flex items-center justify-center text-slate-300 mb-3"><i class="fa-solid fa-box-open text-2xl"></i></div>
                    <p class="text-slate-400 font-bold text-sm">لا توجد منتجات مطابقة</p>
                </div>
            </div>

            <button x-show="cart.length > 0" @click="showCart = true" class="fixed bottom-[85px] left-4 right-4 bg-slate-800 text-white p-4 rounded-[1.5rem] shadow-xl flex justify-between items-center z-[200] active:scale-95 transition-transform border border-slate-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center relative">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 rounded-full text-[10px] font-black flex items-center justify-center border-2 border-slate-800" x-text="cart.length"></span>
                    </div>
                    <span class="font-black text-sm">مراجعة السلة والدفع</span>
                </div>
                <span class="font-black text-lg text-emerald-400 tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></span>
            </button>
        </div>

        <div x-show="currentTab === 'operations' && activeView === ''" x-transition.opacity class="space-y-4">
            <h3 class="font-black text-slate-800 mb-2 flex items-center gap-2 text-lg"><div class="w-1.5 h-6 bg-indigo-500 rounded-full"></div> لوحة الإدارة</h3>
            <div class="grid grid-cols-2 gap-3">
                <button @click="activeView = 'inventory'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                    <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-boxes-stacked"></i></div>
                    <span class="font-black text-slate-800 text-sm">إدارة المخزن</span>
                </button>
                <button @click="activeView = 'maintenance'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                    <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <span class="font-black text-slate-800 text-sm">قسم الصيانة</span>
                </button>
                <button @click="activeView = 'wallets'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                    <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-wallet"></i></div>
                    <span class="font-black text-slate-800 text-sm">المحافظ والكاش</span>
                </button>
                <button @click="showCustomersModal = true" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform">
                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-users"></i></div>
                    <span class="font-black text-slate-800 text-sm">سجل العملاء</span>
                </button>
                <button x-show="user.role === 'admin'" @click="showExpensesReportsModal = true" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 transition-transform col-span-2">
                    <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-money-bill-wave"></i></div>
                    <span class="font-black text-slate-800 text-sm">المصروفات المحددة</span>
                </button>
            </div>
            
            <button @click="showAllMaintenanceModal = true" class="w-full mt-4 bg-slate-800 text-white p-4 rounded-[1.5rem] font-black flex justify-between items-center active:scale-95">
                <span><i class="fa-solid fa-clipboard-check ml-2"></i> تسليم أجهزة الصيانة</span>
                <i class="fa-solid fa-chevron-left opacity-50"></i>
            </button>
        </div>

        <div x-show="currentTab === 'more' && activeView === ''" x-transition.opacity class="space-y-4">
            
            <div class="glass-panel p-5 rounded-[2rem] flex items-center gap-4">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-2xl border-4 border-white shadow-sm"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h3 class="font-black text-lg text-slate-800" x-text="user.username"></h3>
                    <p class="text-xs font-bold text-slate-500" x-text="user.role === 'admin' ? 'مدير النظام' : 'موظف مبيعات'"></p>
                </div>
            </div>

            <div class="glass-panel p-2 rounded-[2rem] space-y-1">
                <button @click="activeView = 'reports'" class="w-full flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-[14px] flex items-center justify-center"><i class="fa-solid fa-chart-pie"></i></div>
                        <span class="font-black text-slate-800">التقارير المالية المفصلة</span>
                    </div>
                    <i class="fa-solid fa-chevron-left text-slate-300"></i>
                </button>
                
                <button x-show="user.role === 'admin'" @click="openAddUserModal()" class="w-full flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-[14px] flex items-center justify-center"><i class="fa-solid fa-user-plus"></i></div>
                        <span class="font-black text-slate-800">إضافة مستخدم جديد</span>
                    </div>
                    <i class="fa-solid fa-chevron-left text-slate-300"></i>
                </button>
            </div>

            <button @click="logout()" class="w-full glass-panel border-rose-100 p-5 rounded-[2rem] text-rose-600 font-black flex justify-center items-center gap-2 active:scale-95 mt-8">
                <i class="fa-solid fa-power-off"></i> تسجيل الخروج
            </button>
        </div>


        <div x-show="activeView === 'inventory'" x-cloak class="fixed inset-0 z-50 bg-[#f8fafc] overflow-y-auto pb-28 custom-scrollbar">
            <div class="sticky top-0 glass-nav p-4 flex items-center gap-4 z-20 shadow-sm">
                <button @click="activeView = ''" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-slate-600"><i class="fa-solid fa-arrow-right"></i></button>
                <h2 class="text-lg font-black text-slate-800">إدارة المخزن</h2>
            </div>
            <div class="p-4 space-y-4">
                <button @click="showBestSellersModal = true" class="w-full glass-panel bg-gradient-to-r from-amber-100 to-orange-100 text-amber-800 p-4 rounded-[1.5rem] font-black text-sm flex justify-between items-center border border-amber-200/50">
                    <span><i class="fa-solid fa-ranking-star ml-2"></i> المنتجات الأكثر مبيعاً</span>
                    <i class="fa-solid fa-chevron-left opacity-50"></i>
                </button>

                <div class="glass-panel p-4 rounded-[1.5rem] space-y-3">
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" x-model="invSearch" placeholder="بحث بالاسم أو الباركود..." class="w-full py-3 pr-10 pl-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                        </div>
                        <button @click="openScanner('invSearch')" class="w-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-qrcode"></i></button>
                    </div>
                    <div class="flex bg-slate-100/50 p-1 rounded-xl">
                        <button @click="invFilter = 'all'" :class="invFilter === 'all' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="flex-1 py-2 rounded-lg font-black text-[10px]">الكل</button>
                        <button @click="invFilter = 'shortages'" :class="invFilter === 'shortages' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'" class="flex-1 py-2 rounded-lg font-black text-[10px]"><i class="fa-solid fa-triangle-exclamation ml-1"></i> النواقص</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <template x-for="item in processedInventory">
                        <div @click="openInventoryProduct(item)" class="glass-panel p-4 rounded-2xl bg-white flex justify-between items-center cursor-pointer border border-transparent">
                            <div class="flex gap-3 items-center">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="(item.Category||'').includes('هاتف') ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'"><i class="fa-solid" :class="(item.Category||'').includes('هاتف') ? 'fa-mobile-screen' : 'fa-box'"></i></div>
                                <div>
                                    <p class="font-black text-sm text-slate-800 line-clamp-1" x-text="item.Product_Name"></p>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1" x-text="(item.Category||'عام') + ' • كود: ' + item.Code"></p>
                                </div>
                            </div>
                            <div class="text-left flex flex-col items-end">
                                <p class="font-black text-indigo-600 text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></p>
                                <span class="text-[9px] font-black px-2 py-0.5 rounded-lg mt-1" :class="item.Stock <= (item.Min_Stock||1) ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-600'" x-text="'مخزن: ' + item.Stock"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 to-transparent flex justify-end">

showInvoices(category) { this.invoicesFilter = category; this.showInvoicesModal = true; },
showWalletTransactions() { this.walletTransactions = (this.data.Wallets || []).filter(w => this.isDateInRange(w.Date)); this.showWalletTransactionsModal = true; },
showDebtors() { const debts = {}; (this.data.Sales || []).forEach(sale => { if (sale.Payment_Type === 'Credit') { const customer = sale.Customer || 'عميل نقدي'; const debt = Number(sale.Total || 0) - Number(sale.Paid || 0); if (debt > 0) { if (!debts[customer]) debts[customer] = 0; debts[customer] += debt; } } });
(this.data.Customers || []).forEach(customer => { if (customer.Debt && Number(customer.Debt) > 0) { if (!debts[customer.Name]) debts[customer.Name] = 0; debts[customer.Name] += Number(customer.Debt); } });
this.debtors = Object.keys(debts).map(customer => ({ name: customer, totalDebt: debts[customer] })); this.showDebtorsModal = true; },
showDebtorInvoices(customer) { this.selectedDebtor = customer; this.debtorInvoices = (this.data.Sales || []).filter(sale => sale.Customer === customer && sale.Payment_Type === 'Credit' && (Number(sale.Total || 0) - Number(sale.Paid || 0)) > 0 );
this.showDebtorInvoicesModal = true; },
showCustomers() { this.customers = (this.data.Customers || []).map(customer => { const customerSales = (this.data.Sales || []).filter(sale => sale.Customer === customer.Name); const totalDebt = customerSales.filter(sale => sale.Payment_Type === 'Credit').reduce((sum, sale) => sum + (Number(sale.Total || 0) - Number(sale.Paid || 0)), 0); return { ...customer, totalDebt }; });
this.showCustomersModal = true; },
editSalePayment(sale) { this.editPaymentForm = { saleId: sale.ID || '', paid: Number(sale.Paid || 0) }; this.editPaymentModal = true; },
async updateSalePayment() { this.loading = true; await this.callApi('updateSalePayment', this.editPaymentForm); this.editPaymentModal = false; this.fetchData(); },
getLimitColor(name, limit, type = 'outgoing') { const percent = this.getLimitPercent(name, limit, type); if (percent >= 80) return 'bg-rose-500';
if (percent >= 50) return 'bg-amber-500'; return 'bg-emerald-500'; }
}
}
</script>
