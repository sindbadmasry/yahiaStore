<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">
<title>2M - Modern UI Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
    [x-cloak] { display: none !important; }
    /* Modern Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    /* Glassmorphism Utilities */
    .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); }
    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.3); }
    /* Status Indicators */
    .m-pending { border-right: 6px solid #f59e0b; }
    .m-repaired { border-right: 6px solid #3b82f6; }
    .m-delivered { border-right: 6px solid #10b981; }
    .m-rejected { border-right: 6px solid #ef4444; }
</style>
</head>
<body x-data="erpApp()" x-init="init()" class="text-slate-800 min-h-screen pb-28">

<div x-show="loading" class="fixed inset-0 z-[1000] bg-slate-900/50 backdrop-blur-lg flex flex-col items-center justify-center text-white transition-all">
    <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
    <p class="font-black tracking-widest animate-pulse">جاري المعالجة...</p>
</div>

<div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel p-10 rounded-[2.5rem] relative overflow-hidden">
        <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob"></div>
        <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-indigo-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-2000"></div>
        
        <div class="relative z-10 text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl mb-6 shadow-xl shadow-blue-500/30 transform rotate-3">
                <i class="fa-solid fa-rocket -rotate-3"></i>
            </div>
            <h2 class="text-4xl font-black text-slate-800 tracking-tight">2M</h2>
            <p class="text-slate-500 font-bold mt-2">تسجيل الدخول للنظام</p>
        </div>
        <div class="relative z-10 space-y-5">
            <div class="relative">
                <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl outline-none font-bold transition-all">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl outline-none font-bold transition-all">
            </div>
            <button @click="login()" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-black text-lg shadow-lg shadow-slate-900/20 transition-all active:scale-95 mt-2">دخول</button>
        </div>
    </div>
</div>

<template x-if="isLoggedIn">
<div class="max-w-4xl mx-auto relative">
    <header class="glass-nav sticky top-0 z-40 px-6 py-5 flex justify-between items-center rounded-b-3xl shadow-sm mb-6 mx-2">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-bolt text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-xl text-slate-800 leading-none mb-1" :class="user.role === 'admin' ? 'cursor-pointer hover:text-indigo-600 transition-colors' : ''" @click="user.role === 'admin' ? openAddUserModal() : null">2M System</h1>
                <div class="flex items-center gap-1 bg-indigo-50 px-2 py-0.5 rounded-md w-fit">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                    <p class="text-[10px] font-bold text-indigo-700" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ')'"></p>
                </div>
            </div>
        </div>
        <div class="flex gap-2 bg-slate-100/50 p-1.5 rounded-2xl border border-slate-200/50">
            <button @click="fetchData()" class="w-10 h-10 bg-white text-indigo-600 rounded-xl shadow-sm hover:scale-105 transition-transform"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
            <button @click="logout()" class="w-10 h-10 bg-white text-rose-500 rounded-xl shadow-sm hover:scale-105 transition-transform"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <main class="px-4 space-y-6">
        
        <div x-show="currentTab === 'reports' && user.role === 'admin'" class="space-y-6">
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-[2rem] text-white shadow-xl shadow-slate-900/20 relative overflow-hidden group">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                <div class="relative z-10 flex justify-between items-start">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1"><i class="fa-solid fa-cash-register ml-1"></i> كاش المحل الحالي</p>
                        <h3 class="text-4xl font-black tabular-nums tracking-tight" x-text="shopCash.toLocaleString() + ' ج'"></h3>
                    </div>
                    <button @click="updateShopCash()" class="w-10 h-10 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-md transition-all group-hover:rotate-12"><i class="fa-solid fa-pen text-sm"></i></button>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-[2rem]">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-xs font-black text-slate-800 uppercase tracking-wider"><i class="fa-solid fa-filter text-indigo-500 ml-1"></i> فلتر التقارير</p>
                </div>
                <div class="flex gap-2 mb-4">
                    <button @click="setTodayFilter(); fetchData()" class="flex-1 py-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl text-xs font-black transition-colors">اليوم</button>
                    <button @click="setMonthFilter(); fetchData()" class="flex-1 py-3 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl text-xs font-black transition-colors">الشهر الحالي</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-2 rounded-xl border border-slate-100">
                        <label class="block text-[10px] font-bold text-slate-400 ml-2 mb-1">من تاريخ</label>
                        <input type="date" x-model="filterDate.from" @change="fetchData()" class="w-full bg-transparent text-xs font-bold outline-none text-slate-700">
                    </div>
                    <div class="bg-white p-2 rounded-xl border border-slate-100">
                        <label class="block text-[10px] font-bold text-slate-400 ml-2 mb-1">إلى تاريخ</label>
                        <input type="date" x-model="filterDate.to" @change="fetchData()" class="w-full bg-transparent text-xs font-bold outline-none text-slate-700">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-[2rem] cursor-pointer hover:-translate-y-1 transition-transform" @click="showInvoices('هاتف جديد')">
                    <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-3"><i class="fa-solid fa-mobile-screen"></i></div>
                    <p class="text-xs font-black text-slate-800 mb-1">هواتف جديدة</p>
                    <p class="text-lg font-black text-blue-600 tabular-nums" x-text="getFilteredProfits().newPhone.toLocaleString() + ' ج'"></p>
                    <p class="text-[10px] text-slate-400 font-bold mt-2">مبيعات: <span x-text="getTotalSales('هاتف جديد').toLocaleString() + ' ج'"></span></p>
                </div>
                <div class="glass-panel p-5 rounded-[2rem] cursor-pointer hover:-translate-y-1 transition-transform" @click="showInvoices('هاتف مستعمل')">
                    <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-3"><i class="fa-solid fa-mobile-button"></i></div>
                    <p class="text-xs font-black text-slate-800 mb-1">هواتف مستعملة</p>
                    <p class="text-lg font-black text-amber-600 tabular-nums" x-text="getFilteredProfits().usedPhone.toLocaleString() + ' ج'"></p>
                    <p class="text-[10px] text-slate-400 font-bold mt-2">مبيعات: <span x-text="getTotalSales('هاتف مستعمل').toLocaleString() + ' ج'"></span></p>
                </div>
                <div class="glass-panel p-5 rounded-[2rem] cursor-pointer hover:-translate-y-1 transition-transform" @click="showWalletTransactions()">
                    <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-3"><i class="fa-solid fa-wallet"></i></div>
                    <p class="text-xs font-black text-slate-800 mb-1">أرباح المحافظ</p>
                    <p class="text-lg font-black text-emerald-600 tabular-nums" x-text="getFilteredProfits().wallet.toLocaleString() + ' ج'"></p>
                    <p class="text-[10px] text-slate-400 font-bold mt-2">رصيد: <span x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></span></p>
                </div>
                <div class="glass-panel p-5 rounded-[2rem] cursor-pointer hover:-translate-y-1 transition-transform" @click="showInvoices('عام')">
                    <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mb-3"><i class="fa-solid fa-headphones"></i></div>
                    <p class="text-xs font-black text-slate-800 mb-1">إكسسوار وعام</p>
                    <p class="text-lg font-black text-purple-600 tabular-nums" x-text="getFilteredProfits().general.toLocaleString() + ' ج'"></p>
                    <p class="text-[10px] text-slate-400 font-bold mt-2">مبيعات: <span x-text="getTotalSales('عام').toLocaleString() + ' ج'"></span></p>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-[2rem]">
                <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><div class="w-2 h-6 bg-indigo-500 rounded-full"></div> إحصائيات الصيانة</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white rounded-2xl p-3 text-center border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 mb-1">المدفوع</p>
                        <p class="text-sm font-black text-slate-700 tabular-nums" x-text="getFilteredMaintStats().totalPaid.toLocaleString()"></p>
                    </div>
                    <div class="bg-white rounded-2xl p-3 text-center border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 mb-1">التكاليف</p>
                        <p class="text-sm font-black text-rose-500 tabular-nums" x-text="getFilteredMaintStats().totalCost.toLocaleString()"></p>
                    </div>
                    <div class="bg-indigo-50 rounded-2xl p-3 text-center border border-indigo-100">
                        <p class="text-[10px] font-bold text-indigo-600 mb-1">صافي الربح</p>
                        <p class="text-sm font-black text-indigo-700 tabular-nums" x-text="getFilteredMaintStats().netProfit.toLocaleString()"></p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-4 rounded-3xl cursor-pointer hover:bg-rose-50/50 transition-colors border-l-4 border-l-rose-500" @click="showDebtors()">
                    <p class="text-[10px] font-bold text-rose-500 uppercase">إجمالي المديونيات</p>
                    <p class="text-xl font-black tabular-nums text-slate-800 mt-1" x-text="getTotalDebts().toLocaleString() + ' ج'"></p>
                </div>
                <div class="glass-panel p-4 rounded-3xl cursor-pointer hover:bg-orange-50/50 transition-colors border-l-4 border-l-orange-500" @click="showExpensesReportsModal = true">
                    <p class="text-[10px] font-bold text-orange-500 uppercase">المصروفات المحددة</p>
                    <p class="text-xl font-black tabular-nums text-slate-800 mt-1" x-text="getTotalExpenses().toLocaleString() + ' ج'"></p>
                </div>
            </div>
        </div>

        <div x-show="currentTab === 'reports' && user.role !== 'admin'" class="glass-panel rounded-[2rem] p-10 flex flex-col items-center justify-center text-slate-400 mt-10">
            <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-lock text-3xl"></i></div>
            <p class="font-black text-lg text-slate-600">منطقة مخصصة للمديرين فقط</p>
        </div>

        <div x-show="currentTab === 'wallets'" class="space-y-4">
            <div class="glass-panel p-5 rounded-[2rem]">
                <div class="relative mb-4">
                    <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" x-model="searchWallet" placeholder="ابحث باسم المحفظة..." class="w-full py-3 pr-12 pl-4 bg-white/60 border border-white focus:bg-white rounded-xl outline-none text-xs font-bold transition-all shadow-sm">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button @click="setTodayFilter(); fetchData()" class="py-2 bg-indigo-50 text-indigo-700 rounded-xl text-xs font-black">اليوم</button>
                    <button @click="setMonthFilter(); fetchData()" class="py-2 bg-slate-50 text-slate-600 rounded-xl text-xs font-black">الشهر الحالي</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" x-model="filterDate.from" @change="fetchData()" class="w-full p-2 bg-white rounded-xl text-xs font-bold outline-none border border-slate-100">
                    <input type="date" x-model="filterDate.to" @change="fetchData()" class="w-full p-2 bg-white rounded-xl text-xs font-bold outline-none border border-slate-100">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button @click="openWalletTxModal('وارد')" class="bg-gradient-to-br from-emerald-400 to-emerald-600 text-white p-4 rounded-[2rem] font-black shadow-lg shadow-emerald-500/30 flex flex-col items-center justify-center gap-2 active:scale-95 transition-all"><i class="fa-solid fa-arrow-down text-2xl"></i> استلام كاش</button>
                <button @click="openWalletTxModal('صادر')" class="bg-gradient-to-br from-rose-400 to-rose-600 text-white p-4 rounded-[2rem] font-black shadow-lg shadow-rose-500/30 flex flex-col items-center justify-center gap-2 active:scale-95 transition-all"><i class="fa-solid fa-arrow-up text-2xl"></i> تحويل كاش</button>
            </div>

            <div class="space-y-4">
                <template x-for="w in filteredWallets">
                    <div class="glass-panel p-5 rounded-[2rem] relative overflow-hidden">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-wallet text-xl"></i></div>
                                <div>
                                    <p class="text-base font-black text-slate-800" x-text="w.name"></p>
                                    <p class="text-[10px] font-bold text-slate-400">الليميت: <span class="text-slate-600 tabular-nums" x-text="w.limit.toLocaleString() + ' ج'"></span></p>
                                </div>
                            </div>
                            <button x-show="user.role === 'admin'" @click="deleteWallet(w.name)" class="w-8 h-8 flex items-center justify-center bg-rose-50 text-rose-500 rounded-full hover:bg-rose-100 transition-colors"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                        
                        <div class="bg-white/50 rounded-2xl p-4 border border-white grid grid-cols-3 gap-2 text-center">
                            <div>
                                <p class="text-[10px] font-bold text-emerald-600 mb-1">صادر</p>
                                <p class="text-sm font-black text-slate-800 tabular-nums" x-text="calcWalletFiltered(w.name).outgoing.toLocaleString()"></p>
                                <div class="mt-2 h-1.5 w-full bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" :style="`width: ${getLimitPercent(w.name, w.limit, 'outgoing')}%`"></div></div>
                            </div>
                            <div class="border-x border-slate-200/50">
                                <p class="text-[10px] font-bold text-rose-600 mb-1">وارد</p>
                                <p class="text-sm font-black text-slate-800 tabular-nums" x-text="calcWalletFiltered(w.name).incoming.toLocaleString()"></p>
                                <div class="mt-2 h-1.5 w-full bg-slate-200 rounded-full overflow-hidden w-4/5 mx-auto"><div class="h-full bg-rose-500" :style="`width: ${getLimitPercent(w.name, w.limit, 'incoming')}%`"></div></div>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-indigo-600 mb-1">الرصيد</p>
                                <p class="text-sm font-black text-indigo-700 tabular-nums" x-text="calcWallet(w.name).balance.toLocaleString()"></p>
                            </div>
                        </div>
                        <div x-show="Math.max(getLimitPercent(w.name, w.limit, 'outgoing'), getLimitPercent(w.name, w.limit, 'incoming')) >= 95" class="mt-3 text-[10px] text-rose-700 bg-rose-100 p-2 rounded-xl font-black text-center animate-pulse border border-rose-200">
                            ⚠️ وصلت لـ 95% من حد المحفظة
                        </div>
                    </div>
                </template>
                <button x-show="user.role === 'admin'" @click="addNewWallet()" class="w-full py-4 border-2 border-dashed border-indigo-200 text-indigo-500 rounded-[2rem] font-black hover:bg-indigo-50 transition-colors">+ إضافة محفظة جديدة</button>
            </div>
        </div>

        <div x-show="currentTab === 'maintenance'" class="space-y-4">
            <button @click="openMaintenanceModal()" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-[2rem] font-black shadow-lg shadow-slate-900/20 flex items-center justify-center gap-2 active:scale-95 transition-all">
                <i class="fa-solid fa-plus-circle"></i> تذكرة صيانة جديدة
            </button>
            
            <div class="glass-panel p-2 rounded-2xl flex gap-1 overflow-x-auto custom-scrollbar">
                <button @click="mFilter = 'قيد الانتظار'" :class="mFilter === 'قيد الانتظار' ? 'bg-amber-500 text-white shadow-md' : 'hover:bg-slate-100 text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">انتظار</button>
                <button @click="mFilter = 'تم التصليح'" :class="mFilter === 'تم التصليح' ? 'bg-blue-500 text-white shadow-md' : 'hover:bg-slate-100 text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">مُصلح</button>
                <button @click="mFilter = 'تم التسليم'" :class="mFilter === 'تم التسليم' ? 'bg-emerald-500 text-white shadow-md' : 'hover:bg-slate-100 text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">مُسلم</button>
                <button @click="mFilter = 'مرفوض'" :class="mFilter === 'مرفوض' ? 'bg-rose-500 text-white shadow-md' : 'hover:bg-slate-100 text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">مرفوض</button>
            </div>

            <div class="space-y-3">
                <template x-for="m in filteredMaintenance">
                    <div class="glass-panel p-4 rounded-3xl flex flex-col bg-white" :class="getMClass(m.Status)">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="font-black text-sm text-slate-800" x-text="m.Phone_Type || 'جهاز غير محدد'"></h4>
                                <p class="text-[11px] font-bold text-slate-400 mt-1 line-clamp-1" x-text="'العطل: ' + (m.Issue || 'غير محدد')"></p>
                            </div>
                            <span class="text-[10px] font-black px-3 py-1 rounded-xl bg-slate-100 text-slate-600" x-text="m.Status"></span>
                        </div>
                        <div class="flex items-center justify-between border-t border-slate-100 pt-3 mt-1">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500"><i class="fa-solid fa-user text-[10px]"></i></div>
                                <div>
                                    <p class="text-[10px] font-black text-slate-700" x-text="m.Client_Name || 'بدون اسم'"></p>
                                    <p class="text-[9px] font-bold text-slate-400" x-text="m.Phone_Number || 'لا يوجد رقم'"></p>
                                </div>
                            </div>
                            <div class="text-left flex flex-col items-end">
                                <p class="text-sm font-black tabular-nums text-indigo-600" x-text="(m.Expected_Cost || 0) + ' ج'"></p>
                                <button @click="openEditMaintenanceModal(m)" class="mt-1 text-[10px] font-black text-slate-700 bg-slate-100 hover:bg-slate-200 px-4 py-1.5 rounded-xl transition-colors">تحديث</button>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="filteredMaintenance.length === 0" class="glass-panel py-12 text-center rounded-3xl">

},

(this.data.Sales || []).forEach(sale => {

let items = JSON.parse(sale.Items_JSON || "[]");

else general += profit; } else { general += profit; }
}); } catch (e) { }
} }); return { newPhone, usedPhone, general, wallet };
},

(this.data.Maintenance || []).forEach(m => { if (m.Status === 'تم التسليم' && this.isDateInRange(m.Date)) { totalPaid += Number(m.paid || m.Paid || 0); totalCost += Number(m.Cost_Price || 0); } });

if (!this.isDateInRange(sale.Date)) return false;
try { let items = JSON.parse(sale.Items_JSON || "[]"); if (this.invoicesFilter === 'عام') { return items.some(item => { let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); return invItem && !invItem.Category.includes('هاتف'); });
} else { return items.some(item => { let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); return invItem && invItem.Category === this.invoicesFilter; });
} } catch (e) { return false; }
});
},
getMClass(status) { status = String(status).trim(); if (status === 'قيد الانتظار') return 'm-pending'; if (status === 'تم التصليح') return 'm-repaired';
if (status === 'تم التسليم') return 'm-delivered'; return 'm-rejected'; },
openMaintenanceModal() { this.mForm = { Client_Name: '', Phone_Number: '', Phone_Type: '', Issue: '', Expected_Cost: '' }; this.showMaintenanceModal = true; },
async saveNewMaintenance() { this.loading = true; await this.callApi('saveMaintenance', { Ticket_ID: "T-" + Date.now().toString().slice(-6), Status: 'قيد الانتظار', Client_Name: this.mForm.Client_Name || "بدون اسم", Phone_Number: this.mForm.Phone_Number || "", Phone_Type: this.mForm.Phone_Type || "غير محدد", Issue: this.mForm.Issue || "غير محدد", Expected_Cost: this.mForm.Expected_Cost || 0, paid: 0, Cost_Price: 0, User: this.user.username });
this.showMaintenanceModal = false; this.fetchData(); },
openEditMaintenanceModal(m) { this.mEditForm = { Ticket_ID: m.Ticket_ID, Status: m.Status || 'قيد الانتظار', Expected_Cost: m.Expected_Cost || 0, paid: m.paid ||
m.Paid || 0, Cost_Price: m.Cost_Price || 0 }; this.showEditMaintenanceModal = true; },
async submitEditMaintenance() { this.loading = true; await this.callApi('updateMaintenance', { Ticket_ID: this.mEditForm.Ticket_ID, Status: this.mEditForm.Status, Expected_Cost: this.mEditForm.Expected_Cost || 0, paid: this.mEditForm.paid || 0, Cost_Price: this.mEditForm.Cost_Price || 0 });
this.showEditMaintenanceModal = false; this.fetchData(); },
get dynamicWallets() { return (this.data.Settings || []).filter(s => { const key = s.Key || s.Setting_Name || s[0]; return key && key.toString().startsWith("Limit_"); }).map(s => { const key = s.Key || s.Setting_Name || s[0]; const val = s.Value || s[1] || 0; return { name: key.replace("Limit_", ""), limit: Number(val) }; });
},
calcWallet(name) { const txs = (this.data.Wallets || []).filter(w => String(w.Wallet_Name || "").trim() === String(name).trim()); const now = new Date();
let incoming = 0, outgoing = 0, balance = 0, monthlyIncoming = 0, monthlyOutgoing = 0;
txs.forEach(t => { const amt = Number(t.Amount || 0); const type = String(t.Type || "").trim(); const d = new Date(t.Date); if (type === 'وارد') { incoming += amt; balance += amt; if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthlyIncoming += amt; } else if (type === 'صادر') { outgoing += amt; balance -= amt; if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthlyOutgoing += amt; } });
return { incoming, outgoing, balance, monthlyIncoming, monthlyOutgoing }; },
calcWalletFiltered(name) { const txs = (this.data.Wallets || []).filter(w => String(w.Wallet_Name || "").trim() === String(name).trim() && this.isDateInRange(w.Date));
let incoming = 0, outgoing = 0; txs.forEach(t => { const amt = Number(t.Amount || 0); const type = String(t.Type || "").trim(); if (type === 'وارد') incoming += amt; else if (type === 'صادر') outgoing += amt; });
return { incoming, outgoing }; },
getLimitRemaining(name, limit) { const { monthlyIncoming, monthlyOutgoing } = this.calcWallet(name); return { incoming: limit ?
Math.max(limit - monthlyIncoming, 0) : 0, outgoing: limit ? Math.max(limit - monthlyOutgoing, 0) : 0 }; },
openWalletTxModal(type) { this.wTxForm = { type: type, wallet: '', amount: '', profit: '', notes: '', fromCash: false };
this.showWalletTxModal = true; },
async submitWalletTx() { if (!this.wTxForm.wallet || !this.wTxForm.amount) return alert("الرجاء اختيار المحفظة وكتابة المبلغ"); const wData = this.calcWallet(this.wTxForm.wallet);
const walletObj = this.dynamicWallets.find(dw => dw.name === this.wTxForm.wallet); if (this.wTxForm.type === 'صادر' && walletObj && walletObj.limit > 0) { if ((wData.monthlyOutgoing + Number(this.wTxForm.amount)) > walletObj.limit) { this.showConfirm("تنبيه: تتخطى الليميت الشهري! الاستمرار؟", async () => { this.loading = true; await this.callApi('saveWalletTransaction', { wallet: this.wTxForm.wallet, type: this.wTxForm.type, amount: Number(this.wTxForm.amount), notes: this.wTxForm.notes, user: this.user.username, profit: Number(this.wTxForm.profit || 0), fromCash: this.wTxForm.fromCash }); this.showWalletTxModal = false; this.fetchData(); });
return; } } this.loading = true; await this.callApi('saveWalletTransaction', { wallet: this.wTxForm.wallet, type: this.wTxForm.type, amount: Number(this.wTxForm.amount), notes: this.wTxForm.notes, user: this.user.username, profit: Number(this.wTxForm.profit || 0), fromCash: this.wTxForm.fromCash });
this.showWalletTxModal = false; this.fetchData(); },
addNewWallet() { this.modalAddWallet = { show: true, name: '', limit: 50000 }; },
async submitNewWallet() { if(!this.modalAddWallet.name) return; this.modalAddWallet.show = false; this.loading = true; await this.callApi('saveWalletConfig', { name: this.modalAddWallet.name, limit: this.modalAddWallet.limit }); this.fetchData();
},
async deleteWallet(name) { this.showConfirm('متأكد من حذف محفظة ' + name + ' بالكامل؟', async () => { this.loading = true; await this.callApi('deleteWallet', { name: name }); this.fetchData(); });
},
updateShopCash() { this.modalUpdateCash = { show: true, amount: this.shopCash }; },
async submitUpdateCash() { this.modalUpdateCash.show = false; this.loading = true; await this.callApi('setShopCash', { amount: Number(this.modalUpdateCash.amount) }); this.fetchData(); },
getTotalSales(category) { let total = 0; (this.data.Sales || []).forEach(sale => { if (this.isDateInRange(sale.Date)) { try { let items = JSON.parse(sale.Items_JSON || "[]"); items.forEach(item => { let invItem = (this.data.Inventory || []).find(i => i.Code == item.code); if (invItem) { let itemCategory = invItem.Category || 'عام'; if (category === 'عام' && !itemCategory.includes('هاتف')) total += Number(item.price) * Number(item.qty); else if (itemCategory === category) total += Number(item.price) * Number(item.qty); } else if (category === 'عام') { total += Number(item.price) * Number(item.qty); } }); } catch (e) { } } });
return total; },
getTotalWalletBalance() { let total = 0; this.dynamicWallets.forEach(w => { total += this.calcWallet(w.name).balance; }); return total; },
getTotalDebts() { let total = 0; (this.data.Sales || []).forEach(sale => { if (this.isDateInRange(sale.Date) && sale.Payment_Type === 'Credit') { total += Number(sale.Total || 0) - Number(sale.Paid || 0); } });
return total; },
getLimitPercent(name, limit, type = 'outgoing') { if (!limit) return 0; const wallet = this.calcWallet(name);
const used = type === 'incoming' ? wallet.monthlyIncoming : wallet.monthlyOutgoing; return Math.min((used / limit) * 100, 100); },
showInvoices(category) { this.invoicesFilter = category; this.showInvoicesModal = true; },
showWalletTransactions() { this.walletTransactions = (this.data.Wallets || []).filter(w => this.isDateInRange(w.Date)); this.showWalletTransactionsModal = true; },
showDebtors() { const debts = {}; (this.data.Sales || []).forEach(sale => { if (sale.Payment_Type === 'Credit') { const customer = sale.Customer || 'عميل نقدي'; const debt = Number(sale.Total || 0) - Number(sale.Paid || 0); if (debt > 0) { if (!debts[customer]) debts[customer] = 0; debts[customer] += debt; } } });
(this.data.Customers || []).forEach(customer => { if (customer.Debt && Number(customer.Debt) > 0) { if (!debts[customer.Name]) debts[customer.Name] = 0; debts[customer.Name] += Number(customer.Debt); } });
this.debtors = Object.keys(debts).map(customer => ({ name: customer, totalDebt: debts[customer] })); this.showDebtorsModal = true; },
showDebtorInvoices(customer) { this.selectedDebtor = customer; this.debtorInvoices = (this.data.Sales || []).filter(sale => sale.Customer === customer && sale.Payment_Type === 'Credit' && (Number(sale.Total || 0) - Number(sale.Paid || 0)) > 0 );
this.showDebtorInvoicesModal = true; },
showCustomers() { this.customers = (this.data.Customers || []).map(customer => { const customerSales = (this.data.Sales || []).filter(sale => sale.Customer === customer.Name); const totalDebt = customerSales.filter(sale => sale.Payment_Type === 'Credit').reduce((sum, sale) => sum + (Number(sale.Total || 0) - Number(sale.Paid || 0)), 0); return { ...customer, totalDebt }; });
this.showCustomersModal = true; },
editSalePayment(sale) { this.editPaymentForm = { saleId: sale.ID || '', paid: Number(sale.Paid || 0) }; this.editPaymentModal = true; },
async updateSalePayment() { this.loading = true; await this.callApi('updateSalePayment', this.editPaymentForm); this.editPaymentModal = false; this.fetchData(); },
getLimitColor(name, limit, type = 'outgoing') { const percent = this.getLimitPercent(name, limit, type); if (percent >= 80) return 'bg-rose-500';
if (percent >= 50) return 'bg-amber-500'; return 'bg-emerald-500'; }
}
}
</script>
