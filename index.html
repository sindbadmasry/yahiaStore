<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <title>2M ERP | Mobile First Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; color: #1e293b; }
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 6rem); }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .bottom-nav-container { border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body x-data="erpApp()" x-init="init()" class="min-h-screen relative pb-safe">

    <div x-show="loading" class="fixed inset-0 z-[1000] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="font-black animate-pulse text-lg">جاري التنفيذ...</p>
    </div>

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-slate-50 flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto h-full">
        <div class="text-center mb-10 w-full">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] mx-auto flex items-center justify-center text-white text-4xl mb-6 shadow-2xl shadow-blue-200">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800">2M ERP</h2>
            <p class="text-slate-400 font-bold mt-2">تسجيل الدخول للنظام</p>
        </div>
        <div class="w-full space-y-4">
            <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full p-5 bg-white border-none shadow-sm rounded-2xl outline-none font-bold text-center focus:ring-2 ring-blue-500 transition-all">
            <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full p-5 bg-white border-none shadow-sm rounded-2xl outline-none font-bold text-center focus:ring-2 ring-blue-500 transition-all">
            <button @click="login()" class="w-full py-5 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-200 transition-all active:scale-95">تسجيل الدخول</button>
        </div>
    </div>

    <template x-if="isLoggedIn">
        <div class="max-w-md mx-auto min-h-screen relative bg-slate-50 overflow-x-hidden">
            
            <header class="bg-white sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm rounded-b-[2rem]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-md"><i class="fa-solid fa-store"></i></div>
                    <div>
                        <h1 class="font-black text-lg leading-none">2M Phone</h1>
                        <p class="text-[10px] font-bold text-blue-600" x-text="user.username"></p>
                    </div>
                </div>
                <button @click="fetchData()" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </header>

            <main class="p-5 space-y-6">

                <div x-show="currentTab === 'dashboard'" class="space-y-5 slide-up">
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
                        <div class="flex justify-between items-center mb-2 z-10 relative">
                            <p class="text-xs font-bold text-slate-300">إجمالي السيولة النقدية</p>
                            <i class="fa-solid fa-wallet text-slate-400"></i>
                        </div>
                        <h3 class="text-3xl font-black tabular-nums z-10 relative" x-text="(shopCash + getTotalWalletsBalance()).toLocaleString() + ' ج'"></h3>
                        <div class="mt-4 pt-4 border-t border-slate-700/50 flex justify-between text-xs font-bold z-10 relative">
                            <div><span class="text-slate-400 block mb-1">كاش المحل</span><span class="text-emerald-400" x-text="shopCash.toLocaleString() + ' ج'"></span></div>
                            <div class="text-left"><span class="text-slate-400 block mb-1">أرصدة المحافظ</span><span class="text-blue-400" x-text="getTotalWalletsBalance().toLocaleString() + ' ج'"></span></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center items-center text-center">
                            <i class="fa-solid fa-hand-holding-dollar text-red-500 text-xl mb-2"></i>
                            <p class="text-[10px] font-bold text-slate-400">ديون السوق (الآجل)</p>
                            <h3 class="text-base font-black text-slate-800 mt-1 tabular-nums" x-text="getTotalDebts().toLocaleString() + ' ج'"></h3>
                        </div>
                        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center items-center text-center">
                            <i class="fa-solid fa-chart-line text-emerald-500 text-xl mb-2"></i>
                            <p class="text-[10px] font-bold text-slate-400">مبيعات اليوم</p>
                            <h3 class="text-base font-black text-slate-800 mt-1 tabular-nums" x-text="getTodayStats().sales.toLocaleString() + ' ج'"></h3>
                        </div>
                    </div>
                </div>

                <div x-show="currentTab === 'sales'" class="space-y-4 slide-up">
                    <div class="flex gap-2 sticky top-20 z-30 bg-slate-50 py-2">
                        <div class="relative flex-1">
                            <input type="text" x-model="search" placeholder="بحث باسم أو باركود..." class="w-full p-4 pl-12 bg-white border border-slate-100 rounded-2xl outline-none font-bold shadow-sm focus:border-blue-500">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        </div>
                        <button @click="openScannerModal('pos')" class="w-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-6">
                        <template x-for="item in filteredInventoryPOS">
                            <div @click="addToCart(item)" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 active:scale-95 transition-transform relative flex flex-col justify-between h-36">
                                <h4 class="font-black text-xs text-slate-800 line-clamp-2 mt-2 leading-snug" x-text="item.Product_Name"></h4>
                                <div class="mt-auto">
                                    <p class="text-[9px] font-bold text-slate-400 mb-1" x-text="'المتاح: ' + item.Stock"></p>
                                    <span class="text-blue-600 font-black text-lg tabular-nums leading-none block" x-text="item.Selling_Price + ' ج'"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="currentTab === 'inventory'" class="space-y-4 slide-up">
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text" x-model="invSearch" placeholder="بحث في المخزن..." class="w-full p-3 pr-10 bg-white border border-slate-100 rounded-xl text-xs font-bold outline-none shadow-sm">
                            <i class="fa-solid fa-search absolute right-3 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <template x-for="item in processedInventory">
                            <div @click="openEditProduct(item)" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center cursor-pointer active:scale-95">
                                <div class="flex-1 pr-2">
                                    <h4 class="font-black text-xs text-slate-800 line-clamp-1" x-text="item.Product_Name"></h4>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1" x-text="(item.Category||'عام') + ' | كود: ' + item.Code"></p>
                                </div>
                                <div class="text-left">
                                    <p class="font-black text-blue-600 text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></p>
                                    <p class="text-[9px] font-bold px-2 py-0.5 rounded-md mt-1 inline-block" :class="item.Stock <= (item.Min_Stock||1) ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'" x-text="'مخزن: ' + item.Stock"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                
                <div x-show="currentTab === 'customers'" class="space-y-4 slide-up">
                   <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                       <h3 class="font-black text-lg mb-3">العملاء والديون</h3>
                       <template x-for="debtor in debtors">
                            <div class="bg-slate-50 p-3 rounded-2xl mb-2 flex justify-between items-center border border-slate-100">
                                <span class="font-black text-sm" x-text="debtor.name"></span>
                                <span class="font-black text-rose-600 tabular-nums" x-text="debtor.totalDebt + ' ج'"></span>
                            </div>
                       </template>
                   </div>
                </div>

            </main>

            <div x-show="cart.length > 0 && currentTab === 'sales'" class="fixed bottom-[85px] left-0 right-0 px-6 z-30 max-w-md mx-auto slide-up pointer-events-none">
                <button @click="showCheckout = true" class="w-full bg-blue-600 text-white p-4 rounded-3xl shadow-xl flex justify-between items-center active:scale-95 pointer-events-auto border-2 border-white">
                    <div class="flex items-center gap-3">
                        <div class="bg-white/20 w-8 h-8 rounded-full flex items-center justify-center font-black text-sm" x-text="cart.length"></div>
                        <span class="font-black text-sm">إتمام البيع</span>
                    </div>
                    <span class="font-black text-lg tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></span>
                </button>
            </div>

            <div x-show="showFabMenu" x-cloak class="fixed inset-0 z-[100] flex items-end justify-center max-w-md mx-auto">
                <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="showFabMenu = false"></div>
                <div class="bg-white w-full rounded-t-[2.5rem] p-6 pb-24 relative z-10 slide-up shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
                    <h3 class="font-black text-lg text-slate-800 mb-6 text-center">العمليات السريعة</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <button @click="openExpenseModal(); showFabMenu=false" class="flex flex-col items-center gap-2 active:scale-95">
                            <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-2xl shadow-sm"><i class="fa-solid fa-money-bill-transfer"></i></div>
                            <span class="text-[10px] font-black text-slate-700">مصروف</span>
                        </button>
                        <button @click="openProductModal(); showFabMenu=false" class="flex flex-col items-center gap-2 active:scale-95">
                            <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-sm"><i class="fa-solid fa-box-open"></i></div>
                            <span class="text-[10px] font-black text-slate-700">إضافة صنف</span>
                        </button>
                        <button @click="openMaintenanceModal(); showFabMenu=false" class="flex flex-col items-center gap-2 active:scale-95">
                            <div class="w-14 h-14 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center text-2xl shadow-sm"><i class="fa-solid fa-wrench"></i></div>
                            <span class="text-[10px] font-black text-slate-700">صيانة</span>
                        </button>
                        <button @click="openAddCustomerModal(); showFabMenu=false" class="flex flex-col items-center gap-2 active:scale-95">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl shadow-sm"><i class="fa-solid fa-user-plus"></i></div>
                            <span class="text-[10px] font-black text-slate-700">عميل جديد</span>
                        </button>
                    </div>
                </div>
            </div>

            <nav class="fixed bottom-0 w-full max-w-md mx-auto bg-white bottom-nav-container z-40 pb-safe pt-2 px-4 flex justify-between items-center text-slate-400">
                <button @click="currentTab = 'dashboard'" :class="currentTab === 'dashboard' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors">
                    <i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[9px] font-black">الرئيسية</span>
                </button>
                <button @click="currentTab = 'sales'" :class="currentTab === 'sales' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors mr-4">
                    <i class="fa-solid fa-cart-shopping text-xl mb-1"></i><span class="text-[9px] font-black">البيع</span>
                </button>
                <div class="absolute left-1/2 -translate-x-1/2 -top-6">
                    <button @click="showFabMenu = !showFabMenu" class="w-14 h-14 bg-slate-900 text-white rounded-full shadow-[0_8px_20px_rgba(15,23,42,0.3)] flex items-center justify-center text-xl active:scale-95 transition-transform duration-300" :class="showFabMenu ? 'rotate-45 bg-rose-500' : ''">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <button @click="currentTab = 'inventory'" :class="currentTab === 'inventory' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors ml-4">
                    <i class="fa-solid fa-boxes-stacked text-xl mb-1"></i><span class="text-[9px] font-black">المخزن</span>
                </button>
                <button @click="currentTab = 'customers'" :class="currentTab === 'customers' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors">
                    <i class="fa-solid fa-users text-xl mb-1"></i><span class="text-[9px] font-black">العملاء</span>
                </button>
            </nav>

            <div x-show="showCheckout" class="fixed inset-0 z-[200] bg-white flex flex-col max-w-md mx-auto slide-up" x-cloak>
                <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm z-10">
                    <h2 class="font-black text-lg text-slate-800">تأكيد البيع</h2>
                    <button @click="showCheckout = false" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-600"><i class="fa-solid fa-times"></i></button>
                </header>
                <div class="flex-1 overflow-y-auto p-5 space-y-6 pb-32">
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                        <template x-for="(ci, idx) in cart">
                            <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-2">
                                <div><p class="font-black text-sm text-slate-800" x-text="ci.name"></p><p class="text-xs font-bold text-slate-500" x-text="ci.price + ' ج × ' + ci.qty"></p></div>
                                <button @click="cart.splice(idx, 1); if(cart.length===0) showCheckout=false;" class="text-rose-400"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </template>
                        <div class="pt-2 flex justify-between items-center text-lg"><span class="font-black text-slate-500">الإجمالي</span><span class="font-black text-slate-800 tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></span></div>
                    </div>
                    <div class="space-y-4">
                        <input type="text" x-model="checkout.customer" placeholder="اسم العميل (ضروري للآجل والقسط)" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold outline-none shadow-sm focus:border-blue-500">
                        <h3 class="font-black text-sm text-slate-800">طريقة الدفع</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <button @click="checkout.type='Cash'; checkout.paid=cartTotal" :class="checkout.type==='Cash'?'bg-blue-600 text-white':'bg-white text-slate-500'" class="p-3 rounded-xl border font-black text-xs transition-colors"><i class="fa-solid fa-money-bill-wave ml-1"></i>كاش</button>
                            <button @click="checkout.type='Credit'; checkout.paid=0" :class="checkout.type==='Credit'?'bg-rose-500 text-white':'bg-white text-slate-500'" class="p-3 rounded-xl border font-black text-xs transition-colors"><i class="fa-solid fa-book-open ml-1"></i>آجل</button>
                        </div>
                        <div x-show="checkout.type !== 'Credit'">
                            <input type="number" x-model.number="checkout.paid" placeholder="المدفوع الان" class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-black text-lg outline-none text-blue-600">
                        </div>
                    </div>
                </div>
                <div class="absolute bottom-0 left-0 right-0 p-5 bg-white border-t border-slate-100 pb-safe">
                    <button @click="confirmSale()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 flex justify-center gap-2"><i class="fa-solid fa-check-circle"></i> إتمام العملية</button>
                </div>
            </div>

            <div x-show="showProductModal" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-end justify-center slide-up max-w-md mx-auto" x-cloak>
                <div class="bg-white w-full rounded-t-[2.5rem] p-6 pb-safe shadow-2xl h-[85vh] overflow-y-auto custom-scrollbar">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black text-slate-800" x-text="productForm.ID ? 'تعديل الصنف' : 'إضافة صنف جديد'"></h3>
                        <button @click="showProductModal = false" class="text-slate-400 w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
                    </div>
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold text-slate-500 block mb-1">كود الباركود</label><div class="flex gap-2"><input type="text" x-model="productForm.Code" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none"><button @click="openScannerModal('product')" class="w-14 bg-slate-800 text-white rounded-xl"><i class="fa-solid fa-qrcode"></i></button></div></div>
                        <div><label class="text-xs font-bold text-slate-500 block mb-1">اسم الصنف</label><input type="text" x-model="productForm.Product_Name" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-xs font-bold text-slate-500 block mb-1">التكلفة</label><input type="number" x-model.number="productForm.Cost_Price" class="w-full p-4 bg-slate-50 rounded-xl font-black text-rose-600 outline-none border-none text-center"></div>
                            <div><label class="text-xs font-bold text-slate-500 block mb-1">سعر البيع</label><input type="number" x-model.number="productForm.Selling_Price" class="w-full p-4 bg-slate-50 rounded-xl font-black text-blue-600 outline-none border-none text-center"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-xs font-bold text-slate-500 block mb-1">الكمية الحالية</label><input type="number" x-model.number="productForm.Stock" class="w-full p-4 bg-slate-50 rounded-xl font-black outline-none border-none text-center"></div>
                            <div><label class="text-xs font-bold text-slate-500 block mb-1">الحد الأدنى</label><input type="number" x-model.number="productForm.Min_Stock" class="w-full p-4 bg-slate-50 rounded-xl font-black outline-none border-none text-center"></div>
                        </div>
                        <button @click="saveProduct()" class="w-full py-4 mt-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95">حفظ البيانات</button>
                    </div>
                </div>
            </div>

            <div x-show="showMaintenanceModal" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-end justify-center slide-up max-w-md mx-auto" x-cloak>
                <div class="bg-white w-full rounded-t-[2.5rem] p-6 pb-safe shadow-2xl h-[80vh] overflow-y-auto custom-scrollbar">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black text-slate-800" x-text="maintenanceForm.ID ? 'تحديث الصيانة' : 'تسجيل صيانة جديدة'"></h3>
                        <button @click="showMaintenanceModal = false" class="text-slate-400 w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
                    </div>
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold text-slate-500 block mb-1">اسم العميل ورقم الهاتف</label>
                            <div class="grid grid-cols-2 gap-2"><input type="text" x-model="maintenanceForm.Client_Name" placeholder="الاسم" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none"><input type="tel" x-model="maintenanceForm.Phone" placeholder="الموبايل" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none"></div>
                        </div>
                        <div><label class="text-xs font-bold text-slate-500 block mb-1">نوع الجهاز والعطل</label>
                            <input type="text" x-model="maintenanceForm.Phone_Type" placeholder="نوع الجهاز" class="w-full p-4 mb-2 bg-slate-50 rounded-xl font-bold outline-none border-none">
                            <textarea x-model="maintenanceForm.Issue" placeholder="وصف العطل بدقة" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none h-24"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-xs font-bold text-slate-500 block mb-1">التكلفة المتوقعة</label><input type="number" x-model.number="maintenanceForm.Expected_Cost" class="w-full p-4 bg-slate-50 rounded-xl font-black text-center outline-none border-none"></div>
                            <div><label class="text-xs font-bold text-slate-500 block mb-1">حالة الجهاز</label>
                                <select x-model="maintenanceForm.Status" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none">
                                    <option value="قيد الانتظار">قيد الانتظار</option>
                                    <option value="تم التصليح">تم التصليح</option>
                                    <option value="تم التسليم">تم التسليم</option>
                                </select>
                            </div>
                        </div>
                        <button @click="saveMaintenance()" class="w-full py-4 mt-4 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95">تسجيل التذكرة</button>
                    </div>
                </div>
            </div>

            <div x-show="showExpenseModal" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 max-w-md mx-auto" x-cloak>
                <div class="bg-white w-full rounded-[2rem] p-6 shadow-2xl">
                    <h3 class="text-xl font-black text-amber-600 mb-4">تسجيل مصروف جديد</h3>
                    <div class="space-y-3">
                        <select x-model="expenseForm.Category" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none">
                            <option value="">-- اختر البند --</option><option value="كهرباء">كهرباء</option><option value="إيجار">إيجار</option><option value="بضاعة نثرية">بضاعة نثرية</option><option value="أخرى">أخرى</option>
                        </select>
                        <input type="number" x-model.number="expenseForm.Amount" placeholder="المبلغ" class="w-full p-4 bg-slate-50 rounded-xl font-black text-xl text-center outline-none border-none">
                        <input type="text" x-model="expenseForm.Notes" placeholder="ملاحظات" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none">
                        <button @click="saveExpense()" class="w-full py-4 mt-2 bg-amber-500 text-white rounded-xl font-black shadow-md">خصم من الكاش</button>
                        <button @click="showExpenseModal = false" class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-black text-sm">إلغاء</button>
                    </div>
                </div>
            </div>

            <div x-show="showCustomerModal" class="fixed inset-0 z-[200] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 max-w-md mx-auto" x-cloak>
                <div class="bg-white w-full rounded-[2rem] p-6 shadow-2xl">
                    <h3 class="text-xl font-black text-indigo-600 mb-4">إضافة عميل جديد</h3>
                    <div class="space-y-3">
                        <input type="text" x-model="customerForm.Name" placeholder="اسم العميل" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none">
                        <input type="tel" x-model="customerForm.Phone" placeholder="رقم الهاتف" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none">
                        <input type="text" x-model="customerForm.Address" placeholder="العنوان (اختياري)" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border-none">
                        <button @click="saveCustomer()" class="w-full py-4 mt-2 bg-indigo-600 text-white rounded-xl font-black shadow-md">حفظ بيانات العميل</button>
                        <button @click="showCustomerModal = false" class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-black text-sm">إلغاء</button>
                    </div>
                </div>
            </div>

            <div x-show="showScannerModal" class="fixed inset-0 z-[300] bg-black flex flex-col max-w-md mx-auto" x-cloak>
                <header class="bg-slate-900 px-6 py-4 flex justify-between items-center text-white">
                    <h2 class="font-black text-lg">مسح الباركود</h2>
                    <button @click="closeScanner()" class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center"><i class="fa-solid fa-times"></i></button>
                </header>
                <div class="flex-1 flex items-center justify-center bg-black overflow-hidden relative">
                    <div id="qr-reader" class="w-full bg-black"></div>
                </div>
            </div>

        </div>
    </template>

    <script>
        // رابط الباك إند الخاص بـ Google Apps Script
        const API_URL = "https://script.google.com/macros/s/AKfycbyABljV7AF6S18LputKiQspaftBJRWt94PUN60mIAAf6nAmJ7B1m8d88su93t0qM2gi/exec"; 

        function erpApp() {
            return {
                loading: false, isLoggedIn: false, user: { username: '', role: '' },
                currentTab: 'dashboard', showFabMenu: false, posFilter: 'all', search: '', invSearch: '',
                loginForm: { username: '', password: '' },
                data: { Inventory: [], Maintenance: [], Sales: [], Settings: [], Customers: [], Expenses: [] },
                cart: [], shopCash: 0,
                
                showCheckout: false, checkout: { customer: '', type: 'Cash', paid: 0 },
                
                // حالات الـ Modals الجديدة
                showProductModal: false, productForm: { ID: '', Code: '', Product_Name: '', Category: 'هاتف جديد', Cost_Price: 0, Selling_Price: 0, Stock: 1, Min_Stock: 1 },
                showMaintenanceModal: false, maintenanceForm: { ID: '', Client_Name: '', Phone: '', Phone_Type: '', Issue: '', Expected_Cost: 0, Status: 'قيد الانتظار' },
                showCustomerModal: false, customerForm: { Name: '', Phone: '', Address: '' },
                showExpenseModal: false, expenseForm: { Category: '', Amount: 0, Notes: '' },
                showScannerModal: false, scannerTarget: '', html5QrcodeScanner: null,

                init() {
                    const saved = localStorage.getItem('erp_session');
                    if (saved) {
                        try { this.user = JSON.parse(saved); this.isLoggedIn = true; this.fetchData(); } catch (e) { this.logout(); }
                    }
                },

                getLocalDate() {
                    const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                },

                async callApi(action, dataObj = {}) {
                    try {
                        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: action, data: dataObj }) });
                        return await response.json();
                    } catch (error) {
                        console.error(error); alert("خطأ في الاتصال بقاعدة البيانات."); return { success: false };
                    }
                },

                async login() {
                    if (!this.loginForm.username || !this.loginForm.password) return alert("البيانات مطلوبة");
                    this.loading = true; const res = await this.callApi('login', this.loginForm); this.loading = false;
                    if (res && res.success) {
                        this.user = res.user; this.isLoggedIn = true;
                        localStorage.setItem('erp_session', JSON.stringify(res.user)); this.fetchData();
                    } else { alert("خطأ في بيانات الدخول"); }
                },

                logout() { localStorage.removeItem('erp_session'); location.reload(); },

                async fetchData() {
                    this.loading = true; const res = await this.callApi('getAllData');
                    if (res && res.success) {
                        this.data = res;
                        const cashSetting = (res.Settings || []).find(s => s.Key === "Shop_Cash");
                        this.shopCash = cashSetting ? Number(cashSetting.Value || 0) : 0;
                    }
                    this.loading = false;
                },

                // ---- حسابات لوحة القيادة ----
                getTotalWalletsBalance() { return 0; /* معلق لتنفيذ المحافظ لاحقاً */ },
                getTotalDebts() {
                    let t = 0; (this.data.Sales || []).forEach(s => { if(s.Payment_Type === 'Credit') t += (Number(s.Total) - Number(s.Paid)); }); return t;
                },
                getTodayStats() {
                    const today = this.getLocalDate(); let sales = 0;
                    (this.data.Sales || []).forEach(s => { if (s.Date && s.Date.startsWith(today)) sales += Number(s.Total || 0); }); return { sales };
                },

                // ---- نقاط البيع والمخزن ----
                get filteredInventoryPOS() {
                    const q = this.search.toLowerCase();
                    return (this.data.Inventory || []).filter(i => {
                        return (!q || String(i.Product_Name).toLowerCase().includes(q) || String(i.Code).includes(q)) && Number(i.Stock) > 0;
                    });
                },
                get processedInventory() {
                    const q = this.invSearch.toLowerCase(); return (this.data.Inventory || []).filter(i => (!q || String(i.Product_Name).toLowerCase().includes(q) || String(i.Code).includes(q)));
                },
                addToCart(product) {
                    const item = this.cart.find(c => c.code === product.Code);
                    if (item) item.qty++; else this.cart.push({ code: product.Code, name: product.Product_Name, price: product.Selling_Price, qty: 1 });
                    this.checkout.paid = this.cartTotal;
                },
                get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.qty), 0); },

                async confirmSale() {
                    if (!this.cart.length) return;
                    if (this.checkout.type === 'Credit' && !this.checkout.customer) return alert('اسم العميل مطلوب للبيع الآجل');
                    this.loading = true;
                    const saleData = { total: this.cartTotal, paid: this.checkout.paid, customer: this.checkout.customer, Payment_Type: this.checkout.type, items: this.cart };
                    const res = await this.callApi('processSale', saleData);
                    if(res.success) {
                        this.cart = []; this.showCheckout = false; this.currentTab = 'dashboard';
                        this.checkout = { customer: '', type: 'Cash', paid: 0 };
                        this.fetchData();
                    } else { alert("حدث خطأ أثناء حفظ العملية."); this.loading = false; }
                },

                // ---- النوافذ الجديدة (Modals Functions) ----
                openProductModal(cat = 'عام') { this.productForm = { ID: '', Code: '', Product_Name: '', Category: cat, Cost_Price: 0, Selling_Price: 0, Stock: 1, Min_Stock: 1 }; this.showProductModal = true; },
                openEditProduct(item) { this.productForm = { ...item }; this.showProductModal = true; },
                async saveProduct() {
                    if(!this.productForm.Product_Name || !this.productForm.Selling_Price) return alert("الاسم وسعر البيع مطلوبة");
                    this.loading = true;
                    await this.callApi('saveEntity', { entity: 'Inventory', data: this.productForm });
                    this.showProductModal = false; this.fetchData();
                },

                openMaintenanceModal() { this.maintenanceForm = { ID: '', Client_Name: '', Phone: '', Phone_Type: '', Issue: '', Expected_Cost: 0, Status: 'قيد الانتظار' }; this.showMaintenanceModal = true; },
                async saveMaintenance() {
                    if(!this.maintenanceForm.Client_Name || !this.maintenanceForm.Issue) return alert("الاسم ووصف العطل مطلوب");
                    this.loading = true;
                    await this.callApi('saveEntity', { entity: 'Maintenance', data: this.maintenanceForm });
                    this.showMaintenanceModal = false; this.fetchData();
                },

                openExpenseModal() { this.expenseForm = { Category: '', Amount: 0, Notes: '' }; this.showExpenseModal = true; },
                async saveExpense() {
                    if(!this.expenseForm.Category || !this.expenseForm.Amount) return alert("أكمل البيانات");
                    this.loading = true;
                    await this.callApi('saveEntity', { entity: 'Expenses', data: this.expenseForm });
                    this.showExpenseModal = false; this.fetchData();
                },

                openAddCustomerModal() { this.customerForm = { Name: '', Phone: '', Address: '' }; this.showCustomerModal = true; },
                async saveCustomer() {
                    if(!this.customerForm.Name) return alert("اسم العميل مطلوب");
                    this.loading = true;
                    await this.callApi('saveEntity', { entity: 'Customers', data: this.customerForm });
                    this.showCustomerModal = false; this.fetchData();
                },

                get debtors() {
                    const d = {}; (this.data.Sales || []).forEach(s => { if(s.Payment_Type==='Credit'){ const c = s.Customer||'نقدي'; const amt = Number(s.Total)-Number(s.Paid); if(amt>0){ d[c]=(d[c]||0)+amt; } } });
                    return Object.keys(d).map(k => ({name:k, totalDebt:d[k]}));
                },

                // ---- الباركود (Scanner) ----
                openScannerModal(target) {
                    this.scannerTarget = target; this.showScannerModal = true;
                    setTimeout(() => { this.initScanner(); }, 300);
                },
                initScanner() {
                    if (this.html5QrcodeScanner) return;
                    this.html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                    this.html5QrcodeScanner.render((decodedText) => {
                        if (this.scannerTarget === 'pos') { this.search = decodedText; } 
                        else if (this.scannerTarget === 'product') { this.productForm.Code = decodedText; }
                        this.closeScanner();
                    }, (err) => { /* تجاهل الأخطاء المستمرة للقراءة */ });
                },
                closeScanner() {
                    if(this.html5QrcodeScanner) { this.html5QrcodeScanner.clear(); this.html5QrcodeScanner = null; }
                    this.showScannerModal = false;
                }
            };
        }
    </script>
</body>
</html>
