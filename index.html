<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3b82f6">
<meta name="description" content="2M ERP & POS Mobile First">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="2M">
<title>2M - ERP & POS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
[x-cloak] { display: none !important; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
.fab-menu-enter { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: translateY(20px) scale(0.9); }
.fab-menu-enter-active { opacity: 1; transform: translateY(0) scale(1); }
.fab-menu-leave { transition: all 0.2s ease-in; opacity: 1; transform: translateY(0) scale(1); }
.fab-menu-leave-active { opacity: 0; transform: translateY(20px) scale(0.9); }
/* Toasts Animation */
.toast-enter { opacity: 0; transform: translateY(-20px); }
.toast-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease-out; }
.toast-leave { opacity: 1; transform: translateY(0); }
.toast-leave-active { opacity: 0; transform: translateY(-20px); transition: all 0.3s ease-in; }
</style>
</head>
<body x-data="erpApp()" x-init="init()" class="bg-slate-50 text-slate-900 min-h-screen pb-28 transition-colors duration-300">
    
<div class="fixed top-4 left-1/2 -translate-x-1/2 z-[3000] flex flex-col gap-2 w-[90%] max-w-sm pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
        <div class="px-4 py-3 rounded-2xl shadow-xl text-white font-bold text-sm flex items-center justify-between pointer-events-auto"
             :class="toast.type === 'success' ? 'bg-emerald-500' : toast.type === 'error' ? 'bg-rose-500' : 'bg-blue-500'"
             x-transition:enter="toast-enter-active" x-transition:leave="toast-leave-active">
            <div class="flex items-center gap-2">
                <i class="fa-solid" :class="toast.type === 'success' ? 'fa-circle-check' : toast.type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info'"></i>
                <span x-text="toast.message"></span>
            </div>
            <button @click="removeToast(toast.id)" class="text-white/80 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </template>
</div>

<div x-show="loading" class="fixed inset-0 z-[2500] bg-black/60 backdrop-blur-md flex flex-col items-center justify-center text-white">
    <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mb-4"></div>
    <p class="font-black animate-pulse">جاري المعالجة...</p>
</div>

<div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-slate-100 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-4xl mb-4 shadow-xl shadow-blue-200">
                <i class="fa-solid fa-rocket"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800">2M</h2>
            <p class="text-slate-400 font-bold">تسجيل الدخول</p>
        </div>
        <div class="space-y-4">
            <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-center transition-all">
            <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-center transition-all">
            <button @click="login()" :disabled="isProcessing" class="w-full py-5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">
                <span x-show="!isProcessing">دخول</span>
                <span x-show="isProcessing"><i class="fa-solid fa-spinner fa-spin"></i> جاري الدخول...</span>
            </button>
        </div>
    </div>
</div>

<template x-if="isLoggedIn">
<div class="max-w-4xl mx-auto relative h-full">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-bolt"></i></div>
            <div>
                <h1 class="font-black text-lg leading-tight">2M</h1>
                <p class="text-[10px] font-bold text-blue-600" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ')'"></p>
            </div>
        </div>
        <div class="flex gap-2">
            <button @click="fetchData()" class="p-2 bg-blue-50 text-blue-600 rounded-xl active:scale-95 transition-transform"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
            <button @click="logout()" class="p-2 bg-rose-50 text-rose-600 rounded-xl active:scale-95 transition-transform"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-4 space-y-6 pb-32">
        <div x-show="currentTab === 'home'" class="space-y-6 animate__animated animate__fadeIn">
            <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs font-black text-slate-500">مؤشرات اليوم</p>
                <button @click="setTodayFilter(); fetchData()" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black">تحديث بيانات اليوم</button>
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest"><i class="fa-solid fa-sack-dollar ml-1"></i> إجمالي السيولة النقدية</p>
                            <h3 class="text-4xl font-black tabular-nums mt-1" x-text="(shopCash + getTotalWalletBalance()).toLocaleString() + ' ج'"></h3>
                        </div>
                        <button x-show="user.role === 'admin'" @click="updateShopCash()" class="bg-white/20 p-2 rounded-xl hover:bg-white/30 transition-all"><i class="fa-solid fa-pen"></i></button>
                    </div>
                    
                    <div class="border-t border-white/20 pt-4 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cash-register"></i></div>
                            <div>
                                <p class="text-[8px] font-bold opacity-80">رصيد الدرج (كاش)</p>
                                <p class="text-sm font-black tabular-nums" x-text="shopCash.toLocaleString() + ' ج'"></p>
                            </div>
                        </div>
                        <div class="h-8 w-px bg-white/20"></div>
                        <div class="flex items-center gap-2">
                            <div>
                                <p class="text-[8px] font-bold opacity-80 text-left">رصيد المحافظ</p>
                                <p class="text-sm font-black tabular-nums text-left" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
                            </div>
                            <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center"><i class="fa-solid fa-wallet"></i></div>
                        </div>
                    </div>
                </div>
                <i class="fa-solid fa-vault absolute -bottom-6 -left-4 text-9xl opacity-10"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div @click="openTodaySalesModal()" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden cursor-pointer hover:border-blue-300 transition-colors">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-lg mb-3"><i class="fa-solid fa-money-bill-trend-up"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">مبيعات اليوم</p>
                    <p class="text-xl font-black text-slate-800 tabular-nums" x-text="(getTotalSales('عام') + getTotalSales('هاتف جديد') + getTotalSales('هاتف مستعمل')).toLocaleString() + ' ج'"></p>
                </div>
                
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden" x-show="user.role === 'admin'">
                    <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center text-lg mb-3"><i class="fa-solid fa-coins"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">أرباح اليوم (صوافي)</p>
                    <p class="text-xl font-black text-slate-800 tabular-nums" x-text="(getFilteredProfits().newPhone + getFilteredProfits().usedPhone + getFilteredProfits().general + getFilteredProfits().wallet).toLocaleString() + ' ج'"></p>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden" x-show="user.role !== 'admin'">
                    <div class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center text-lg mb-3"><i class="fa-solid fa-lock"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">أرباح اليوم</p>
                    <p class="text-sm font-black text-slate-400">للمديرين فقط</p>
                </div>

                <div @click="showMaintenanceListModal = true" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden cursor-pointer hover:border-amber-300 transition-colors">
                    <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center text-lg mb-3"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">أجهزة صيانة بالانتظار</p>
                    <p class="text-xl font-black text-slate-800 tabular-nums" x-text="getWaitingMaintenanceCount()"></p>
                </div>

                <div @click="showAllDebtsModal = true" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden cursor-pointer hover:border-rose-300 transition-colors">
                    <div class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center text-lg mb-3"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                    <p class="text-[10px] font-black text-slate-500 mb-1">إجمالي المديونيات</p>
                    <p class="text-xl font-black text-rose-600 tabular-nums" x-text="getTotalDebts().toLocaleString() + ' ج'"></p>
                </div>
            </div>
        </div>

        <div x-show="currentTab === 'operations'" class="space-y-4 animate__animated animate__fadeIn flex flex-col h-[70vh]">
            <div class="flex gap-2 flex-shrink-0">
                <div class="relative flex-1">
                    <input type="text" x-model="posSearch" placeholder="بحث بالاسم أو الباركود..." class="w-full p-4 pr-10 bg-white border border-slate-200 rounded-2xl outline-none font-bold text-sm focus:border-blue-500 shadow-sm transition-colors">
                    <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <button @click="openScanner('pos')" class="w-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-md active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
            </div>
            
            <div class="flex gap-2 overflow-x-auto custom-scrollbar flex-shrink-0 pb-2">
                <button @click="posCategoryFilter='all'" :class="posCategoryFilter==='all' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 border border-slate-200'" class="px-5 py-2 rounded-xl text-xs font-black whitespace-nowrap shadow-sm transition-colors">الكل</button>
                <button @click="posCategoryFilter='new'" :class="posCategoryFilter==='new' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 border border-slate-200'" class="px-5 py-2 rounded-xl text-xs font-black whitespace-nowrap shadow-sm transition-colors">هواتف جديدة</button>
                <button @click="posCategoryFilter='used'" :class="posCategoryFilter==='used' ? 'bg-amber-500 text-white' : 'bg-white text-slate-600 border border-slate-200'" class="px-5 py-2 rounded-xl text-xs font-black whitespace-nowrap shadow-sm transition-colors">مستعمل</button>
                <button @click="posCategoryFilter='acc'" :class="posCategoryFilter==='acc' ? 'bg-purple-600 text-white' : 'bg-white text-slate-600 border border-slate-200'" class="px-5 py-2 rounded-xl text-xs font-black whitespace-nowrap shadow-sm transition-colors">اكسسوارات</button>
            </div>

            <div class="grid grid-cols-2 gap-3 overflow-y-auto custom-scrollbar flex-1 pb-20 content-start">
                <template x-for="item in posFilteredInventory" :key="item.Code">
                    <div @click="addToCart(item)" class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm active:scale-95 transition-all relative overflow-hidden cursor-pointer hover:border-blue-400 flex flex-col justify-between h-32">
                        <template x-if="item.Category && item.Category.includes('هاتف')">
                            <span class="absolute top-0 right-0 bg-blue-600 text-white text-[8px] px-2 py-1 rounded-bl-xl font-black">هاتف</span>
                        </template>
                        <h4 class="font-black text-xs leading-relaxed line-clamp-2 mt-2" x-text="item.Product_Name"></h4>
                        <div class="mt-auto pt-2 border-t border-slate-50 flex justify-between items-center">
                            <span class="text-blue-700 font-black text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></span>
                            <span class="text-[9px] font-bold px-2 py-1 rounded-lg" :class="item.Stock > 0 ? 'bg-blue-50 text-blue-700' : 'bg-red-50 text-red-600'" x-text="item.Stock > 0 ? 'متاح: ' + item.Stock : 'نفد'"></span>
                        </div>
                    </div>
                </template>
                <div x-show="posFilteredInventory.length === 0" class="col-span-2 text-center py-10 text-slate-400 font-bold text-sm">لا توجد منتجات مطابقة</div>
            </div>

            <div class="fixed bottom-[4.5rem] left-0 right-0 px-4 max-w-4xl mx-auto pointer-events-none">
                <div class="bg-slate-800 p-2 rounded-3xl shadow-2xl flex items-center justify-between pointer-events-auto border border-slate-700">
                    <div class="pl-4 pr-2 text-white">
                        <p class="text-[10px] font-bold text-slate-400">إجمالي السلة (<span x-text="cart.length"></span>)</p>
                        <p class="text-lg font-black tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></p>
                    </div>
                    <button @click="showCart = true" :disabled="cart.length === 0" class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-cart-shopping"></i> الدفع
                    </button>
                </div>
            </div>
        </div>

        <div x-show="currentTab === 'management'" class="space-y-4 animate__animated animate__fadeIn" x-data="{ activeSection: null }">
            <div x-show="user.role !== 'admin'" class="bg-rose-50 p-6 rounded-[2rem] text-center border border-rose-100">
                <i class="fa-solid fa-lock text-4xl mb-3 text-rose-300"></i>
                <p class="font-black text-rose-700 text-sm">عذراً، تبويب الإدارة مخصص للمديرين فقط.</p>
            </div>

            <template x-if="user.role === 'admin'">
                <div class="space-y-3">
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                        <button @click="activeSection = activeSection === 1 ? null : 1" class="w-full p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-chart-pie"></i></div>
                                <span class="font-black text-slate-700 text-sm">التقارير والأرباح</span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-slate-400 transition-transform duration-300" :class="activeSection === 1 ? 'rotate-180' : ''"></i>
                        </button>
                        <div x-show="activeSection === 1" x-collapse class="p-5 border-t border-slate-100 bg-slate-50/50 space-y-4">
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-4">
                                <div class="flex gap-2 mb-3">
                                    <button @click="setTodayFilter(); fetchData()" class="flex-1 p-2 bg-blue-600 text-white rounded-xl text-[9px] font-black">اليوم</button>
                                    <button @click="setMonthFilter(); fetchData()" class="flex-1 p-2 bg-emerald-600 text-white rounded-xl text-[9px] font-black">الشهر الحالي</button>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="text-[9px] font-bold text-slate-500">من</label>
                                        <input type="date" x-model="filterDate.from" @change="fetchData()" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
                                    </div>
                                    <div>
                                        <label class="text-[9px] font-bold text-slate-500">إلى</label>
                                        <input type="date" x-model="filterDate.to" @change="fetchData()" class="w-full p-2 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-white border p-4 rounded-2xl cursor-pointer hover:border-blue-300 transition-colors" @click="openInvoicesModal('هاتف جديد')">
                                    <p class="text-[10px] font-black text-blue-600 mb-2">جديد</p>
                                    <p class="text-sm font-black tabular-nums text-slate-800" x-text="getTotalSales('هاتف جديد').toLocaleString() + ' ج'"></p>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1">ربح: <span class="text-emerald-600" x-text="getFilteredProfits().newPhone.toLocaleString() + ' ج'"></span></p>
                                </div>
                                <div class="bg-white border p-4 rounded-2xl cursor-pointer hover:border-amber-300 transition-colors" @click="openInvoicesModal('هاتف مستعمل')">
                                    <p class="text-[10px] font-black text-amber-600 mb-2">مستعمل</p>
                                    <p class="text-sm font-black tabular-nums text-slate-800" x-text="getTotalSales('هاتف مستعمل').toLocaleString() + ' ج'"></p>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1">ربح: <span class="text-emerald-600" x-text="getFilteredProfits().usedPhone.toLocaleString() + ' ج'"></span></p>
                                </div>
                                <div class="bg-white border p-4 rounded-2xl cursor-pointer hover:border-purple-300 transition-colors" @click="openInvoicesModal('عام')">
                                    <p class="text-[10px] font-black text-purple-600 mb-2">اكسسوار</p>
                                    <p class="text-sm font-black tabular-nums text-slate-800" x-text="getTotalSales('عام').toLocaleString() + ' ج'"></p>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1">ربح: <span class="text-emerald-600" x-text="getFilteredProfits().general.toLocaleString() + ' ج'"></span></p>
                                </div>
                                <div class="bg-white border p-4 rounded-2xl cursor-pointer hover:border-emerald-300 transition-colors" @click="showWalletTransactionsModal = true">
                                    <p class="text-[10px] font-black text-emerald-600 mb-2">محافظ (حركات)</p>
                                    <p class="text-sm font-black tabular-nums text-slate-800" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1">ربح: <span class="text-emerald-600" x-text="getFilteredProfits().wallet.toLocaleString() + ' ج'"></span></p>
                                </div>
                            </div>
                            <button @click="showExpensesReportsModal = true" class="w-full mt-4 bg-orange-50 text-orange-700 p-4 rounded-2xl font-black text-xs flex justify-between items-center border border-orange-100 hover:bg-orange-100 transition-colors">
                                <span>إجمالي المصروفات (للفترة): <span x-text="getTotalExpenses().toLocaleString() + ' ج'"></span></span>
                                <i class="fa-solid fa-chevron-left"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                        <button @click="activeSection = activeSection === 2 ? null : 2" class="w-full p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center"><i class="fa-solid fa-boxes-stacked"></i></div>
                                <span class="font-black text-slate-700 text-sm">إدارة المخزون</span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-slate-400 transition-transform duration-300" :class="activeSection === 2 ? 'rotate-180' : ''"></i>
                        </button>
                        <div x-show="activeSection === 2" x-collapse class="p-5 border-t border-slate-100 bg-slate-50/50 space-y-4">
                            <button @click="showBestSellersModal = true" class="w-full bg-amber-50 text-amber-700 p-3 rounded-2xl font-black text-xs hover:bg-amber-100 shadow-sm transition-all mb-4 border border-amber-100"><i class="fa-solid fa-star ml-1"></i> المنتجات الأكثر مبيعاً</button>
                            <div class="flex gap-2 mb-3">
                                <div class="relative flex-1">
                                    <input type="text" x-model="invSearch" placeholder="ابحث باسم المنتج أو الباركود..." class="w-full p-3 pr-10 bg-white border rounded-xl text-[10px] font-bold outline-none shadow-sm">
                                    <i class="fa-solid fa-search absolute right-3 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                </div>

async updateShopCash() {
            const newVal = prompt("أدخل رصيد كاش المحل الحالي:", this.shopCash);
            if (newVal !== null) {
                this.loading = true;
                await this.callApi('updateConfig', { key: 'shopCash', value: newVal });
                this.fetchData();
                this.addToast('تم تحديث رصيد الكاش بنجاح', 'success');
            }
        },

        // --- إدارة التقارير والأرقام ---
        getTotalSales(category) {
            return (this.data.Sales || [])
                .filter(s => s.Category === category)
                .reduce((sum, s) => sum + Number(s.Total), 0);
        },

        getFilteredProfits() {
            let profits = { newPhone: 0, usedPhone: 0, general: 0, wallet: 0 };
            (this.data.Sales || []).forEach(s => {
                const profit = Number(s.Profit || 0);
                if (s.Category === 'هاتف جديد') profits.newPhone += profit;
                else if (s.Category === 'هاتف مستعمل') profits.usedPhone += profit;
                else profits.general += profit;
            });
            (this.data.Wallets || []).forEach(w => {
                profits.wallet += Number(w.Profit || 0);
            });
            return profits;
        },

        getTotalExpenses() {
            return (this.data.Expenses || []).reduce((sum, e) => sum + Number(e.Amount), 0);
        },

        getFilteredExpenses() {
            return this.data.Expenses || [];
        },

        getFilteredInvoicesList() {
            return (this.data.Sales || []).filter(s => s.Category === this.invoiceFilterType);
        },

        openInvoicesModal(type) {
            this.invoiceFilterType = type;
            this.showInvoicesModal = true;
        },

        // --- وظائف الـ POS المتقدمة ---
        openScanner(target) {
            this.addToast('جاري تشغيل الكاميرا...', 'info');
            // هنا يتم استدعاء Html5QrcodeScanner كما في الكود الأصلي
        },

        async processPayment() {
            if (this.cart.length === 0) return;
            this.loading = true;
            try {
                const payload = {
                    items: this.cart,
                    total: this.cartTotal,
                    date: new Date().toISOString(),
                    user: this.user.username
                };
                const res = await this.callApi('saveSale', payload);
                if (res.success) {
                    this.cart = [];
                    this.showCart = false;
                    this.addToast('تمت عملية البيع بنجاح', 'success');
                    this.fetchData();
                }
            } catch (e) {
                this.addToast('فشل في حفظ العملية', 'error');
            } finally { this.loading = false; }
        },

        showConfirm(message, callback) {
            this.confirmModal = {
                show: true,
                message: message,
                onConfirm: callback
            };
        },

        // --- الاتصال بـ Google Apps Script ---
        async callApi(func, data = {}) {
            if (typeof google !== 'undefined') {
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)[func](data);
                });
            } else {
                // محاكاة للبيانات في بيئة التطوير المحلية
                console.warn("Google API not found. Simulation mode active.");
                return new Promise((resolve) => setTimeout(() => resolve({ success: true, data: [] }), 500));
            }
        }
    }
}
