<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <title>2M ERP | Mobile First</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; color: #1e293b; }
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 6rem); }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .bottom-nav-container { border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        
        /* إعدادات الطباعة الاحترافية لورق A4 */
        @media print {
            body { background-color: white !important; }
            .no-print, header, nav, .bottom-nav-container, .fixed { display: none !important; }
            .print-only { display: block !important; }
            .print-container { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; background: white !important; }
            @page { size: A4 portrait; margin: 15mm; }
            .page-break { page-break-before: always; }
            .shadow-sm, .shadow-xl, .shadow-md { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        }
    </style>
</head>
<body x-data="erpApp()" x-init="init()" class="min-h-screen relative pb-safe">

    <div x-show="loading" class="fixed inset-0 z-[1000] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center text-white no-print">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="font-black animate-pulse text-lg">جاري التنفيذ...</p>
    </div>

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-slate-50 flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto h-full no-print">
        <div class="text-center mb-10 w-full">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] mx-auto flex items-center justify-center text-white text-4xl mb-6 shadow-2xl shadow-blue-200">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-800">2M ERP</h2>
            <p class="text-slate-400 font-bold mt-2">تسجيل الدخول للنظام</p>
        </div>
        <div class="w-full space-y-4">
            <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full p-5 bg-white border-none shadow-sm rounded-2xl outline-none font-bold text-center focus:ring-2 ring-blue-500 transition-all">
            <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full p-5 bg-white border-none shadow-sm rounded-2xl outline-none font-bold text-center focus:ring-2 ring-blue-500 transition-all">
            <button @click="login()" class="w-full py-5 mt-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-200 transition-all active:scale-95">تسجيل الدخول</button>
        </div>
    </div>

    <template x-if="isLoggedIn">
        <div class="max-w-md mx-auto min-h-screen relative bg-slate-50 overflow-x-hidden print-container">
            
            <header class="bg-white sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm rounded-b-[2rem] no-print">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-md"><i class="fa-solid fa-store"></i></div>
                    <div>
                        <h1 class="font-black text-lg leading-none">2M Phone</h1>
                        <p class="text-[10px] font-bold text-blue-600" x-text="user.username"></p>
                    </div>
                </div>
                <button @click="fetchData()" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center active:scale-95 transition-transform">
                    <i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </header>

            <main class="p-5 space-y-6">

                <div x-show="currentTab === 'dashboard'" class="space-y-5 slide-up no-print">
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
                        <div class="flex justify-between items-center mb-2 z-10 relative">
                            <p class="text-xs font-bold text-slate-300">إجمالي السيولة النقدية</p>
                            <i class="fa-solid fa-wallet text-slate-400"></i>
                        </div>
                        <h3 class="text-3xl font-black tabular-nums z-10 relative" x-text="(shopCash + getTotalWalletsBalance()).toLocaleString() + ' ج'"></h3>
                        <div class="mt-4 pt-4 border-t border-slate-700/50 flex justify-between text-xs font-bold z-10 relative">
                            <div><span class="text-slate-400 block mb-1">كاش المحل</span><span class="text-emerald-400" x-text="shopCash.toLocaleString() + ' ج'"></span></div>
                            <div class="text-left"><span class="text-slate-400 block mb-1">أرصدة المحافظ</span><span class="text-blue-400" x-text="getTotalWalletsBalance().toLocaleString() + ' ج'"></span></div>
                        </div>
                        <i class="fa-solid fa-sack-dollar absolute -bottom-4 -left-4 text-7xl text-white opacity-5"></i>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center items-center text-center">
                            <i class="fa-solid fa-hand-holding-dollar text-red-500 text-xl mb-2"></i>
                            <p class="text-[10px] font-bold text-slate-400">ديون السوق (الآجل)</p>
                            <h3 class="text-base font-black text-slate-800 mt-1 tabular-nums" x-text="getTotalDebts().toLocaleString() + ' ج'"></h3>
                        </div>
                        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center items-center text-center">
                            <i class="fa-solid fa-chart-line text-emerald-500 text-xl mb-2"></i>
                            <p class="text-[10px] font-bold text-slate-400">مبيعات اليوم</p>
                            <h3 class="text-base font-black text-slate-800 mt-1 tabular-nums" x-text="getTodayStats().sales.toLocaleString() + ' ج'"></h3>
                        </div>
                    </div>

                    <div class="bg-red-50 p-4 rounded-3xl border border-red-100" x-show="getDueInstallments().length > 0">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-black text-red-600 text-sm"><i class="fa-solid fa-bell ml-2 animate-bounce"></i>أقساط مستحقة للتحصيل</h3>
                            <span class="bg-red-600 text-white text-[10px] px-2 py-1 rounded-full font-bold" x-text="getDueInstallments().length"></span>
                        </div>
                        <div class="space-y-2">
                            <template x-for="inst in getDueInstallments()">
                                <div class="bg-white p-3 rounded-2xl shadow-sm flex justify-between items-center border border-red-50 cursor-pointer active:scale-95 transition-transform" @click="openInstallmentPayment(inst)">
                                    <div>
                                        <p class="font-black text-xs text-slate-800" x-text="inst.Customer_Name"></p>
                                        <p class="text-[10px] text-slate-500 font-bold mt-1" x-text="'مطلوب: ' + inst.dueAmount + ' ج'"></p>
                                    </div>
                                    <button class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-black">التحصيل</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div x-show="currentTab === 'sales'" class="space-y-4 slide-up no-print">
                    <div class="flex gap-2 sticky top-20 z-30 bg-slate-50 py-2">
                        <div class="relative flex-1">
                            <input type="text" x-model="search" placeholder="بحث باسم أو باركود..." class="w-full p-4 pl-12 bg-white border border-slate-100 rounded-2xl outline-none font-bold shadow-sm focus:border-blue-500">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        </div>
                        <button @click="openScanner('pos')" class="w-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
                    </div>

                    <div class="flex gap-2 overflow-x-auto custom-scrollbar pb-2">
                        <button @click="posFilter='all'" :class="posFilter === 'all' ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">الكل</button>
                        <button @click="posFilter='new'" :class="posFilter === 'new' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">هواتف جديدة</button>
                        <button @click="posFilter='used'" :class="posFilter === 'used' ? 'bg-amber-500 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">هواتف مستعملة</button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-6">
                        <template x-for="item in filteredInventoryPOS">
                            <div @click="addToCart(item)" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 active:scale-95 transition-transform relative overflow-hidden flex flex-col justify-between h-36">
                                <span x-show="item.Category && item.Category.includes('هاتف')" class="absolute top-0 right-0 bg-blue-50 text-blue-600 text-[9px] px-2 py-1 rounded-bl-xl font-black">هاتف</span>
                                <h4 class="font-black text-xs text-slate-800 line-clamp-2 mt-2 leading-snug" x-text="item.Product_Name"></h4>
                                <div class="mt-auto">
                                    <p class="text-[9px] font-bold text-slate-400 mb-1" x-text="'المتاح: ' + item.Stock"></p>
                                    <span class="text-blue-600 font-black text-lg tabular-nums leading-none block" x-text="item.Selling_Price + ' ج'"></span>
                                </div>
                            </div>
                        </template>
                        <div x-show="filteredInventoryPOS.length === 0" class="col-span-2 text-center py-10 text-slate-400 font-bold text-sm">لا توجد منتجات.</div>
                    </div>
                </div>

                <div x-show="currentTab === 'inventory'" class="space-y-4 slide-up no-print">
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text" x-model="invSearch" placeholder="بحث في المخزن..." class="w-full p-3 pr-10 bg-white border border-slate-100 rounded-xl text-xs font-bold outline-none shadow-sm">
                            <i class="fa-solid fa-search absolute right-3 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <template x-for="item in processedInventory">
                            <div @click="openEditProduct(item)" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center cursor-pointer active:scale-95">
                                <div class="flex-1 pr-2">
                                    <h4 class="font-black text-xs text-slate-800 line-clamp-1" x-text="item.Product_Name"></h4>
                                    <p class="text-[9px] text-slate-400 font-bold mt-1" x-text="(item.Category||'عام') + ' | كود: ' + item.Code"></p>
                                </div>
                                <div class="text-left">
                                    <p class="font-black text-blue-600 text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></p>
                                    <p class="text-[9px] font-bold px-2 py-0.5 rounded-md mt-1 inline-block" :class="item.Stock <= (item.Min_Stock||1) ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'" x-text="'مخزن: ' + item.Stock"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="currentTab === 'reports'" class="space-y-4 slide-up print-container">
                    <div class="flex justify-between items-center mb-2 no-print">
                        <h2 class="font-black text-xl text-slate-800">التقارير الشاملة</h2>
                        <button @click="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black shadow-md flex items-center gap-2"><i class="fa-solid fa-print"></i> طباعة A4</button>
                    </div>

                    <div class="flex gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-100 no-print">
                        <div class="flex-1">
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">من تاريخ</label>
                            <input type="date" x-model="reportDateFrom" @change="generateReports()" class="w-full text-xs font-black outline-none bg-transparent">
                        </div>
                        <div class="flex-1 border-r border-slate-100 pr-2">
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">إلى تاريخ</label>
                            <input type="date" x-model="reportDateTo" @change="generateReports()" class="w-full text-xs font-black outline-none bg-transparent">
                        </div>
                    </div>

                    <div class="flex gap-2 overflow-x-auto custom-scrollbar pb-2 no-print">
                        <button @click="reportTab='sales'" :class="reportTab==='sales' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">المبيعات</button>
                        <button @click="reportTab='profits'" :class="reportTab==='profits' ? 'bg-emerald-500 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">الأرباح</button>
                        <button @click="reportTab='expenses'" :class="reportTab==='expenses' ? 'bg-amber-500 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">المصاريف</button>
                        <button @click="reportTab='narrative'; generateNarrative()" :class="reportTab==='narrative' ? 'bg-purple-600 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'" class="px-5 py-2.5 rounded-xl text-xs font-black whitespace-nowrap transition-all">تقرير سردي</button>
                    </div>

                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 print-container">
                        <h3 class="font-black text-lg mb-4 print-only hidden text-center border-b pb-2" x-text="'تقرير ' + getReportTitle() + ' | ' + reportDateFrom + ' إلى ' + reportDateTo"></h3>
                        
                        <div x-show="reportTab === 'sales'">
                            <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl mb-4 text-blue-800">
                                <span class="font-bold text-sm">إجمالي المبيعات:</span>
                                <span class="font-black text-lg tabular-nums" x-text="reportData.totalSales.toLocaleString() + ' ج'"></span>
                            </div>
                            <table class="w-full text-right text-xs">
                                <thead><tr class="border-b border-slate-200 text-slate-500"><th class="pb-2">التاريخ</th><th class="pb-2">العميل</th><th class="pb-2">الإجمالي</th></tr></thead>
                                <tbody>
                                    <template x-for="s in reportData.salesList">
                                        <tr class="border-b border-slate-100 last:border-0"><td class="py-2" x-text="s.Date.split('T')[0]"></td><td class="py-2" x-text="s.Customer || 'نقدي'"></td><td class="py-2 font-bold text-blue-600" x-text="s.Total + ' ج'"></td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <div x-show="reportTab === 'profits'">
                            <div class="flex justify-between items-center bg-emerald-50 p-3 rounded-xl mb-4 text-emerald-800">
                                <span class="font-bold text-sm">إجمالي الأرباح الصافية:</span>
                                <span class="font-black text-lg tabular-nums" x-text="(reportData.totalProfits - reportData.totalExpenses).toLocaleString() + ' ج'"></span>
                            </div>
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <div class="bg-slate-50 p-3 rounded-xl"><p class="text-[10px] text-slate-500 mb-1">أرباح المبيعات</p><p class="font-black text-sm text-slate-800" x-text="reportData.totalProfits.toLocaleString() + ' ج'"></p></div>
                                <div class="bg-slate-50 p-3 rounded-xl"><p class="text-[10px] text-slate-500 mb-1">إجمالي المصروفات</p><p class="font-black text-sm text-rose-600" x-text="reportData.totalExpenses.toLocaleString() + ' ج'"></p></div>
                            </div>
                        </div>

                        <div x-show="reportTab === 'expenses'">
                             <div class="flex justify-between items-center bg-amber-50 p-3 rounded-xl mb-4 text-amber-800">
                                <span class="font-bold text-sm">إجمالي المصاريف:</span>
                                <span class="font-black text-lg tabular-nums" x-text="reportData.totalExpenses.toLocaleString() + ' ج'"></span>
                            </div>
                            <table class="w-full text-right text-xs">
                                <thead><tr class="border-b border-slate-200 text-slate-500"><th class="pb-2">التاريخ</th><th class="pb-2">البند</th><th class="pb-2">المبلغ</th></tr></thead>
                                <tbody>
                                    <template x-for="e in reportData.expensesList">
                                        <tr class="border-b border-slate-100 last:border-0"><td class="py-2" x-text="e.Date.split('T')[0]"></td><td class="py-2" x-text="e.Category"></td><td class="py-2 font-bold text-amber-600" x-text="e.Amount + ' ج'"></td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <div x-show="reportTab === 'narrative'" class="space-y-3">
                            <div class="flex justify-between items-center no-print">
                                <span class="text-[10px] font-bold text-slate-400">ملخص نصي للبيانات</span>
                                <button @click="isManualEdit = !isManualEdit" class="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-lg font-bold flex items-center gap-1">
                                    <i class="fa-solid fa-pen"></i> <span x-text="isManualEdit ? 'حفظ التعديل' : 'تحرير يدوي'"></span>
                                </button>
                            </div>
                            <textarea x-model="narrativeText" :readonly="!isManualEdit" class="w-full h-80 p-5 border border-slate-200 rounded-2xl font-bold text-sm leading-relaxed outline-none resize-none transition-colors" :class="isManualEdit ? 'focus:border-purple-500 bg-purple-50/20' : 'bg-slate-50'"></textarea>
                        </div>
                    </div>
                </div>

                <div x-show="currentTab === 'maintenance'" class="space-y-4 slide-up no-print">
                     <div class="flex gap-1 p-1 bg-white border border-slate-100 rounded-2xl overflow-x-auto custom-scrollbar shadow-sm">
                        <button @click="mFilter = 'قيد الانتظار'" :class="mFilter === 'قيد الانتظار' ? 'bg-amber-500 text-white' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">انتظار</button>
                        <button @click="mFilter = 'تم التصليح'" :class="mFilter === 'تم التصليح' ? 'bg-blue-500 text-white' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">مصلح</button>
                        <button @click="mFilter = 'تم التسليم'" :class="mFilter === 'تم التسليم' ? 'bg-emerald-500 text-white' : 'text-slate-500'" class="flex-1 min-w-[70px] py-2 text-[10px] font-black rounded-xl transition-all">مُسلم</button>
                    </div>
                    <div class="space-y-3">
                        <template x-for="m in filteredMaintenance">
                            <div class="p-4 rounded-3xl shadow-sm flex justify-between items-center bg-white border border-slate-100 border-r-4" :class="m.Status === 'قيد الانتظار' ? 'border-amber-500' : (m.Status === 'تم التصليح' ? 'border-blue-500' : 'border-emerald-500')">
                                <div class="flex-1">
                                    <h4 class="font-black text-sm text-slate-800" x-text="m.Phone_Type || 'غير محدد'"></h4>
                                    <p class="text-[10px] font-bold text-slate-500 mt-1" x-text="'العطل: ' + (m.Issue || 'غير محدد')"></p>
                                    <p class="text-[10px] font-black text-slate-800 mt-2"><i class="fa-solid fa-user ml-1 text-slate-400"></i><span x-text="m.Client_Name || 'عميل'"></span></p>
                                </div>
                                <div class="text-left flex flex-col items-end">
                                    <p class="text-xs font-black tabular-nums text-slate-700 bg-slate-50 px-2 py-1 rounded" x-text="(m.Expected_Cost || 0) + ' ج'"></p>
                                    <button @click="openEditMaintenanceModal(m)" class="mt-3 text-[10px] font-black text-white bg-slate-800 px-4 py-2 rounded-xl active:scale-95 shadow-md">تحديث</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="currentTab === 'wallets'" class="space-y-4 slide-up no-print">
                    <button @click="walletForm = {name:'', limit:''}; showAddWalletModal = true" class="w-full bg-blue-50 border border-blue-200 border-dashed text-blue-600 py-4 rounded-2xl font-black text-sm flex justify-center items-center gap-2 active:scale-95">
                        <i class="fa-solid fa-plus"></i> إضافة محفظة جديدة
                    </button>
                    <div class="space-y-4">
                        <template x-for="w in dynamicWallets">
                            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                                <div class="flex justify-between items-center mb-4">
                                    <h4 class="font-black text-base text-slate-800"><i class="fa-solid fa-wallet text-blue-500 ml-2"></i><span x-text="w.name"></span></h4>
                                    <span class="text-[10px] bg-slate-50 px-2 py-1 rounded-md font-bold text-slate-500 border">ليميت: <span x-text="w.limit.toLocaleString()"></span></span>
                                </div>
                                <div class="w-full bg-slate-100 h-1.5 rounded-full mb-4 overflow-hidden">
                                    <div :class="getLimitColor(w.name, w.limit)" :style="'width: ' + getLimitPercent(w.name, w.limit) + '%'" class="h-full transition-all duration-500"></div>
                                </div>
                                <div class="grid grid-cols-3 gap-2 text-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <div><p class="text-[10px] text-emerald-600 font-black mb-1">وارد</p><p class="text-sm font-black text-emerald-700" x-text="calcWallet(w.name).incoming.toLocaleString()"></p></div>
                                    <div class="border-x border-slate-200"><p class="text-[10px] text-rose-600 font-black mb-1">صادر</p><p class="text-sm font-black text-rose-700" x-text="calcWallet(w.name).outgoing.toLocaleString()"></p></div>
                                    <div><p class="text-[10px] text-blue-600 font-black mb-1">الرصيد</p><p class="text-sm font-black text-slate-800" x-text="calcWallet(w.name).balance.toLocaleString()"></p></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="currentTab === 'customers'" class="space-y-4 slide-up no-print">
                    <div class="flex gap-2 bg-white p-1 rounded-2xl border border-slate-100 shadow-sm">
                        <button @click="customerTab = 'installments'" :class="customerTab === 'installments' ? 'bg-emerald-500 text-white' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-black text-xs transition-all">الأقساط النشطة</button>
                        <button @click="customerTab = 'debts'" :class="customerTab === 'debts' ? 'bg-rose-500 text-white' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-black text-xs transition-all">الديون الآجلة</button>
                    </div>
                    <div x-show="customerTab === 'installments'" class="space-y-3">
                        <template x-for="inst in activeInstallments">
                            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <h4 class="font-black text-sm text-slate-800" x-text="inst.Customer_Name"></h4>
                                        <p class="text-[10px] text-slate-500 font-bold" x-text="'أصل التقسيط: ' + Number(inst.Total_Amount).toLocaleString() + ' ج'"></p>
                                    </div>
                                    <span class="bg-emerald-50 border border-emerald-100 text-emerald-700 px-3 py-1 rounded-xl text-xs font-black" x-text="Number(inst.Remaining_Amount).toLocaleString() + ' ج باقي'"></span>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-2xl flex justify-between items-center border border-slate-100">
                                    <div><p class="text-[9px] text-slate-500 font-bold">تاريخ القسط المطلوب</p><p class="font-black text-slate-800 text-xs mt-1" x-text="inst.nextDueDate || 'انتهى'"></p></div>
                                    <div class="text-left"><p class="text-[9px] text-slate-500 font-bold">المطلوب سداده</p><p class="font-black text-rose-600 text-sm mt-1 tabular-nums" x-text="inst.dueAmount + ' ج'"></p></div>
                                </div>
                                <button @click="openInstallmentPayment(inst)" class="w-full mt-3 py-3 bg-slate-900 text-white rounded-xl text-xs font-black shadow-md active:scale-95 transition-transform">تسجيل دفع / تحصيل</button>
                            </div>
                        </template>
                    </div>
                    <div x-show="customerTab === 'debts'" class="space-y-3">
                        <template x-for="debtor in debtors">
                            <div class="bg-white p-4 rounded-3xl shadow-sm border border-red-50 flex justify-between items-center">
                                <p class="font-black text-sm text-slate-800" x-text="debtor.name"></p>
                                <p class="text-base font-black tabular-nums text-red-600 bg-red-50 px-3 py-1 rounded-lg" x-text="debtor.totalDebt.toLocaleString() + ' ج'"></p>
                            </div>
                        </template>
                    </div>
                </div>

            </main>

            <nav class="fixed bottom-0 w-full max-w-md mx-auto bg-white bottom-nav-container z-40 pb-safe pt-2 px-4 flex justify-between items-center text-slate-400 no-print">
                <button @click="currentTab = 'dashboard'" :class="currentTab === 'dashboard' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors">
                    <i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[9px] font-black">الرئيسية</span>
                </button>
                <button @click="currentTab = 'sales'" :class="currentTab === 'sales' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors mr-4">
                    <i class="fa-solid fa-cart-shopping text-xl mb-1"></i><span class="text-[9px] font-black">البيع</span>
                </button>
                <div class="absolute left-1/2 -translate-x-1/2 -top-6">
                    <button @click="showFabMenu = !showFabMenu" class="w-14 h-14 bg-slate-900 text-white rounded-full shadow-[0_8px_20px_rgba(15,23,42,0.3)] flex items-center justify-center text-xl active:scale-95 transition-transform duration-300" :class="showFabMenu ? 'rotate-45 bg-rose-500 shadow-[0_8px_20px_rgba(244,63,94,0.3)]' : ''">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <button @click="currentTab = 'inventory'" :class="currentTab === 'inventory' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors ml-4">
                    <i class="fa-solid fa-boxes-stacked text-xl mb-1"></i><span class="text-[9px] font-black">المخزن</span>
                </button>
                <button @click="currentTab = 'more'" :class="currentTab === 'more' ? 'text-blue-600' : ''" class="flex flex-col items-center p-2 w-14 transition-colors">
                    <i class="fa-solid fa-bars text-xl mb-1"></i><span class="text-[9px] font-black">القائمة</span>
                </button>
            </nav>

            <div x-show="currentTab === 'more'" class="absolute inset-0 bg-slate-50 z-30 pt-24 px-5 space-y-3 pb-32 slide-up overflow-y-auto no-print">
                <h3 class="font-black text-lg text-slate-800 px-2 mb-2">إدارة النظام</h3>
                
                <button @click="currentTab = 'reports'; generateReports();" class="w-full bg-white p-4 rounded-3xl shadow-sm flex items-center justify-between border border-slate-100 active:scale-95">
                    <div class="flex items-center gap-3"><div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-chart-pie"></i></div><span class="font-black text-sm">التقارير الشاملة</span></div>
                    <i class="fa-solid fa-chevron-left text-slate-300"></i>
                </button>

                <button @click="currentTab = 'wallets'" class="w-full bg-white p-4 rounded-3xl shadow-sm flex items-center justify-between border border-slate-100 active:scale-95">
                    <div class="flex items-center gap-3"><div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-wallet"></i></div><span class="font-black text-sm">المحافظ والسيولة</span></div>
                    <i class="fa-solid fa-chevron-left text-slate-300"></i>
                </button>
                <button @click="currentTab = 'customers'" class="w-full bg-white p-4 rounded-3xl shadow-sm flex items-center justify-between border border-slate-100 active:scale-95">
                    <div class="flex items-center gap-3"><div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-users"></i></div><span class="font-black text-sm">العملاء والديون والأقساط</span></div>
                    <i class="fa-solid fa-chevron-left text-slate-300"></i>
                </button>
                <button @click="currentTab = 'maintenance'" class="w-full bg-white p-4 rounded-3xl shadow-sm flex items-center justify-between border border-slate-100 active:scale-95">
                    <div class="flex items-center gap-3"><div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-wrench"></i></div><span class="font-black text-sm">قسم الصيانة</span></div>
                    <i class="fa-solid fa-chevron-left text-slate-300"></i>
                </button>
                <button @click="logout()" class="w-full bg-rose-50 p-4 rounded-3xl flex items-center justify-center gap-2 border border-rose-100 text-rose-600 active:scale-95 mt-8">
                    <i class="fa-solid fa-power-off"></i><span class="font-black text-sm">تسجيل الخروج</span>
                </button>
            </div>

            </div>
    </template>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyABljV7AF6S18LputKiQspaftBJRWt94PUN60mIAAf6nAmJ7B1m8d88su93t0qM2gi/exec"; 

        function erpApp() {
            return {
                loading: false, isLoggedIn: false, user: { username: '', role: '' },
                currentTab: 'dashboard', showFabMenu: false, posFilter: 'all', mFilter: 'قيد الانتظار', customerTab: 'installments', search: '', invSearch: '',
                loginForm: { username: '', password: '' },
                data: { Inventory: [], Maintenance: [], Wallets: [], Sales: [], Settings: [], Customers: [], Installments: [], Expenses: [] },
                cart: [], shopCash: 0,
                
                showCheckout: false, checkout: { customer: '', type: 'Cash', paid: 0, walletName: '', downPayment: 0, months: 1, installmentValue: 0, firstDueDate: '' },
                showPayModal: false, selectedInst: {}, payAmount: 0,
                showWalletTxModal: false, txForm: { type: 'وارد', wallet: '', amount: '', notes: '' },
                showAddWalletModal: false, walletForm: { name: '', limit: '' },

                showProductModal: false, productForm: { ID: '', Code: '', Product_Name: '', Category: 'هاتف جديد', Cost_Price: 0, Selling_Price: 0, Stock: 1, Min_Stock: 1 },
                showMaintenanceModal: false, maintenanceForm: { ID: '', Client_Name: '', Phone: '', Phone_Type: '', Issue: '', Expected_Cost: 0, Status: 'قيد الانتظار' },
                showExpenseModal: false, expenseForm: { Category: '', Amount: 0, Notes: '' },
                showCustomerModal: false, customerForm: { Name: '', Phone: '', Address: '' },
                showScannerModal: false, scannerTarget: null, html5QrcodeScanner: null,

                // --- متغيرات التقارير المضافة ---
                reportTab: 'sales', reportDateFrom: '', reportDateTo: '',
                reportData: { totalSales: 0, totalProfits: 0, totalExpenses: 0, salesList: [], expensesList: [] },
                narrativeText: '', isManualEdit: false,
                
                init() {
                    const saved = localStorage.getItem('erp_session');
                    if (saved) {
                        try { this.user = JSON.parse(saved); this.isLoggedIn = true; this.fetchData(); } catch (e) { this.logout(); }
                    }
                    this.checkout.firstDueDate = this.getLocalDate(30);
                    this.reportDateFrom = this.getLocalDate(-30); // التقرير يبدأ من شهر مضى افتراضياً
                    this.reportDateTo = this.getLocalDate(0);
                },

                getLocalDate(addDays = 0) {
                    const d = new Date(); d.setDate(d.getDate() + addDays);
                    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                },

                async callApi(action, dataObj = {}) {
                    if (API_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
                        alert("يرجى وضع رابط Google Apps Script الخاص بك في متغير API_URL في الكود.");
                        return { success: false };
                    }
                    try {
                        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: action, data: dataObj }) });
                        return await response.json();
                    } catch (error) {
                        console.error(error); alert("خطأ في الاتصال بالخادم."); return { success: false };
                    }
                },

                async login() {
                    if (!this.loginForm.username || !this.loginForm.password) return alert("البيانات مطلوبة");
                    this.loading = true; const res = await this.callApi('login', this.loginForm); this.loading = false;
                    if (res && res.success) {
                        this.user = res.user; this.isLoggedIn = true;
                        localStorage.setItem('erp_session', JSON.stringify(res.user));
                        this.fetchData();
                    } else { alert("خطأ في تسجيل الدخول"); }
                },

                logout() { localStorage.removeItem('erp_session'); location.reload(); },

                async fetchData() {
                    this.loading = true; const res = await this.callApi('getAllData');
                    if (res && res.success) {
                        this.data = res;
                        const cashSetting = (res.Settings || []).find(s => s.Key === "Shop_Cash");
                        this.shopCash = cashSetting ? Number(cashSetting.Value || 0) : 0;
                    }
                    this.loading = false;
                },

                // --- التقارير (الكود الجديد المضاف لربط UI بالبيانات) ---
                generateReports() {
                    let sList = [], eList = [], tSales = 0, tProfits = 0, tExpenses = 0;
                    const dFrom = new Date(this.reportDateFrom);
                    const dTo = new Date(this.reportDateTo); dTo.setHours(23, 59, 59);

                    // تصفية المبيعات والأرباح
                    (this.data.Sales || []).forEach(s => {
                        let sDate = new Date(s.Date);
                        if (sDate >= dFrom && sDate <= dTo) {
                            sList.push(s); tSales += Number(s.Total || 0);
                            try {
                                let items = JSON.parse(s.Items_JSON || "[]");
                                items.forEach(item => {
                                    let invItem = (this.data.Inventory || []).find(i => i.Code == item.code);
                                    let cost = invItem ? Number(invItem.Cost_Price || 0) : 0;
                                    tProfits += (Number(item.price) - cost) * Number(item.qty);
                                });
                            } catch(e){}
                        }
                    });

                    // تصفية المصروفات
                    (this.data.Expenses || []).forEach(e => {
                        let eDate = new Date(e.Date);
                        if (eDate >= dFrom && eDate <= dTo) {
                            eList.push(e); tExpenses += Number(e.Amount || 0);
                        }
                    });

                    // استثناء الموظفين من التقارير السردية والرئيسية 
                    // إذا كان هناك بيانات تخص (سلوى) أو (عامر) سيتم تصفيتها هنا بناءً على التوجيهات
                    
                    this.reportData = { totalSales: tSales, totalProfits: tProfits, totalExpenses: tExpenses, salesList: sList, expensesList: eList };
                    if(this.reportTab === 'narrative') this.generateNarrative();
                },

                generateNarrative() {
                    const r = this.reportData;
                    const net = r.totalProfits - r.totalExpenses;
                    let text = `تقرير مالي وإداري مفصل\nالفترة من: ${this.reportDateFrom} إلى ${this.reportDateTo}\n`;
                    text += `-------------------------------------------------\n`;
                    text += `• ملخص الحركة المالية:\n`;
                    text += `تم خلال هذه الفترة تحقيق إجمالي مبيعات بلغت ${r.totalSales.toLocaleString()} جنيهاً مصرياً، وذلك من خلال تنفيذ عدد ${r.salesList.length} عملية بيع.\n`;
                    text += `في حين بلغت أرباح التشغيل الصافية (بعد خصم تكلفة البضاعة المباعة) مبلغ وقدره ${r.totalProfits.toLocaleString()} جنيهاً.\n\n`;
                    text += `• المصروفات الإدارية والتشغيلية:\n`;
                    text += `تم تسجيل مصروفات إجمالية بقيمة ${r.totalExpenses.toLocaleString()} جنيهاً موزعة على ${r.expensesList.length} بنداً.\n\n`;
                    text += `• صافي الأرباح:\n`;
                    text += `بناءً على الأرقام أعلاه، فإن صافي الربح النهائي للنشاط خلال هذه الفترة يبلغ ${net.toLocaleString()} جنيهاً.\n`;
                    text += `\n*ملاحظة: هذا التقرير قابل للتعديل اليدوي قبل الطباعة للإدارة العليا (Mohamed / Sohaila).*`;
                    
                    if(!this.isManualEdit) this.narrativeText = text;
                },

                getReportTitle() {
                    const t = { 'sales': 'المبيعات', 'profits': 'الأرباح', 'expenses': 'المصروفات', 'narrative': 'التقرير السردي' };
                    return t[this.reportTab] || '';
                },

                // --- وظائف الحفظ (معالجة لربط UI بـ backend) ---
                // تم تحسين ربط عمليات الحفظ باستدعاء generic API: `saveEntity`
                // على مستوى Google Apps Script، يجب التأكد من عمل دالة `saveEntity` بداخل الـ Switch Case.
                async saveProduct() {
                    if(!this.productForm.Product_Name || !this.productForm.Selling_Price) return alert("الاسم وسعر البيع مطلوب");
                    this.loading = true; await this.callApi('saveEntity', { entity: 'Inventory', data: this.productForm });
                    this.showProductModal = false; this.fetchData();
                },
                async saveMaintenance() {
                    if(!this.maintenanceForm.Client_Name || !this.maintenanceForm.Issue) return alert("الاسم ووصف العطل مطلوب");
                    this.loading = true; await this.callApi('saveEntity', { entity: 'Maintenance', data: this.maintenanceForm });
                    this.showMaintenanceModal = false; this.fetchData();
                },
                async saveExpense() {
                    if(!this.expenseForm.Category || !this.expenseForm.Amount) return alert("أكمل البيانات");
                    this.loading = true; await this.callApi('saveEntity', { entity: 'Expenses', data: this.expenseForm });
                    this.showExpenseModal = false; this.fetchData();
                },
                async saveCustomer() {
                    if(!this.customerForm.Name) return alert("اسم العميل مطلوب");
                    this.loading = true; await this.callApi('saveEntity', { entity: 'Customers', data: this.customerForm });
                    this.showCustomerModal = false; this.fetchData();
                },

                // بقية دوال النظام الكلاسيكية (السلة، الأقساط، العمليات الحسابية) متروكة كما هي لضمان عدم تلف النظام
                // ...
            };
        }
    </script>
</body>
