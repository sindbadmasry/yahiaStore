<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <title>2M - Super Mobile Edition</title>

    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com;">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body x-data="erpApp" class="text-slate-800 min-h-screen pb-28">

    <div x-show="loading" class="fixed inset-0 z-[1000] bg-slate-900/50 backdrop-blur-lg flex flex-col items-center justify-center text-white transition-all" x-cloak>
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4 shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
        <p class="font-black tracking-widest animate-pulse">جاري المعالجة...</p>
    </div>

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[2000] bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-4">
        <div class="w-full max-w-md glass-panel p-10 rounded-[2.5rem] relative overflow-hidden">
            <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
            <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-indigo-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
            <div class="relative z-10 text-center mb-10">
                <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl mb-6 shadow-xl transform rotate-3"><i class="fa-solid fa-rocket -rotate-3"></i></div>
                <h2 class="text-4xl font-black text-slate-800 tracking-tight">2M</h2>
                <p class="text-slate-500 font-bold mt-2">تسجيل الدخول للنظام</p>
            </div>
            <div class="relative z-10 space-y-5">
                <div class="relative">
                    <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" x-model="loginForm.username" placeholder="اسم المستخدم" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 rounded-2xl outline-none font-bold">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" x-model="loginForm.password" @keyup.enter="login()" placeholder="كلمة المرور" class="w-full py-4 pr-12 pl-4 bg-white/50 border border-white/60 focus:bg-white focus:border-indigo-500 rounded-2xl outline-none font-bold">
                </div>
                <button @click="login()" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-black shadow-lg">دخول</button>
            </div>
        </div>
    </div>

    <template x-if="isLoggedIn">
        <div class="max-w-4xl mx-auto relative h-full">
            
            <header class="glass-nav sticky top-0 z-40 px-6 py-4 flex justify-between items-center rounded-b-3xl shadow-sm mb-6 mx-2">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-[14px] flex items-center justify-center text-white shadow-md"><i class="fa-solid fa-bolt"></i></div>
                    <div>
                        <h1 class="font-black text-lg text-slate-800 leading-none mb-1">2M System</h1>
                        <div class="flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <p class="text-[9px] font-bold text-slate-500" x-text="user.username + ' (' + (user.role == 'admin' ? 'مدير' : 'موظف') + ')'"></p>
                        </div>
                    </div>
                </div>
                <button @click="fetchData()" class="w-10 h-10 bg-white text-indigo-600 rounded-[14px] shadow-sm active:scale-95 flex items-center justify-center border border-slate-100"><i class="fa-solid fa-sync" :class="loading ? 'animate-spin' : ''"></i></button>
            </header>

            <main class="px-4 space-y-6">
                <div x-show="currentTab === 'home' && activeView === ''" x-transition.opacity class="space-y-4">
                    <div x-show="user.role === 'admin'" class="bg-gradient-to-br from-slate-900 to-indigo-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                        <div class="relative z-10 flex flex-col gap-5">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-xs font-bold text-indigo-200 mb-1">إجمالي السيولة النقدية</p>
                                    <h3 class="text-4xl font-black tabular-nums tracking-tight text-white" x-text="(shopCash + getTotalWalletBalance()).toLocaleString() + ' ج'"></h3>
                                </div>
                                <button @click="updateShopCash()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center backdrop-blur-md active:scale-95 border border-white/20"><i class="fa-solid fa-pen text-sm"></i></button>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-2 pt-4 border-t border-indigo-500/30">
                                <div>
                                    <p class="text-[10px] font-bold text-emerald-300 mb-1 flex items-center gap-1"><i class="fa-solid fa-cash-register"></i> كاش المحل</p>
                                    <p class="text-xl font-black text-emerald-400 tabular-nums" x-text="shopCash.toLocaleString() + ' ج'"></p>
                                </div>
                                <div class="border-r border-indigo-500/30 pr-4">
                                    <p class="text-[10px] font-bold text-blue-300 mb-1 flex items-center gap-1"><i class="fa-solid fa-wallet"></i> إجمالي المحافظ</p>
                                    <p class="text-xl font-black text-blue-400 tabular-nums" x-text="getTotalWalletBalance().toLocaleString() + ' ج'"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="glass-panel p-4 rounded-[2rem] flex flex-col justify-center gap-3 bg-white border border-slate-100">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-[1.2rem] flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-chart-line"></i></div>
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold mb-0.5">مبيعات اليوم</p>
                                    <p class="font-black text-slate-800 text-lg tabular-nums" x-text="getTodaySales().toLocaleString() + ' ج'"></p>
                                </div>
                            </div>
                        </div>
                        <div @click="showDebtors()" class="glass-panel p-4 rounded-[2rem] flex flex-col justify-center gap-3 active:scale-95 cursor-pointer bg-white border border-slate-100">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-[1.2rem] flex items-center justify-center text-xl shadow-sm"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                                <div>
                                    <p class="text-[10px] text-slate-500 font-bold mb-0.5">ديون السوق</p>
                                    <p class="font-black text-rose-600 text-lg tabular-nums" x-text="getTotalDebts().toLocaleString() + ' ج'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="currentTab === 'pos' && activeView === ''" x-transition.opacity class="flex flex-col h-full space-y-4">
                    <div class="sticky top-[80px] z-30 glass-nav p-3 rounded-[2rem] space-y-3 shadow-sm border border-slate-200/60">
                        <div class="relative flex gap-2">
                            <div class="relative flex-1">
                                <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" x-model="search" placeholder="ابحث لبيع منتج..." class="w-full py-3 pr-12 pl-4 bg-slate-50 border border-slate-200 focus:border-indigo-500 rounded-[1rem] outline-none font-bold text-sm shadow-inner">
                            </div>
                            <button @click="openScanner('pos')" class="w-12 bg-indigo-50 text-indigo-600 rounded-[1rem] flex items-center justify-center active:scale-95"><i class="fa-solid fa-qrcode text-xl"></i></button>
                        </div>
                        <div class="flex gap-1.5 overflow-x-auto custom-scrollbar pb-1">
                            <button @click="posFilter='new'" :class="posFilter==='new' ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">هواتف جديدة</button>
                            <button @click="posFilter='used'" :class="posFilter==='used' ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">مستعملة</button>
                            <button @click="posFilter='all'" :class="posFilter==='all' ? 'bg-purple-600 text-white shadow-md' : 'bg-slate-100 text-slate-600'" class="flex-1 py-2 px-3 rounded-xl font-black text-[11px] whitespace-nowrap transition-colors">إكسسوار وعام</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-24">
                        <template x-for="item in filteredInventoryPOS" :key="item.Code">
                            <div @click="addToCart(item)" class="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm active:scale-95 hover:border-indigo-300 transition-all cursor-pointer relative overflow-hidden">
                                <template x-if="item.Category && item.Category.includes('هاتف')">
                                    <span class="inline-block bg-indigo-50 text-indigo-600 text-[8px] px-2 py-0.5 rounded-md font-black mb-2 absolute top-3 left-3">هاتف</span>
                                </template>
                                <h4 class="font-black text-xs text-slate-800 line-clamp-2 leading-snug h-8 pr-1 mt-1" x-text="item.Product_Name"></h4>
                                <div class="mt-4 flex justify-between items-end border-t border-slate-50 pt-2">
                                    <span class="text-indigo-600 font-black text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></span>
                                    <span class="text-[9px] font-bold px-2 py-1 rounded-lg" :class="item.Stock > 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'" x-text="item.Stock > 0 ? 'مخزن: ' + item.Stock : 'نفد'"></span>
                                </div>
                            </div>
                        </template>
                        <div x-show="filteredInventoryPOS.length === 0" class="col-span-2 py-12 text-center">
                            <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto flex items-center justify-center text-slate-300 mb-3"><i class="fa-solid fa-box-open text-2xl"></i></div>
                            <p class="text-slate-400 font-bold text-sm">لا توجد منتجات مطابقة</p>
                        </div>
                    </div>

                    <button x-show="cart.length > 0" @click="showCart = true" class="fixed bottom-[85px] left-4 right-4 bg-slate-800 text-white p-4 rounded-[1.5rem] shadow-xl flex justify-between items-center z-[150] active:scale-95 transition-transform border border-slate-700">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center relative">
                                <i class="fa-solid fa-cart-shopping"></i>
                                <span class="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 rounded-full text-[10px] font-black flex items-center justify-center border-2 border-slate-800" x-text="cart.length"></span>
                            </div>
                            <span class="font-black text-sm">مراجعة السلة والدفع</span>
                        </div>
                        <span class="font-black text-lg text-emerald-400 tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></span>
                    </button>
                </div>

                <div x-show="currentTab === 'operations' && activeView === ''" x-transition.opacity class="space-y-4">
                    <h3 class="font-black text-slate-800 mb-2 flex items-center gap-2 text-lg"><div class="w-1.5 h-6 bg-indigo-500 rounded-full"></div> لوحة الإدارة</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="activeView = 'inventory'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-boxes-stacked"></i></div>
                            <span class="font-black text-slate-800 text-sm">إدارة المخزن</span>
                        </button>
                        <button @click="activeView = 'maintenance'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95">
                            <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                            <span class="font-black text-slate-800 text-sm">قسم الصيانة</span>
                        </button>
                        <button @click="activeView = 'wallets'" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95">
                            <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-wallet"></i></div>
                            <span class="font-black text-slate-800 text-sm">المحافظ والكاش</span>
                        </button>
                        <button @click="showCustomers()" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95">
                            <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-users"></i></div>
                            <span class="font-black text-slate-800 text-sm">سجل العملاء</span>
                        </button>
                        <button x-show="user.role === 'admin'" @click="showExpensesReportsModal = true" class="glass-panel p-5 rounded-[2rem] flex flex-col items-center gap-3 active:scale-95 col-span-2">
                            <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-[1.2rem] flex items-center justify-center text-2xl"><i class="fa-solid fa-money-bill-wave"></i></div>
                            <span class="font-black text-slate-800 text-sm">المصروفات المحددة</span>
                        </button>
                    </div>
                </div>

                <div x-show="currentTab === 'more' && activeView === ''" x-transition.opacity class="space-y-4">
                    <div class="glass-panel p-5 rounded-[2rem] flex items-center gap-4">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-2xl border-4 border-white shadow-sm"><i class="fa-solid fa-user"></i></div>
                        <div>
                            <h3 class="font-black text-lg text-slate-800" x-text="user.username"></h3>
                            <p class="text-xs font-bold text-slate-500" x-text="user.role === 'admin' ? 'مدير النظام' : 'موظف مبيعات'"></p>
                        </div>
                    </div>
                    <div class="glass-panel p-2 rounded-[2rem] space-y-1">
                        <button @click="activeView = 'reports'" class="w-full flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-[14px] flex items-center justify-center"><i class="fa-solid fa-chart-pie"></i></div>
                                <span class="font-black text-slate-800">التقارير المالية المفصلة</span>
                            </div>
                            <i class="fa-solid fa-chevron-left text-slate-300"></i>
                        </button>
                        <button x-show="user.role === 'admin'" @click="openAddUserModal()" class="w-full flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-[14px] flex items-center justify-center"><i class="fa-solid fa-user-plus"></i></div>
                                <span class="font-black text-slate-800">إضافة مستخدم جديد</span>
                            </div>
                            <i class="fa-solid fa-chevron-left text-slate-300"></i>
                        </button>
                    </div>
                    <button @click="logout()" class="w-full glass-panel border-rose-100 p-5 rounded-[2rem] text-rose-600 font-black flex justify-center items-center gap-2 active:scale-95 mt-8">
                        <i class="fa-solid fa-power-off"></i> تسجيل الخروج
                    </button>
                </div>

                <div x-show="activeView === 'inventory'" x-cloak class="fixed inset-0 z-50 bg-[#f8fafc] overflow-y-auto pb-28 custom-scrollbar">
                    <div class="sticky top-0 glass-nav p-4 flex items-center gap-4 z-20 shadow-sm">
                        <button @click="activeView = ''" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-slate-600"><i class="fa-solid fa-arrow-right"></i></button>
                        <h2 class="text-lg font-black text-slate-800">إدارة المخزن</h2>
                    </div>
                    <div class="p-4 space-y-4">
                        <div class="glass-panel p-4 rounded-[1.5rem] space-y-3">
                            <div class="flex gap-2">
                                <div class="relative flex-1">
                                    <i class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" x-model="invSearch" placeholder="بحث بالاسم أو الباركود..." class="w-full py-3 pr-10 pl-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                                </div>
                                <button @click="openScanner('invSearch')" class="w-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-qrcode"></i></button>
                            </div>
                            <div class="flex bg-slate-100/50 p-1 rounded-xl">
                                <button @click="invFilter = 'all'" :class="invFilter === 'all' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="flex-1 py-2 rounded-lg font-black text-[10px]">الكل</button>
                                <button @click="invFilter = 'shortages'" :class="invFilter === 'shortages' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'" class="flex-1 py-2 rounded-lg font-black text-[10px]"><i class="fa-solid fa-triangle-exclamation ml-1"></i> النواقص</button>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <template x-for="item in processedInventory" :key="item.Code">
                                <div @click="openInventoryProduct(item)" class="glass-panel p-4 rounded-2xl bg-white flex justify-between items-center cursor-pointer border border-transparent">
                                    <div class="flex gap-3 items-center">
                                        <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="(item.Category||'').includes('هاتف') ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'"><i class="fa-solid" :class="(item.Category||'').includes('هاتف') ? 'fa-mobile-screen' : 'fa-box'"></i></div>
                                        <div>
                                            <p class="font-black text-sm text-slate-800 line-clamp-1" x-text="item.Product_Name"></p>
                                            <p class="text-[9px] text-slate-400 font-bold mt-1" x-text="(item.Category||'عام') + ' • كود: ' + item.Code"></p>
                                        </div>
                                    </div>
                                    <div class="text-left flex flex-col items-end">
                                        <p class="font-black text-indigo-600 text-sm tabular-nums" x-text="item.Selling_Price + ' ج'"></p>
                                        <span class="text-[9px] font-black px-2 py-0.5 rounded-lg mt-1" :class="item.Stock <= (item.Min_Stock||1) ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-600'" x-text="'مخزن: ' + item.Stock"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 to-transparent flex justify-end z-[100]">
                         <button @click="openProductModal('صنف عام')" class="w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg flex items-center justify-center text-xl active:scale-95"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <div x-show="activeView === 'maintenance'" x-cloak class="fixed inset-0 z-50 bg-[#f8fafc] overflow-y-auto pb-28 custom-scrollbar">
                    <div class="sticky top-0 glass-nav p-4 flex items-center justify-between z-20 shadow-sm">
                        <div class="flex items-center gap-4">
                            <button @click="activeView = ''" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-slate-600"><i class="fa-solid fa-arrow-right"></i></button>
                            <h2 class="text-lg font-black text-slate-800">تذاكر الصيانة</h2>
                        </div>
                        <button @click="openMaintenanceModal()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black">إضافة <i class="fa-solid fa-plus mr-1"></i></button>
                    </div>
                    <div class="p-4 space-y-4">
                        <div class="glass-panel p-2 rounded-2xl flex gap-1 overflow-x-auto custom-scrollbar">
                            <button @click="mFilter = 'قيد الانتظار'" :class="mFilter === 'قيد الانتظار' ? 'bg-amber-500 text-white shadow-md' : 'bg-white text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">انتظار</button>
                            <button @click="mFilter = 'تم التصليح'" :class="mFilter === 'تم التصليح' ? 'bg-blue-500 text-white shadow-md' : 'bg-white text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">مُصلح</button>
                            <button @click="mFilter = 'تم التسليم'" :class="mFilter === 'تم التسليم' ? 'bg-emerald-500 text-white shadow-md' : 'bg-white text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">مُسلم</button>
                            <button @click="mFilter = 'مرفوض'" :class="mFilter === 'مرفوض' ? 'bg-rose-500 text-white shadow-md' : 'bg-white text-slate-500'" class="flex-1 min-w-[75px] py-2.5 text-xs font-black rounded-xl transition-all">مرفوض</button>
                        </div>
                        <div class="space-y-3">
                            <template x-for="m in filteredMaintenance" :key="m.Ticket_ID">
                                <div class="glass-panel p-4 rounded-3xl flex flex-col bg-white" :class="getMClass(m.Status)">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>

                        <button @click="showEditMaintenanceModal = false" class="w-full text-gray-500 py-2 font-bold">إغلاق</button>
                    </div>
                </div>
            </div>

            <div x-show="showAddExpenseModal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/50" x-cloak>
                <div class="bg-white w-full max-w-sm rounded-2xl p-6">
                    <h3 class="text-lg font-bold mb-4 text-rose-600">تسجيل مصروف جديد</h3>
                    <div class="space-y-3">
                        <input type="text" x-model="expenseForm.description" placeholder="البند" class="w-full p-3 border rounded-xl font-bold outline-none">
                        <input type="number" x-model="expenseForm.amount" placeholder="المبلغ" class="w-full p-3 border rounded-xl font-bold outline-none">
                        <input type="text" x-model="expenseForm.notes" placeholder="ملاحظات" class="w-full p-3 border rounded-xl font-bold outline-none">
                        <button @click="submitExpense()" class="w-full bg-rose-600 text-white py-3 rounded-xl font-bold shadow-lg">حفظ المصروف</button>
                        <button @click="showAddExpenseModal = false" class="w-full text-gray-400 py-2 font-bold">إلغاء</button>
                    </div>
                </div>
            </div>

            <div x-show="modalUpdateCash.show" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/50" x-cloak>
                <div class="bg-white w-full max-w-sm rounded-2xl p-6 border-t-8 border-amber-500">
                    <h3 class="text-lg font-bold mb-2 text-center text-slate-800">تعديل رصيد الخزينة</h3>
                    <div class="space-y-3">
                        <label class="text-xs font-bold text-gray-400">الرصيد الفعلي الموجود في الدرج الآن</label>
                        <input type="number" x-model="modalUpdateCash.amount" class="w-full p-4 border rounded-2xl text-center text-2xl font-black bg-gray-50 outline-none text-indigo-600">
                        <button @click="submitUpdateCash()" class="w-full bg-amber-500 text-white py-4 rounded-2xl font-bold shadow-lg">تحديث الرصيد</button>
                        <button @click="modalUpdateCash.show = false" class="w-full text-gray-400 py-2 font-bold">تراجع</button>
                    </div>
                </div>
            </div>

            <div x-show="showAddUserModal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/50" x-cloak>
                <div class="bg-white w-full max-w-sm rounded-2xl p-6">
                    <h3 class="text-lg font-bold mb-4">إضافة موظف جديد</h3>
                    <div class="space-y-3">
                        <input type="text" x-model="addUserForm.username" placeholder="اسم المستخدم" class="w-full p-3 border rounded-xl font-bold outline-none">
                        <input type="password" x-model="addUserForm.password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl font-bold outline-none">
                        <select x-model="addUserForm.role" class="w-full p-3 border rounded-xl bg-gray-50 font-bold outline-none">
                            <option value="worker">موظف (Worker)</option><option value="admin">مدير (Admin)</option>
                        </select>
                        <button @click="addNewUser()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold shadow-lg">إنشاء الحساب</button>
                        <button @click="showAddUserModal = false" class="w-full text-gray-400 py-2 font-bold">إلغاء</button>
                    </div>
                </div>
            </div>

            <div x-show="modalConfirm.show" class="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak>
                <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center shadow-2xl">
                    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-exclamation-triangle text-2xl animate-pulse"></i></div>
                    <p class="text-slate-800 font-bold text-sm mb-6" x-text="modalConfirm.message"></p>
                    <div class="flex gap-3">
                        <button @click="executeConfirm()" class="flex-1 bg-rose-600 text-white py-3 rounded-2xl font-bold">تأكيد</button>
                        <button @click="modalConfirm.show = false" class="flex-1 bg-gray-100 text-gray-500 py-3 rounded-2xl font-bold">تراجع</button>
                    </div>
                </div>
            </div>

            <div x-show="showScannerModal" x-cloak class="fixed inset-0 z-[600] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center p-4">
                <div class="glass-panel bg-white w-full max-w-md p-6 rounded-[2.5rem] relative">
                    <button @click="closeScanner()" class="absolute top-4 right-4 w-8 h-8 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center z-10 hover:bg-slate-200"><i class="fa-solid fa-times"></i></button>
                    <h3 class="text-center font-black mb-4 text-lg text-indigo-600"><i class="fa-solid fa-qrcode ml-2"></i>مسح الباركود</h3>
                    <div id="reader" class="w-full h-72 bg-slate-900 rounded-2xl overflow-hidden border-4 border-slate-100 shadow-inner"></div>
                </div>
            </div>

            <div x-show="showCart" x-cloak class="fixed inset-0 z-[500] flex items-end justify-center pointer-events-none">
                <div x-show="showCart" x-transition.opacity class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm pointer-events-auto" @click="showCart = false"></div>
                <div x-show="showCart" x-transition:enter="sheet-enter" x-transition:enter-active="sheet-enter-active" class="w-full max-w-lg bg-white rounded-t-[2.5rem] p-6 space-y-4 max-h-[90vh] overflow-y-auto custom-scrollbar relative z-10 pointer-events-auto shadow-2xl pb-10">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2"></div>
                    <div class="flex justify-between items-center pb-2">
                        <h3 class="text-lg font-black text-slate-800 flex items-center gap-2">سلة المبيعات</h3>
                        <button @click="showCart = false" class="w-8 h-8 bg-slate-50 text-slate-500 rounded-full flex items-center justify-center"><i class="fa-solid fa-times text-xs"></i></button>
                    </div>
                    <div class="space-y-3">
                        <template x-for="(ci, idx) in cart">
                            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                <div class="flex-1 pr-2">
                                    <p class="font-black text-sm text-slate-800 leading-tight mb-2" x-text="ci.name"></p>
                                    <div class="flex items-center gap-2">
                                        <div class="flex items-center bg-white border border-slate-200 rounded-xl px-2 py-1 shadow-sm"><span class="text-[9px] text-slate-400 ml-1">السعر:</span><input type="number" x-model.number="ci.price" class="w-16 text-xs font-black outline-none text-indigo-600 bg-transparent text-left"></div>
                                        <div class="flex items-center bg-white border border-slate-200 rounded-xl px-2 py-1 shadow-sm"><span class="text-[9px] text-slate-400 ml-1">العدد:</span><input type="number" x-model.number="ci.qty" min="1" class="w-12 text-xs font-black outline-none text-emerald-600 text-center bg-transparent"></div>
                                    </div>
                                </div>
                                <button @click="cart.splice(idx, 1)" class="w-10 h-10 bg-white text-rose-500 rounded-xl border border-rose-100 shadow-sm"><i class="fa-solid fa-trash-can text-xs"></i></button>
                            </div>
                        </template>
                    </div>
                    <div class="bg-indigo-50 p-5 rounded-3xl space-y-4 border border-indigo-100 mt-2">
                        <div class="flex justify-between items-center text-lg font-black text-slate-800 border-b border-indigo-200/50 pb-3"><span>الإجمالي المطلوب</span><span class="text-indigo-700 tabular-nums" x-text="cartTotal.toLocaleString() + ' ج'"></span></div>
                        <div class="relative" x-data="{ showDrop: false }">
                            <input type="text" x-model="checkout.customer" @input="customerSearch = $event.target.value; showDrop = true" @click.away="showDrop = false" placeholder="اسم العميل (اختياري)" class="w-full py-3 pr-10 pl-4 bg-white border border-slate-200 focus:border-indigo-500 rounded-[1rem] font-bold outline-none text-sm">
                            <div x-show="showDrop && filteredCustomers.length > 0 && checkout.customer" class="absolute bottom-full mb-2 left-0 right-0 bg-white border border-slate-200 rounded-2xl shadow-xl z-[100] max-h-40 overflow-y-auto">
                                <template x-for="customer in filteredCustomers"><div @click="checkout.customer = customer; showDrop = false" class="p-3 hover:bg-slate-50 cursor-pointer border-b border-slate-100 font-bold text-sm text-slate-700" x-text="customer"></div></template>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <select x-model="checkout.type" @change="if(checkout.type !== 'Credit') checkout.paid = cartTotal" class="p-3 bg-white border border-slate-200 rounded-[1rem] font-bold outline-none text-xs text-slate-700"><option value="Cash">كاش</option><option value="Wallet">محفظة</option><option value="Credit">آجل</option></select>
                            <input type="number" x-model.number="checkout.paid" placeholder="المدفوع" class="p-3 bg-white border border-slate-200 rounded-[1rem] font-black outline-none text-sm text-center text-indigo-700">
                        </div>
                        <select x-show="checkout.type === 'Wallet'" x-model="checkout.walletName" class="w-full p-3 bg-white border border-slate-200 rounded-[1rem] font-bold outline-none text-xs"><option value="">-- المحفظة --</option><template x-for="w in dynamicWallets"><option :value="w.name" x-text="w.name"></option></template></select>
                        <button @click="confirmSale()" class="w-full py-4 bg-slate-800 text-white rounded-[1rem] font-black shadow-lg">إتمام الدفع <i class="fa-solid fa-check ml-1"></i></button>
                    </div>
                </div>
            </div>

            <div x-show="showProductModal" x-cloak class="fixed inset-0 z-[400] flex items-end justify-center pointer-events-none">
                <div x-show="showProductModal" x-transition.opacity class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm pointer-events-auto" @click="showProductModal = false"></div>
                <div x-show="showProductModal" x-transition:enter="sheet-enter" x-transition:enter-active="sheet-enter-active" class="w-full max-w-lg bg-white rounded-t-[2.5rem] p-6 max-h-[90vh] overflow-y-auto custom-scrollbar relative z-10 pointer-events-auto shadow-2xl pb-10">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
                    <h3 class="text-lg font-black mb-4 text-slate-800 flex items-center gap-2" x-text="(isEditingProduct ? 'تعديل ' : 'شراء ') + pForm.Category"></h3>
                    <div class="space-y-3">
                        <div class="relative">
                            <input type="text" x-model="pForm.Code" @input="checkExistingProduct()" placeholder="الباركود / الكود *" class="w-full py-3.5 pr-10 pl-12 bg-slate-50 border border-slate-200 rounded-[1rem] font-bold outline-none text-sm">
                            <button @click="openScanner('pForm.Code')" class="absolute left-2 top-1/2 -translate-y-1/2 text-indigo-600 w-10 h-10 bg-indigo-50 rounded-xl flex justify-center items-center"><i class="fa-solid fa-qrcode"></i></button>
                        </div>
                        <input type="text" x-model="pForm.Product_Name" placeholder="اسم المنتج *" class="w-full py-3.5 px-4 bg-slate-50 border border-slate-200 rounded-[1rem] font-bold outline-none text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" x-model.number="pForm.Cost_Price" placeholder="سعر الشراء" class="py-3 px-4 bg-slate-50 border border-slate-200 rounded-[1rem] font-bold outline-none text-sm text-rose-600">
                            <input type="number" x-model.number="pForm.Selling_Price" placeholder="سعر البيع *" class="py-3 px-4 bg-slate-50 border border-slate-200 rounded-[1rem] font-black outline-none text-sm text-indigo-600">
                            <input type="number" x-model.number="pForm.Stock" placeholder="الكمية *" class="py-3 px-4 bg-slate-50 border border-slate-200 rounded-[1rem] font-bold outline-none text-sm">
                            <input type="number" x-model.number="pForm.Min_Stock" placeholder="حد الطلب" class="py-3 px-4 bg-slate-50 border border-slate-200 rounded-[1rem] font-bold outline-none text-sm">
                        </div>
                        <button @click="saveProduct()" class="w-full py-4 bg-slate-800 text-white rounded-[1rem] font-black shadow-lg mt-4 active:scale-95" x-text="isEditingProduct ? 'حفظ التعديل' : 'تأكيد الشراء'"></button>
                    </div>
                </div>
            </div>

            <div x-show="showCustomersModal" x-cloak class="fixed inset-0 z-[150] bg-[#f8fafc] overflow-y-auto pb-28 custom-scrollbar">
                <div class="sticky top-0 glass-nav p-4 flex items-center gap-4 z-20 shadow-sm">
                    <button @click="showCustomersModal = false" class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-slate-600"><i class="fa-solid fa-arrow-right"></i></button>
                    <h2 class="text-lg font-black text-slate-800">سجل العملاء</h2>
                </div>
                <div class="p-4 space-y-3">
                    <button @click="openAddCustomerModal()" class="w-full bg-teal-600 text-white py-4 rounded-[1.5rem] font-black mb-2 flex justify-center items-center gap-2">إضافة عميل جديد <i class="fa-solid fa-user-plus"></i></button>
                    <template x-for="c in customers">
                        <div class="glass-panel p-4 rounded-3xl bg-white border border-slate-100 flex justify-between items-center">
                            <div><h4 class="font-black text-sm text-slate-800" x-text="c.Name"></h4><p class="text-[10px] font-bold text-slate-400 mt-1" x-text="c.Phone || 'لا يوجد رقم'"></p></div>
                            <div x-show="c.totalDebt > 0" class="text-left bg-rose-50 px-3 py-1.5 rounded-xl border border-rose-100">
                                <p class="text-[9px] font-bold text-rose-500">مستحقات</p><p class="font-black text-rose-600 text-sm tabular-nums" x-text="c.totalDebt + ' ج'"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="showAddCustomerModal" x-cloak class="fixed inset-0 z-[500] flex items-end justify-center pointer-events-none">
                <div x-show="showAddCustomerModal" x-transition.opacity class="absolute inset-0 bg-slate-900/60 pointer-events-auto" @click="showAddCustomerModal = false"></div>
                <div x-show="showAddCustomerModal" x-transition:enter="sheet-enter" x-transition:enter-active="sheet-enter-active" class="w-full max-w-lg bg-white rounded-t-[2.5rem] p-6 space-y-4 relative z-10 pointer-events-auto pb-10">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2"></div>
                    <h3 class="font-black text-slate-800 text-lg">إضافة عميل جديد</h3>
                    <input type="text" x-model="addCustomerForm.name" placeholder="الاسم" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm">
                    <input type="text" x-model="addCustomerForm.phone" placeholder="الموبايل" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm">
                    <button @click="addNewCustomer()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black">حفظ العميل</button>
                </div>
            </div>

            <div x-show="showMaintenanceModal" x-cloak class="fixed inset-0 z-[500] flex items-end justify-center pointer-events-none">
                <div x-show="showMaintenanceModal" x-transition.opacity class="absolute inset-0 bg-slate-900/60 pointer-events-auto" @click="showMaintenanceModal = false"></div>
                <div x-show="showMaintenanceModal" x-transition:enter="sheet-enter" x-transition:enter-active="sheet-enter-active" class="w-full max-w-lg bg-white rounded-t-[2.5rem] p-6 space-y-4 relative z-10 pointer-events-auto pb-10">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2"></div>
                    <h3 class="font-black text-slate-800 text-lg">تذكرة صيانة جديدة</h3>
                    <input type="text" x-model="mForm.Client_Name" placeholder="اسم العميل" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm">
                    <input type="text" x-model="mForm.Phone_Number" placeholder="رقم الموبايل" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm">
                    <input type="text" x-model="mForm.Phone_Type" placeholder="نوع الجهاز" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm">
                    <input type="text" x-model="mForm.Issue" placeholder="العطل" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm">
                    <input type="number" x-model.number="mForm.Expected_Cost" placeholder="التكلفة المتوقعة" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm text-indigo-600">
                    <button @click="saveNewMaintenance()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black">حفظ التذكرة</button>
                </div>
            </div>

        </div>
    </template>
</body>
</html>
